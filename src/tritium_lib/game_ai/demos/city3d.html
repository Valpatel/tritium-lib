<html lang="en">
<head>
<meta charset="utf-8">
<title>Tritium City 3D — Riot Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; color: #fcee0a; font-size: 13px;
}
#hud > div { pointer-events: auto; }

#top-bar {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 12px 16px;
}
#clock {
  font-size: 42px; font-weight: bold; color: #00f0ff;
  text-shadow: 0 0 10px #00f0ff88;
}
#time-label { font-size: 11px; color: #00f0ff99; }
#phase-indicator {
  font-size: 20px; font-weight: bold; color: #05ffa1;
  text-shadow: 0 0 8px #05ffa188;
  margin-top: 4px;
}
#phase-indicator.riot { color: #ff2a6d; text-shadow: 0 0 12px #ff2a6d88; }
#phase-indicator.tension { color: #fcee0a; text-shadow: 0 0 8px #fcee0a88; }
#phase-indicator.dispersal { color: #00f0ff; text-shadow: 0 0 8px #00f0ff88; }

#stats {
  text-align: right; line-height: 1.8; font-size: 14px;
}
.stat-val { color: #05ffa1; font-weight: bold; }
.protestor-val { color: #05ffa1; }
.police-val { color: #00f0ff; }
.hostile-val { color: #ff2a6d; }

#riot-stats {
  text-align: right; margin-top: 8px; padding-top: 8px;
  border-top: 1px solid #fcee0a33; font-size: 13px; line-height: 1.6;
}

#kill-feed {
  position: absolute; bottom: 60px; left: 16px;
  max-height: 250px; overflow: hidden; font-size: 13px;
  line-height: 1.6;
}
.kill-entry { opacity: 0.9; }
.kill-entry.fade { opacity: 0.3; }

#controls {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  text-align: center; font-size: 12px; color: #fcee0a88;
  background: #0a0a0f88; padding: 6px 16px; border-radius: 4px;
  border: 1px solid #fcee0a22;
}
#controls span { color: #00f0ff; }

#fps {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: #05ffa188;
}

#combat-banner {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 42px; font-weight: bold; color: #ff2a6d;
  text-shadow: 0 0 20px #ff2a6d88, 0 0 40px #ff2a6d44;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
#combat-banner.show { opacity: 1; }
</style>
</head>
<body>

<div id="hud">
  <div id="top-bar">
    <div>
      <div id="clock">08:00</div>
      <div id="time-label">SIMULATION TIME</div>
      <div id="phase-indicator">PEACEFUL</div>
    </div>
    <div id="stats">
      Civilians: <span class="stat-val" id="civ-count">0</span><br>
      Protestors: <span class="protestor-val" id="protestor-count">0</span><br>
      Police: <span class="police-val" id="police-count">0</span><br>
      Arrests: <span class="hostile-val" id="arrest-count">0</span>
      <div id="riot-stats">
        Molotovs: <span class="hostile-val" id="molotov-count">0</span><br>
        Tear Gas: <span class="police-val" id="teargas-count">0</span><br>
        Rocks Thrown: <span class="stat-val" id="rock-count">0</span><br>
        Injuries: <span class="hostile-val" id="injury-count">0</span>
      </div>
    </div>
  </div>
  <div id="fps">-- FPS</div>
  <div id="kill-feed"></div>
  <div id="controls">
    <span>SPACE</span> Start Riot &nbsp;|&nbsp;
    <span>LMB Drag</span> Rotate &nbsp;|&nbsp;
    <span>RMB Drag</span> Pan &nbsp;|&nbsp;
    <span>Scroll</span> Zoom &nbsp;|&nbsp;
    <span>N</span> Night &nbsp;|&nbsp;
    <span>C</span> Chase Cam
  </div>
  <div id="combat-banner">RIOT IN PROGRESS</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// =========================================================================
// Constants
// =========================================================================
const CYAN    = 0x00f0ff;
const MAGENTA = 0xff2a6d;
const GREEN   = 0x05ffa1;
const YELLOW  = 0xfcee0a;
const VOID_BG = 0x0a0a0f;

const BLOCK_W = 60, BLOCK_H = 50;
const GRID_COLS = 8, GRID_ROWS = 6;
const ROAD_W = 10, SIDEWALK_W = 3;
const CITY_W = GRID_COLS * (BLOCK_W + ROAD_W) + ROAD_W;
const CITY_H = GRID_ROWS * (BLOCK_H + ROAD_W) + ROAD_W;

const NUM_PEDESTRIANS = 25;
const NUM_CARS = 12;
const NUM_PROTESTORS = 20;
const NUM_POLICE = 10;

// Central plaza — center of the city
const PLAZA_X = CITY_W / 2;
const PLAZA_Z = CITY_H / 2;

// Building type colors (Minecraft style)
const BLDG_HOUSE   = 0x8B6914; // brown
const BLDG_OFFICE  = 0x888888; // grey
const BLDG_SHOP    = 0xD2B48C; // beige/tan
const BLDG_POLICE  = 0x4466AA; // blue
const BLDG_ROOF    = 0x333333; // dark roof tops

// =========================================================================
// State
// =========================================================================
let riotMode = false;
let nightMode = false;
let chaseCam = false;
let chaseTarget = null;
let simTime = 8.0;
let riotPhase = 'PEACEFUL'; // PEACEFUL, TENSION, RIOT, DISPERSAL
let riotTimer = 0;

let molotovCount = 0;
let teargasCount = 0;
let rockCount = 0;
let arrestCount = 0;
let injuryCount = 0;

const pedestrians = [];
const cars = [];
const protestors = [];
const police = [];
const tracers = [];
const explosions = [];
const muzzleFlashes = [];
const smokeParticles = [];
const buildings = [];
const streetLamps = [];
const killFeed = [];
const fires = []; // persistent fire lights
const projectiles = []; // arcing rocks/molotovs

const rng = () => Math.random();

// =========================================================================
// Audio
// =========================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playGunshot(x, z) {
  const ctx = ensureAudio();
  const bufSize = ctx.sampleRate * 0.08;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const env = Math.exp(-i / (bufSize * 0.15));
    data[i] = (Math.random() * 2 - 1) * env * 0.4;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.value = 0.12;
  src.connect(gain).connect(ctx.destination);
  src.start();
}

function playExplosion(x, z) {
  const ctx = ensureAudio();
  const dur = 0.5;
  const bufSize = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const t = i / ctx.sampleRate;
    const env = Math.exp(-t * 6);
    const low = Math.sin(2 * Math.PI * 40 * t + Math.sin(2 * Math.PI * 15 * t) * 3);
    data[i] = (low * 0.6 + (Math.random() * 2 - 1) * 0.4) * env * 0.3;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.value = 0.15;
  src.connect(gain).connect(ctx.destination);
  src.start();
}

function playHiss(x, z) {
  const ctx = ensureAudio();
  const dur = 0.8;
  const bufSize = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const t = i / ctx.sampleRate;
    const env = Math.exp(-t * 2);
    data[i] = (Math.random() * 2 - 1) * env * 0.15;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.value = 0.1;
  src.connect(gain).connect(ctx.destination);
  src.start();
}

// =========================================================================
// Scene Setup
// =========================================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(VOID_BG);
scene.fog = new THREE.FogExp2(VOID_BG, 0.002);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.5, 2000);
camera.position.set(CITY_W / 2 + 150, 250, CITY_H / 2 + 250);
camera.lookAt(CITY_W / 2, 0, CITY_H / 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.prepend(renderer.domElement);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(CITY_W / 2, 0, CITY_H / 2);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 30;
controls.maxDistance = 800;
controls.maxPolarAngle = Math.PI / 2.1; // don't go below ground
controls.update();

// Lights — BRIGHT
const ambientLight = new THREE.AmbientLight(0x8899bb, 0.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
sunLight.position.set(200, 400, 100);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -CITY_W;
sunLight.shadow.camera.right = CITY_W;
sunLight.shadow.camera.top = CITY_H;
sunLight.shadow.camera.bottom = -CITY_H;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x00f0ff, 0x112244, 0.5);
scene.add(hemiLight);

// =========================================================================
// City Generation — Minecraft Style
// =========================================================================
const groundGeo = new THREE.PlaneGeometry(CITY_W + 100, CITY_H + 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(CITY_W / 2, -0.05, CITY_H / 2);
ground.receiveShadow = true;
scene.add(ground);

// Road material — visible grey
const roadMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.85 });
const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.8 });

// Roads — horizontal
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = row * (BLOCK_H + ROAD_W) + ROAD_W / 2;
  const geo = new THREE.PlaneGeometry(CITY_W, ROAD_W);
  const road = new THREE.Mesh(geo, roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.set(CITY_W / 2, 0.01, z);
  road.receiveShadow = true;
  scene.add(road);

  // Center line — yellow dashes
  const lineGeo = new THREE.PlaneGeometry(CITY_W, 0.4);
  const lineMat = new THREE.MeshBasicMaterial({ color: 0xaaaa33 });
  const line = new THREE.Mesh(lineGeo, lineMat);
  line.rotation.x = -Math.PI / 2;
  line.position.set(CITY_W / 2, 0.02, z);
  scene.add(line);
}

// Roads — vertical
for (let col = 0; col <= GRID_COLS; col++) {
  const x = col * (BLOCK_W + ROAD_W) + ROAD_W / 2;
  const geo = new THREE.PlaneGeometry(ROAD_W, CITY_H);
  const road = new THREE.Mesh(geo, roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.set(x, 0.01, CITY_H / 2);
  road.receiveShadow = true;
  scene.add(road);
}

// Sidewalks
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = row * (BLOCK_H + ROAD_W) + ROAD_W / 2;
  for (const side of [-1, 1]) {
    const sz = z + side * (ROAD_W / 2 + SIDEWALK_W / 2);
    const geo = new THREE.PlaneGeometry(CITY_W, SIDEWALK_W);
    const sw = new THREE.Mesh(geo, sidewalkMat);
    sw.rotation.x = -Math.PI / 2;
    sw.position.set(CITY_W / 2, 0.05, sz);
    scene.add(sw);
  }
}
for (let col = 0; col <= GRID_COLS; col++) {
  const x = col * (BLOCK_W + ROAD_W) + ROAD_W / 2;
  for (const side of [-1, 1]) {
    const sx = x + side * (ROAD_W / 2 + SIDEWALK_W / 2);
    const geo = new THREE.PlaneGeometry(SIDEWALK_W, CITY_H);
    const sw = new THREE.Mesh(geo, sidewalkMat);
    sw.rotation.x = -Math.PI / 2;
    sw.position.set(sx, 0.05, CITY_H / 2);
    scene.add(sw);
  }
}

// Minecraft-style building materials
function makeBuildingMat(color) {
  return new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.0 });
}

const roofMat = new THREE.MeshStandardMaterial({ color: BLDG_ROOF, roughness: 0.9 });
const doorMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
const windowGlowMat = new THREE.MeshBasicMaterial({ color: 0xffdd66, transparent: true, opacity: 0.8 });

function createMinecraftBuilding(x, z, w, d, h, type) {
  const group = new THREE.Group();

  // Main body
  let color;
  switch (type) {
    case 'house':  color = BLDG_HOUSE; break;
    case 'office': color = BLDG_OFFICE; break;
    case 'shop':   color = BLDG_SHOP; break;
    case 'police': color = BLDG_POLICE; break;
    default:       color = BLDG_OFFICE;
  }

  const bodyGeo = new THREE.BoxGeometry(w, h, d);
  const bodyMat = makeBuildingMat(color);
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.set(0, h / 2, 0);
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Dark roof cap
  const roofGeo = new THREE.BoxGeometry(w + 0.2, 0.5, d + 0.2);
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.set(0, h + 0.25, 0);
  roof.castShadow = true;
  group.add(roof);

  // Door opening (dark rectangle at ground level)
  const doorW = Math.min(2, w * 0.3);
  const doorH = Math.min(3, h * 0.5);
  const doorGeo = new THREE.PlaneGeometry(doorW, doorH);
  const door = new THREE.Mesh(doorGeo, doorMat);
  door.position.set(0, doorH / 2, d / 2 + 0.05);
  group.add(door);

  // Glowing windows (emissive)
  const floors = Math.floor(h / 4);
  for (let f = 1; f <= floors; f++) {
    const wy = f * 3.5;
    if (wy > h - 1) break;
    // windows on front and back
    for (const side of [1, -1]) {
      const numWins = Math.floor(w / 4);
      for (let wi = 0; wi < numWins; wi++) {
        if (rng() < 0.3) continue; // some windows dark
        const wx = -w / 2 + 2 + wi * 4;
        const winGeo = new THREE.PlaneGeometry(1.5, 1.2);
        const winMat = new THREE.MeshBasicMaterial({
          color: rng() < 0.7 ? 0xffdd66 : 0x66ddff,
          transparent: true,
          opacity: 0.7 + rng() * 0.3
        });
        const win = new THREE.Mesh(winGeo, winMat);
        win.position.set(wx, wy, side * (d / 2 + 0.05));
        if (side < 0) win.rotation.y = Math.PI;
        group.add(win);
      }
    }
    // windows on left and right sides
    for (const side of [1, -1]) {
      const numWins = Math.floor(d / 4);
      for (let wi = 0; wi < numWins; wi++) {
        if (rng() < 0.4) continue;
        const wz = -d / 2 + 2 + wi * 4;
        const winGeo = new THREE.PlaneGeometry(1.5, 1.2);
        const winMat = new THREE.MeshBasicMaterial({
          color: rng() < 0.7 ? 0xffdd66 : 0x66ddff,
          transparent: true,
          opacity: 0.7 + rng() * 0.3
        });
        const win = new THREE.Mesh(winGeo, winMat);
        win.position.set(side * (w / 2 + 0.05), wy, wz);
        win.rotation.y = side * Math.PI / 2;
        group.add(win);
      }
    }
  }

  group.position.set(x, 0, z);
  scene.add(group);
  return { group, h, type, x, z, w, d };
}

// Place buildings in each block
for (let row = 0; row < GRID_ROWS; row++) {
  for (let col = 0; col < GRID_COLS; col++) {
    const bx = col * (BLOCK_W + ROAD_W) + ROAD_W + BLOCK_W / 2;
    const bz = row * (BLOCK_H + ROAD_W) + ROAD_W + BLOCK_H / 2;

    // Skip center block for plaza
    const centerCol = Math.floor(GRID_COLS / 2);
    const centerRow = Math.floor(GRID_ROWS / 2);
    if (col === centerCol && row === centerRow) {
      // Central plaza — open space with a fountain
      const plazaGeo = new THREE.PlaneGeometry(BLOCK_W - 4, BLOCK_H - 4);
      const plazaMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.7 });
      const plaza = new THREE.Mesh(plazaGeo, plazaMat);
      plaza.rotation.x = -Math.PI / 2;
      plaza.position.set(bx, 0.06, bz);
      scene.add(plaza);

      // Fountain
      const fountGeo = new THREE.CylinderGeometry(3, 4, 1.5, 12);
      const fountMat = new THREE.MeshStandardMaterial({ color: 0x555566 });
      const fount = new THREE.Mesh(fountGeo, fountMat);
      fount.position.set(bx, 0.75, bz);
      fount.castShadow = true;
      scene.add(fount);
      continue;
    }

    // 2-4 buildings per block
    const count = 2 + Math.floor(rng() * 3);
    for (let b = 0; b < count; b++) {
      const typeRoll = rng();
      let type;
      // One police station near center
      if (col === centerCol + 1 && row === centerRow && b === 0) {
        type = 'police';
      } else if (typeRoll < 0.35) {
        type = 'house';
      } else if (typeRoll < 0.65) {
        type = 'office';
      } else {
        type = 'shop';
      }

      const isOffice = type === 'office';
      const h = isOffice ? 15 + rng() * 30 : 6 + rng() * 10;
      const w = 8 + rng() * 12;
      const d = 8 + rng() * 12;
      const ox = (rng() - 0.5) * (BLOCK_W - w - 4);
      const oz = (rng() - 0.5) * (BLOCK_H - d - 4);

      const bldg = createMinecraftBuilding(bx + ox, bz + oz, w, d, h, type);
      buildings.push(bldg);
    }

    // Trees in gaps
    const numTrees = Math.floor(rng() * 3);
    for (let t = 0; t < numTrees; t++) {
      const tx = bx + (rng() - 0.5) * BLOCK_W * 0.8;
      const tz = bz + (rng() - 0.5) * BLOCK_H * 0.8;
      // Minecraft tree = brown box trunk + green cube foliage
      const trunkGeo = new THREE.BoxGeometry(1, 5, 1);
      const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5D3A1A });
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.set(tx, 2.5, tz);
      trunk.castShadow = true;
      scene.add(trunk);

      const leafGeo = new THREE.BoxGeometry(4, 4, 4);
      const leafMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
      const leaf = new THREE.Mesh(leafGeo, leafMat);
      leaf.position.set(tx, 6, tz);
      leaf.castShadow = true;
      scene.add(leaf);
    }
  }
}

// Street lamps
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = row * (BLOCK_H + ROAD_W) + ROAD_W / 2;
  for (let col = 0; col <= GRID_COLS; col++) {
    const x = col * (BLOCK_W + ROAD_W) + ROAD_W / 2;
    const postGeo = new THREE.BoxGeometry(0.3, 7, 0.3);
    const postMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set(x + 4, 3.5, z + 4);
    scene.add(post);

    const headGeo = new THREE.BoxGeometry(1.2, 0.5, 1.2);
    const headMat = new THREE.MeshBasicMaterial({ color: 0xffdd88, transparent: true, opacity: 0.8 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.set(x + 4, 7.2, z + 4);
    scene.add(head);

    const lampLight = new THREE.PointLight(0xffdd88, 0.4, 30);
    lampLight.position.set(x + 4, 7, z + 4);
    scene.add(lampLight);
    streetLamps.push({ light: lampLight, head });
  }
}

// =========================================================================
// Helpers
// =========================================================================
function randomRoadPos() {
  if (rng() < 0.5) {
    const row = Math.floor(rng() * (GRID_ROWS + 1));
    const z = row * (BLOCK_H + ROAD_W) + ROAD_W / 2;
    const x = rng() * CITY_W;
    return { x, z };
  } else {
    const col = Math.floor(rng() * (GRID_COLS + 1));
    const x = col * (BLOCK_W + ROAD_W) + ROAD_W / 2;
    const z = rng() * CITY_H;
    return { x, z };
  }
}

function randomSidewalkPos() {
  const row = Math.floor(rng() * (GRID_ROWS + 1));
  const z = row * (BLOCK_H + ROAD_W) + ROAD_W / 2 + (rng() < 0.5 ? 1 : -1) * (ROAD_W / 2 + 1.5);
  const x = rng() * CITY_W;
  return { x, z };
}

function nearestIntersection(x, z) {
  const col = Math.round((x - ROAD_W / 2) / (BLOCK_W + ROAD_W));
  const row = Math.round((z - ROAD_W / 2) / (BLOCK_H + ROAD_W));
  return {
    x: Math.max(0, Math.min(GRID_COLS, col)) * (BLOCK_W + ROAD_W) + ROAD_W / 2,
    z: Math.max(0, Math.min(GRID_ROWS, row)) * (BLOCK_H + ROAD_W) + ROAD_W / 2
  };
}

function roadPathTo(from, to) {
  const inter = nearestIntersection(to.x, to.z);
  return [
    { x: from.x, z: inter.z },
    { x: inter.x, z: inter.z },
    { x: to.x, z: to.z }
  ];
}

function edgeSpawnPos() {
  const side = Math.floor(rng() * 4);
  switch (side) {
    case 0: return { x: -5, z: rng() * CITY_H };
    case 1: return { x: CITY_W + 5, z: rng() * CITY_H };
    case 2: return { x: rng() * CITY_W, z: -5 };
    default: return { x: rng() * CITY_W, z: CITY_H + 5 };
  }
}

function dist2d(a, b) {
  const dx = a.x - b.x;
  const dz = a.z - b.z;
  return Math.sqrt(dx * dx + dz * dz);
}

// =========================================================================
// Create Minecraft Person (body cube + head cube)
// =========================================================================
function createPerson(bodyColor, headColor, scale = 1.0) {
  const group = new THREE.Group();

  // Body — 1.5m wide, 1.5m tall box
  const bodyGeo = new THREE.BoxGeometry(1.5 * scale, 1.5 * scale, 1.0 * scale);
  const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.7 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 1.0 * scale;
  body.castShadow = true;
  group.add(body);

  // Head — skin-tone cube on top
  const headGeo = new THREE.BoxGeometry(0.8 * scale, 0.8 * scale, 0.8 * scale);
  const headMat = new THREE.MeshStandardMaterial({ color: headColor, roughness: 0.6 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 2.15 * scale;
  head.castShadow = true;
  group.add(head);

  return group;
}

  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color, linewidth: 3, transparent: true, opacity: 1 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

// Arcing projectile (rock or molotov)
function launchProjectile(from, to, type) {
  const geo = new THREE.BoxGeometry(
    type === 'molotov' ? 0.5 : 0.4,
    type === 'molotov' ? 0.8 : 0.4,
    type === 'molotov' ? 0.5 : 0.4
  );
  const color = type === 'molotov' ? 0xff6600 : 0x888888;
  const mat = new THREE.MeshBasicMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(from.x, 2, from.z);
  scene.add(mesh);

  const dx = to.x - from.x;
  const dz = to.z - from.z;
  const dist = Math.sqrt(dx * dx + dz * dz);
  const flightTime = dist / 30; // speed
  const vy = dist * 0.15 + 5; // arc height

  projectiles.push({
    mesh, type,
    startX: from.x, startZ: from.z,
    endX: to.x, endZ: to.z,
    vx: dx / flightTime,
    vz: dz / flightTime,
    vy: vy,
    gravity: vy * 2 / flightTime,
    age: 0,
    flightTime,
  });
}

function addKillFeedEntry(text) {
  killFeed.unshift({ text, age: 0 });
  if (killFeed.length > 10) killFeed.pop();
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    riotMode = !riotMode;
    const banner = document.getElementById('combat-banner');
    banner.textContent = riotMode ? 'RIOT IN PROGRESS' : 'RIOT DISPERSED';
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 2000);

    if (riotMode) {
      ensureAudio();
      riotPhase = 'TENSION';
      riotTimer = 0;
      molotovCount = 0;
      teargasCount = 0;
      rockCount = 0;
      arrestCount = 0;
      injuryCount = 0;
      spawnProtestors();
      spawnPolice();
      addKillFeedEntry('Protest gathering in central plaza');
    } else {
      // Remove riot units
      for (const p of protestors) scene.remove(p.mesh);
      for (const p of police) scene.remove(p.mesh);
      protestors.length = 0;
      police.length = 0;
      riotPhase = 'PEACEFUL';
      // Clear fires
      for (const f of fires) scene.remove(f.light);
      fires.length = 0;
    }
  }
  if (e.code === 'KeyC') {
    chaseCam = !chaseCam;
    if (chaseCam) {
      controls.enabled = false;
      const all = [...pedestrians.filter(p => p.alive), ...protestors.filter(p => p.alive), ...police.filter(p => p.alive)];
      chaseTarget = all.length > 0 ? all[Math.floor(rng() * all.length)] : null;
    } else {
      controls.enabled = true;
    }
  }
  if (e.code === 'KeyN') {
    nightMode = !nightMode;
  }
});

// =========================================================================
// Update Loop
// =========================================================================
let lastTime = performance.now();
let frameCount = 0;
let fpsDisplay = 0;
let fpsTimer = 0;

function update(dt) {
  // Advance sim time (1 real second = 2 sim minutes)
  simTime += dt * (2 / 60);
  if (simTime >= 24) simTime -= 24;

  const isNight = nightMode || simTime < 6 || simTime > 20;

  // Day/night lighting
  const dayFactor = isNight ? 0.2 : 1.0;
  ambientLight.intensity = 0.3 + dayFactor * 0.4;
  sunLight.intensity = dayFactor * 1.2;
  hemiLight.intensity = 0.3 + dayFactor * 0.3;
  scene.fog.density = isNight ? 0.004 : 0.0015;
  renderer.toneMappingExposure = isNight ? 0.9 : 1.4;

  // Street lamps
  for (const lamp of streetLamps) {
    lamp.light.intensity = isNight ? 1.5 : 0.2;
    lamp.head.material.opacity = isNight ? 1.0 : 0.4;
  }

  // Update pedestrians
  for (const ped of pedestrians) {
    if (!ped.alive) continue;
    const p = ped.mesh.position;

    // If riot, civilians near plaza flee
    if (riotMode && !ped.fleeing) {
      const distToPlaza = dist2d(p, { x: PLAZA_X, z: PLAZA_Z });
      if (distToPlaza < 80 && riotPhase !== 'PEACEFUL') {
        ped.fleeing = true;
        ped.speed = 3 + rng() * 2;
        // Flee to nearest building
        if (buildings.length > 0) {
          const bldg = buildings[Math.floor(rng() * buildings.length)];
          ped.target = { x: bldg.x, z: bldg.z };
        } else {
          ped.target = edgeSpawnPos();
        }
        if (rng() < 0.15) addKillFeedEntry('Civilian fled to building');
      }
    }

    const dx = ped.target.x - p.x;
    const dz = ped.target.z - p.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 2) {
      if (ped.fleeing) {
        ped.alive = false;
        ped.mesh.visible = false;
      } else {
        ped.target = randomSidewalkPos();
      }
    } else {
      const s = ped.speed * dt;
      p.x += (dx / dist) * s;
      p.z += (dz / dist) * s;
      // Face direction
      ped.mesh.rotation.y = Math.atan2(dx, dz);
    }
  }

  // Update cars
  for (const car of cars) {
    if (!car.alive) continue;
    if (car.pauseTimer > 0) { car.pauseTimer -= dt; continue; }

    const g = car.group.position;
    if (car.pathIdx >= car.path.length) {
      const dest = randomRoadPos();
      car.path = roadPathTo({ x: g.x, z: g.z }, dest);
      car.pathIdx = 0;
      car.pauseTimer = 1.0 + rng() * 2.0;
      continue;
    }

    const wp = car.path[car.pathIdx];
    const dx = wp.x - g.x;
    const dz = wp.z - g.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 2) {
      car.pathIdx++;
      if (car.pathIdx < car.path.length && rng() < 0.3) {
        car.pauseTimer = 1.0 + rng() * 2.0;
      }
    } else {
      const s = car.speed * dt;
      g.x += (dx / dist) * s;
      g.z += (dz / dist) * s;
      car.group.rotation.y = Math.atan2(dx, dz) - Math.PI / 2;
    }

    car.headlight.intensity = isNight ? 2 : 0;
  }

  // ---- RIOT ----
  if (riotMode) {
    riotTimer += dt;

    // Phase progression
    if (riotPhase === 'TENSION' && riotTimer > 8) {
      riotPhase = 'RIOT';
      addKillFeedEntry('*** RIOT ERUPTED ***');
    }
    if (riotPhase === 'RIOT' && protestors.filter(p => p.alive && !p.arrested).length < 5) {
      riotPhase = 'DISPERSAL';
      addKillFeedEntry('Crowd dispersing');
    }

    // Update protestors
    for (const pr of protestors) {
      if (!pr.alive || pr.arrested) continue;
      const p = pr.mesh.position;

      if (pr.fleeing) {
        // Flee away from police
        const fleeDir = rng() < 0.5 ? 1 : -1;
        const target = { x: p.x + fleeDir * 50, z: p.z + (rng() - 0.5) * 80 };
        const dx = target.x - p.x;
        const dz = target.z - p.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 1) {
          const s = pr.speed * 1.5 * dt;
          p.x += (dx / dist) * s;
          p.z += (dz / dist) * s;
          pr.mesh.rotation.y = Math.atan2(dx, dz);
        }
        // Leave the map
        if (p.x < -10 || p.x > CITY_W + 10 || p.z < -10 || p.z > CITY_H + 10) {
          pr.alive = false;
          pr.mesh.visible = false;
        }
        continue;
      }

      // Move toward target in plaza
      const dx = pr.target.x - p.x;
      const dz = pr.target.z - p.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 3) {
        pr.target = { x: PLAZA_X + (rng() - 0.5) * 40, z: PLAZA_Z + (rng() - 0.5) * 40 };
      } else {
        const s = pr.speed * dt;
        p.x += (dx / dist) * s;
        p.z += (dz / dist) * s;
        pr.mesh.rotation.y = Math.atan2(dx, dz);
      }

      // Throw rocks and molotovs during RIOT phase
      if (riotPhase === 'RIOT') {
        pr.throwTimer -= dt;
        if (pr.throwTimer <= 0) {
          pr.throwTimer = 2 + rng() * 6;

          // Find nearest police
          let nearest = null, nearDist = Infinity;
          for (const pol of police) {
            if (!pol.alive) continue;
            const dd = dist2d(p, pol.mesh.position);
            if (dd < nearDist && dd < 60) { nearDist = dd; nearest = pol; }
          }

          if (nearest) {
            const isMolotov = rng() < 0.2;
            if (isMolotov) {
              launchProjectile(
                { x: p.x, z: p.z },
                { x: nearest.mesh.position.x + (rng() - 0.5) * 10, z: nearest.mesh.position.z + (rng() - 0.5) * 10 },
                'molotov'
              );
              molotovCount++;
              addKillFeedEntry('Protestor threw molotov!');
            } else {
              launchProjectile(
                { x: p.x, z: p.z },
                { x: nearest.mesh.position.x + (rng() - 0.5) * 8, z: nearest.mesh.position.z + (rng() - 0.5) * 8 },
                'rock'
              );
              rockCount++;
              if (rng() < 0.3) addKillFeedEntry('Protestor threw rock');
              // Rock hit chance
              if (rng() < 0.1) {
                nearest.health -= 0.1;
                injuryCount++;
                if (rng() < 0.3) addKillFeedEntry('Police officer hit by rock');
              }
            }
          }
        }

        // Some protestors scatter randomly
        if (rng() < 0.003) {
          pr.fleeing = true;
          pr.speed = 3 + rng() * 2;
        }
      }
    }

    // Update police
    for (const pol of police) {
      if (!pol.alive) continue;
      const p = pol.mesh.position;

      if (pol.holdLine) {
        // Hold formation, drift back to line
        const dx = pol.lineX - p.x;
        const dz = pol.lineZ - p.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 2) {
          const s = pol.speed * 0.5 * dt;
          p.x += (dx / dist) * s;
          p.z += (dz / dist) * s;
        }
        // Face the plaza
        pol.mesh.rotation.y = Math.atan2(PLAZA_X - p.x, PLAZA_Z - p.z);
      }

      // Fire tear gas and rubber bullets during RIOT
      if (riotPhase === 'RIOT' || riotPhase === 'DISPERSAL') {
        pol.fireTimer -= dt;
        if (pol.fireTimer <= 0) {
          pol.fireTimer = 2 + rng() * 5;

          // Find nearest protestor
          let nearest = null, nearDist = Infinity;
          for (const pr of protestors) {
            if (!pr.alive || pr.arrested || pr.fleeing) continue;
            const dd = dist2d(p, pr.mesh.position);
            if (dd < nearDist && dd < 80) { nearDist = dd; nearest = pr; }
          }

          if (nearest) {
            const isTearGas = rng() < 0.25;
            if (isTearGas) {
              // Tear gas canister
              const impactX = nearest.mesh.position.x + (rng() - 0.5) * 15;
              const impactZ = nearest.mesh.position.z + (rng() - 0.5) * 15;
              createTearGasCloud({ x: impactX, z: impactZ });
              teargasCount++;
              addKillFeedEntry('Police fired tear gas');

              // Tear gas causes protestors nearby to scatter
              for (const pr of protestors) {
                if (!pr.alive || pr.arrested || pr.fleeing) continue;
                const dd = dist2d(pr.mesh.position, { x: impactX, z: impactZ });
                if (dd < 20 && rng() < 0.4) {
                  pr.fleeing = true;
                  pr.speed = 3 + rng() * 2;
                }
              }
            } else {
              // Rubber bullet — cyan tracer
              createTracer(
                { x: p.x, z: p.z },
                { x: nearest.mesh.position.x, z: nearest.mesh.position.z },
                CYAN, 0.25
              );
              createMuzzleFlash({ x: p.x, z: p.z });
              playGunshot(p.x, p.z);

              // Hit chance
              if (rng() < 0.15) {
                nearest.health -= 0.3;
                createHitEffect({ x: nearest.mesh.position.x, z: nearest.mesh.position.z });
                injuryCount++;

                if (nearest.health <= 0) {
                  // Arrested / incapacitated
                  nearest.arrested = true;
                  nearest.mesh.rotation.z = Math.PI / 2;
                  nearest.mesh.position.y = -0.5;
                  arrestCount++;
                  addKillFeedEntry('Protestor arrested');
                } else {
                  // Hit but not down — might flee
                  if (rng() < 0.5) {
                    nearest.fleeing = true;
                    nearest.speed = 3 + rng() * 2;
                    addKillFeedEntry('Protestor hit, fleeing');
                  }
                }
              }
            }
          }
        }
      }
    }
  }

  // Update projectiles (arcing rocks/molotovs)
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.age += dt;
    const t = proj.age;

    proj.mesh.position.x = proj.startX + proj.vx * t;
    proj.mesh.position.z = proj.startZ + proj.vz * t;
    proj.mesh.position.y = 2 + proj.vy * t - 0.5 * proj.gravity * t * t;

    // Spin
    proj.mesh.rotation.x += dt * 5;
    proj.mesh.rotation.z += dt * 3;

    // Molotov trail
    if (proj.type === 'molotov') {
      if (rng() < 0.3) {
        const tGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
        const tMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.8 });
        const trail = new THREE.Mesh(tGeo, tMat);
        trail.position.copy(proj.mesh.position);
        scene.add(trail);
        smokeParticles.push({ mesh: trail, vy: 1, life: 0.5 });
      }
    }

    // Impact
    if (proj.mesh.position.y <= 0 || proj.age > proj.flightTime * 1.5) {
      const impactPos = { x: proj.mesh.position.x, z: proj.mesh.position.z };
      scene.remove(proj.mesh);

      if (proj.type === 'molotov') {
        createExplosion(impactPos);
        createFire(impactPos);
        createSmoke(impactPos);
        playExplosion(impactPos.x, impactPos.z);
      }

      projectiles.splice(i, 1);
    }
  }

  // Update effects
  for (let i = tracers.length - 1; i >= 0; i--) {
    tracers[i].life -= dt;
    tracers[i].line.material.opacity = Math.max(0, tracers[i].life / tracers[i].maxLife);
    if (tracers[i].life <= 0) {
      scene.remove(tracers[i].line);
      tracers[i].line.geometry.dispose();
      tracers[i].line.material.dispose();
      tracers.splice(i, 1);
    }
  }

  for (let i = muzzleFlashes.length - 1; i >= 0; i--) {
    muzzleFlashes[i].life -= dt;
    if (muzzleFlashes[i].life <= 0) {
      scene.remove(muzzleFlashes[i].light);
      muzzleFlashes.splice(i, 1);
    }
  }

  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.age += dt;
    const t = ex.age / ex.life;
    ex.core.scale.setScalar(1 + t * 6);
    ex.core.material.opacity = Math.max(0, 1 - t);
    for (const p of ex.parts) {
      p.mesh.position.x += p.vel.x * dt;
      p.mesh.position.y += p.vel.y * dt;
      p.mesh.position.z += p.vel.z * dt;
      p.vel.y -= 15 * dt;
      p.mesh.material.opacity = Math.max(0, 1 - t);
      // Spin debris
      p.mesh.rotation.x += dt * 3;
      p.mesh.rotation.z += dt * 2;
    }
    if (ex.age >= ex.life) {
      scene.remove(ex.group);
      explosions.splice(i, 1);
    }
  }

  for (let i = smokeParticles.length - 1; i >= 0; i--) {
    const s = smokeParticles[i];
    s.mesh.position.y += s.vy * dt;
    if (s.isTearGas) {
      // Tear gas expands more, drifts
      s.mesh.scale.multiplyScalar(1 + dt * 0.15);
      s.mesh.position.x += (rng() - 0.5) * dt * 2;
      s.mesh.position.z += (rng() - 0.5) * dt * 2;
    } else {
      s.mesh.scale.multiplyScalar(1 + dt * 0.3);
    }
    s.life -= dt;
    s.mesh.material.opacity = Math.max(0, s.life * 0.12);
    if (s.life <= 0) {
      scene.remove(s.mesh);
      s.mesh.geometry.dispose();
      s.mesh.material.dispose();
      smokeParticles.splice(i, 1);
    }
  }

  // Update persistent fires
  for (let i = fires.length - 1; i >= 0; i--) {
    const f = fires[i];
    f.age += dt;
    // Flicker
    f.light.intensity = 2 + Math.sin(f.age * 10) * 1.5 + rng() * 0.5;
    f.light.color.setHex(rng() < 0.3 ? 0xff4400 : 0xff8800);

    // Spawn fire particles periodically
    if (rng() < 0.05) {
      const fGeo = new THREE.BoxGeometry(0.3, 0.5, 0.3);
      const fMat = new THREE.MeshBasicMaterial({
        color: [0xff4400, 0xff8800, 0xffaa00][Math.floor(rng() * 3)],
        transparent: true, opacity: 0.8
      });
      const fm = new THREE.Mesh(fGeo, fMat);
      fm.position.set(f.x + (rng() - 0.5) * 3, 0.5, f.z + (rng() - 0.5) * 3);
      scene.add(fm);
      smokeParticles.push({ mesh: fm, vy: 1 + rng() * 2, life: 1 + rng() * 2 });
    }

    if (f.age >= f.life) {
      scene.remove(f.light);
      fires.splice(i, 1);
    }
  }

  // Camera
  if (chaseCam && chaseTarget) {
    const tp = chaseTarget.mesh.position;
    camera.position.lerp(new THREE.Vector3(tp.x - 15, 20, tp.z + 15), 0.05);
    camera.lookAt(tp);
  } else {
    controls.update();
  }
}

// =========================================================================
// HUD
// =========================================================================
function updateHUD() {
  const hours = Math.floor(simTime);
  const mins = Math.floor((simTime - hours) * 60);
  document.getElementById('clock').textContent =
    `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;

  document.getElementById('civ-count').textContent =
    pedestrians.filter(p => p.alive).length + cars.filter(c => c.alive).length;
  document.getElementById('protestor-count').textContent = protestors.filter(p => p.alive && !p.arrested).length;
  document.getElementById('police-count').textContent = police.filter(p => p.alive).length;
  document.getElementById('arrest-count').textContent = arrestCount;

  document.getElementById('molotov-count').textContent = molotovCount;
  document.getElementById('teargas-count').textContent = teargasCount;
  document.getElementById('rock-count').textContent = rockCount;
  document.getElementById('injury-count').textContent = injuryCount;

  // Phase indicator
  const phaseEl = document.getElementById('phase-indicator');
  phaseEl.textContent = riotPhase;
  phaseEl.className = riotPhase === 'RIOT' ? 'riot' :
                      riotPhase === 'TENSION' ? 'tension' :
                      riotPhase === 'DISPERSAL' ? 'dispersal' : '';

  // Kill feed
  const feed = document.getElementById('kill-feed');
  feed.innerHTML = killFeed.map((k) => {
    k.age += 1 / 60;
    const cls = k.age > 5 ? 'kill-entry fade' : 'kill-entry';
    let color = '#fcee0a';
    if (k.text.includes('Police')) color = '#00f0ff';
    if (k.text.includes('Protestor')) color = '#05ffa1';
    if (k.text.includes('molotov') || k.text.includes('RIOT')) color = '#ff2a6d';
    if (k.text.includes('Civilian')) color = '#fcee0a';
    return `<div class="${cls}" style="color:${color}">${k.text}</div>`;
  }).join('');

  while (killFeed.length > 0 && killFeed[killFeed.length - 1].age > 12) killFeed.pop();
}

// =========================================================================
// Main Loop
// =========================================================================
function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  // FPS
  frameCount++;
  fpsTimer += dt;
  if (fpsTimer >= 0.5) {
    fpsDisplay = Math.round(frameCount / fpsTimer);
    frameCount = 0;
    fpsTimer = 0;
    document.getElementById('fps').textContent = `${fpsDisplay} FPS`;
  }

  update(dt);
  updateHUD();
  renderer.render(scene, camera);
}

animate();
</script>
