<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as YUKA from 'yuka';
import { idmAcceleration, ballisticUpdate, roadToWorld, findLeader, IDM_DEFAULTS } from './js/sim/idm.js';
import { RoadNetwork, bezierPosition, bezierTangent, tangentToAngle } from './js/sim/road-network.js';
import { TrafficControllerManager } from './js/sim/traffic-controller.js';
import { decideLaneChange, createLaneChangeState, updateLaneChange, MOBIL_DEFAULTS } from './js/sim/mobil.js';
import { SimClock, ScheduleExecutor } from './js/sim/schedule-executor.js';
import { ProtestEngine } from './js/sim/protest-engine.js';
import { SensorBridge, generateBleMac, generateTpmsId } from './js/sim/sensor-bridge.js';
import { createCar, tickCar, resolveOverlaps } from './js/sim/car-controller.js';

// ============================================================
// CITY GRID CONSTANTS
// ============================================================
const BLOCK_W = 60, BLOCK_H = 50, ROAD_W = 16;
const GRID_COLS = 8, GRID_ROWS = 6;
const CITY_W = GRID_COLS * (BLOCK_W + ROAD_W) + ROAD_W;
const CITY_H = GRID_ROWS * (BLOCK_H + ROAD_W) + ROAD_W;
const CENTER_COL = 4, CENTER_ROW = 3;

// Road structure dimensions
const SIDEWALK_W = 2;       // sidewalk width on each side
const CURB_W = 0.15;        // visual curb thickness
const LANE_W = 3;           // single lane width
const NUM_LANES = 2;        // lanes per direction
const ROAD_SURFACE_W = LANE_W * NUM_LANES * 2; // 12m driving surface
const CROSSWALK_W = 3;      // crosswalk strip width

// Heights (Y)
const Y_ROAD = 0.01;
const Y_SIDEWALK = 0.06;
const Y_CURB = 0.08;
const Y_CROSSWALK = 0.02;
const Y_LANE_MARK = 0.015;
const Y_DEBUG = 0.2;

// Plaza center
const PLAZA_X = CENTER_COL * (BLOCK_W + ROAD_W) + ROAD_W + BLOCK_W / 2;
const PLAZA_Z = CENTER_ROW * (BLOCK_H + ROAD_W) + ROAD_W + BLOCK_H / 2;

// ============================================================
// ZONE TYPES
// ============================================================
const ZONE_TYPES = ['residential', 'commercial', 'office', 'park', 'civic', 'parking'];
const ZONE_COLORS = {
  residential: 0x8B7355,
  commercial: 0x556677,
  office: 0x667788,
  civic: 0x557788,
  park: 0x2a5a2a,
  parking: 0x555555,
  plaza: 0x666666,
};

// Procedural zone assignment per block
const blockZones = [];
const seededRandom = ((seed) => {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
})(42);

for (let row = 0; row < GRID_ROWS; row++) {
  blockZones[row] = [];
  for (let col = 0; col < GRID_COLS; col++) {
    if (col === CENTER_COL && row === CENTER_ROW) {
      blockZones[row][col] = 'plaza';
    } else if (row === 0 || row === GRID_ROWS - 1 || col === 0 || col === GRID_COLS - 1) {
      blockZones[row][col] = 'residential';
    } else {
      blockZones[row][col] = ZONE_TYPES[Math.floor(seededRandom() * ZONE_TYPES.length)];
    }
  }
}

// ============================================================
// THREE.JS SETUP
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 300, 600);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 1000);
camera.position.set(CITY_W / 2, 200, CITY_H + 100);
camera.lookAt(CITY_W / 2, 0, CITY_H / 2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(CITY_W / 2, 0, CITY_H / 2);
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();

// Lighting
scene.add(new THREE.AmbientLight(0x334455, 0.6));
const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
sun.position.set(CITY_W / 2, 150, CITY_H / 3);
sun.castShadow = true;
sun.shadow.camera.left = -CITY_W / 2;
sun.shadow.camera.right = CITY_W / 2;
sun.shadow.camera.top = CITY_H / 2;
sun.shadow.camera.bottom = -CITY_H / 2;
scene.add(sun);

// ============================================================
// CITY GEOMETRY — GROUND
// ============================================================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(CITY_W + 40, CITY_H + 40),
  new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(CITY_W / 2, -0.05, CITY_H / 2);
ground.receiveShadow = true;
scene.add(ground);

// ============================================================
// HELPER: create flat rectangle — batched by color for performance
// ============================================================
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

const _flatRectBatches = {}; // color → [geometry, ...]
let _batchingEnabled = true;

function addFlatRect(x, z, w, h, y, color, opts = {}) {
  if (_batchingEnabled && !opts.transparent) {
    // Batch: collect geometry for later merging
    const key = `${color}_${y.toFixed(3)}_${opts.roughness || 0.8}`;
    if (!_flatRectBatches[key]) {
      _flatRectBatches[key] = { geos: [], color, y, roughness: opts.roughness || 0.8 };
    }
    const geo = new THREE.PlaneGeometry(w, h);
    // Apply rotation and position to geometry directly
    geo.rotateX(-Math.PI / 2);
    geo.translate(x, y, z);
    _flatRectBatches[key].geos.push(geo);
    return null; // no mesh returned during batching
  }
  // Fallback for transparent or non-batched
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: opts.roughness || 0.8,
    ...(opts.transparent ? { transparent: true, opacity: opts.opacity || 0.5 } : {})
  });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x, y, z);
  if (opts.receiveShadow !== false) mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// Call after all static geometry is created to merge batches
function flushFlatRectBatches() {
  let mergedCount = 0;
  for (const key in _flatRectBatches) {
    const batch = _flatRectBatches[key];
    if (batch.geos.length === 0) continue;
    const merged = mergeGeometries(batch.geos, false);
    if (!merged) continue;
    const mat = new THREE.MeshStandardMaterial({ color: batch.color, roughness: batch.roughness });
    const mesh = new THREE.Mesh(merged, mat);
    mesh.receiveShadow = true;
    if (batch.isBuilding) mesh.castShadow = true;
    scene.add(mesh);
    mergedCount += batch.geos.length;
    // Dispose individual geometries
    for (const g of batch.geos) g.dispose();
  }
  console.log(`[Perf] Merged ${mergedCount} geometries into ${Object.keys(_flatRectBatches).length} batches`);
  // Clear batches for next round
  for (const key in _flatRectBatches) delete _flatRectBatches[key];
}

// ============================================================
// ROAD SURFACES, SIDEWALKS, CURBS, LANE MARKINGS, CROSSWALKS
// ============================================================
const intersections = []; // {x, z, col, row} for traffic light placement

// Helper: road center for a given row/col
function hRoadZ(row) { return row * (BLOCK_H + ROAD_W) + ROAD_W / 2; }
function vRoadX(col) { return col * (BLOCK_W + ROAD_W) + ROAD_W / 2; }

// Draw a road segment with lanes, sidewalks, curbs, and lane markings
function drawRoadSegment(cx, cz, length, isHorizontal) {
  // Road surface (dark asphalt)
  const rw = isHorizontal ? length : ROAD_SURFACE_W;
  const rh = isHorizontal ? ROAD_SURFACE_W : length;
  addFlatRect(cx, cz, rw, rh, Y_ROAD, 0x2a2a2a);

  // Sidewalks (slightly raised, lighter)
  const sw = isHorizontal ? length : SIDEWALK_W;
  const sh = isHorizontal ? SIDEWALK_W : length;
  const offset = ROAD_SURFACE_W / 2 + SIDEWALK_W / 2;

  if (isHorizontal) {
    addFlatRect(cx, cz - offset, sw, sh, Y_SIDEWALK, 0x444444);
    addFlatRect(cx, cz + offset, sw, sh, Y_SIDEWALK, 0x444444);
    // Curbs
    addFlatRect(cx, cz - ROAD_SURFACE_W / 2 - CURB_W / 2, length, CURB_W, Y_CURB, 0x666666);
    addFlatRect(cx, cz + ROAD_SURFACE_W / 2 + CURB_W / 2, length, CURB_W, Y_CURB, 0x666666);
  } else {
    addFlatRect(cx - offset, cz, sw, sh, Y_SIDEWALK, 0x444444);
    addFlatRect(cx + offset, cz, sw, sh, Y_SIDEWALK, 0x444444);
    // Curbs
    addFlatRect(cx - ROAD_SURFACE_W / 2 - CURB_W / 2, cz, CURB_W, length, Y_CURB, 0x666666);
    addFlatRect(cx + ROAD_SURFACE_W / 2 + CURB_W / 2, cz, CURB_W, length, Y_CURB, 0x666666);
  }

  // Lane markings
  const DASH_LEN = 2, DASH_GAP = 3, DASH_W_VIS = 0.15;
  const numDashes = Math.floor(length / (DASH_LEN + DASH_GAP));

  for (let d = 0; d < numDashes; d++) {
    const t = -length / 2 + (d + 0.5) * (DASH_LEN + DASH_GAP);

    // Center line (yellow dashed) — between directions
    if (isHorizontal) {
      addFlatRect(cx + t, cz, DASH_LEN, DASH_W_VIS, Y_LANE_MARK, 0xccaa00);
    } else {
      addFlatRect(cx, cz + t, DASH_W_VIS, DASH_LEN, Y_LANE_MARK, 0xccaa00);
    }

    // White dashed between same-direction lanes
    const laneOffset = LANE_W; // between lane 1 and lane 2 in each direction
    if (isHorizontal) {
      addFlatRect(cx + t, cz - laneOffset, DASH_LEN, DASH_W_VIS, Y_LANE_MARK, 0xaaaaaa);
      addFlatRect(cx + t, cz + laneOffset, DASH_LEN, DASH_W_VIS, Y_LANE_MARK, 0xaaaaaa);
    } else {
      addFlatRect(cx - laneOffset, cz + t, DASH_W_VIS, DASH_LEN, Y_LANE_MARK, 0xaaaaaa);
      addFlatRect(cx + laneOffset, cz + t, DASH_W_VIS, DASH_LEN, Y_LANE_MARK, 0xaaaaaa);
    }
  }

  // White solid edge lines
  if (isHorizontal) {
    addFlatRect(cx, cz - ROAD_SURFACE_W / 2 + DASH_W_VIS, length, DASH_W_VIS, Y_LANE_MARK, 0xffffff);
    addFlatRect(cx, cz + ROAD_SURFACE_W / 2 - DASH_W_VIS, length, DASH_W_VIS, Y_LANE_MARK, 0xffffff);
  } else {
    addFlatRect(cx - ROAD_SURFACE_W / 2 + DASH_W_VIS, cz, DASH_W_VIS, length, Y_LANE_MARK, 0xffffff);
    addFlatRect(cx + ROAD_SURFACE_W / 2 - DASH_W_VIS, cz, DASH_W_VIS, length, Y_LANE_MARK, 0xffffff);
  }
}

// Horizontal roads (segments between intersections)
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = hRoadZ(row);
  for (let col = 0; col < GRID_COLS; col++) {
    const x1 = col * (BLOCK_W + ROAD_W) + ROAD_W;
    const x2 = x1 + BLOCK_W;
    drawRoadSegment((x1 + x2) / 2, z, BLOCK_W, true);
  }
}

// Vertical roads (segments between intersections)
for (let col = 0; col <= GRID_COLS; col++) {
  const x = vRoadX(col);
  for (let row = 0; row < GRID_ROWS; row++) {
    const z1 = row * (BLOCK_H + ROAD_W) + ROAD_W;
    const z2 = z1 + BLOCK_H;
    drawRoadSegment(x, (z1 + z2) / 2, BLOCK_H, false);
  }
}

// Intersections — asphalt square + crosswalks
for (let row = 0; row <= GRID_ROWS; row++) {
  for (let col = 0; col <= GRID_COLS; col++) {
    const ix = vRoadX(col);
    const iz = hRoadZ(row);
    intersections.push({ x: ix, z: iz, col, row });

    // Intersection asphalt
    addFlatRect(ix, iz, ROAD_W, ROAD_W, Y_ROAD, 0x2a2a2a);

    // Sidewalk corner pads (the small squares at intersection corners)
    const cornerOff = ROAD_SURFACE_W / 2 + SIDEWALK_W / 2;
    addFlatRect(ix - cornerOff, iz - cornerOff, SIDEWALK_W, SIDEWALK_W, Y_SIDEWALK, 0x444444);
    addFlatRect(ix + cornerOff, iz - cornerOff, SIDEWALK_W, SIDEWALK_W, Y_SIDEWALK, 0x444444);
    addFlatRect(ix - cornerOff, iz + cornerOff, SIDEWALK_W, SIDEWALK_W, Y_SIDEWALK, 0x444444);
    addFlatRect(ix + cornerOff, iz + cornerOff, SIDEWALK_W, SIDEWALK_W, Y_SIDEWALK, 0x444444);

    // 4 crosswalks at each intersection (N, S, E, W)
    const crossOff = ROAD_SURFACE_W / 2 + CROSSWALK_W / 2 - 0.5;
    // North/South crosswalks (cross the horizontal road)
    if (row > 0 || true) {
      drawCrosswalk(ix, iz - crossOff, ROAD_SURFACE_W, CROSSWALK_W, true);
      drawCrosswalk(ix, iz + crossOff, ROAD_SURFACE_W, CROSSWALK_W, true);
    }
    // East/West crosswalks (cross the vertical road)
    if (col > 0 || true) {
      drawCrosswalk(ix - crossOff, iz, CROSSWALK_W, ROAD_SURFACE_W, false);
      drawCrosswalk(ix + crossOff, iz, CROSSWALK_W, ROAD_SURFACE_W, false);
    }
  }
}

function drawCrosswalk(cx, cz, w, h, isHorizontal) {
  // White stripes
  const stripeCount = isHorizontal ? Math.floor(w / 1.5) : Math.floor(h / 1.5);
  const stripeW = 0.6;
  for (let i = 0; i < stripeCount; i++) {
    const t = -((stripeCount - 1) * 1.5) / 2 + i * 1.5;
    if (isHorizontal) {
      addFlatRect(cx + t, cz, stripeW, h, Y_CROSSWALK, 0xdddddd);
    } else {
      addFlatRect(cx, cz + t, w, stripeW, Y_CROSSWALK, 0xdddddd);
    }
  }
}

// Flush all batched road/sidewalk/crosswalk geometry into merged meshes
flushFlatRectBatches();

// ============================================================
// ROAD GRAPH — directed graph for vehicle lane following
// ============================================================
const roadGraph = { nodes: {}, edges: [] };

// Add intersection nodes with approach directions
for (const inter of intersections) {
  const id = `${inter.col}_${inter.row}`;
  const isTop = inter.row === 0;
  const isBot = inter.row === GRID_ROWS;
  const isLeft = inter.col === 0;
  const isRight = inter.col === GRID_COLS;
  const approaches = [];
  if (!isTop) approaches.push('N');    // traffic can arrive from the north (row-1)
  if (!isBot) approaches.push('S');    // traffic can arrive from the south (row+1)
  if (!isLeft) approaches.push('W');   // traffic can arrive from the west (col-1)
  if (!isRight) approaches.push('E');  // traffic can arrive from the east (col+1)

  roadGraph.nodes[id] = {
    ...inter, id, approaches,
    type: approaches.length === 4 ? '4-way' :
          approaches.length === 3 ? '3-way' :
          approaches.length === 2 ? '2-way' : '1-way',
  };
}

// Add edges — horizontal road segments between (col,row) and (col+1,row)
for (let row = 0; row <= GRID_ROWS; row++) {
  for (let col = 0; col < GRID_COLS; col++) {
    const from = `${col}_${row}`;
    const to = `${col + 1}_${row}`;
    const z = hRoadZ(row);
    const x1 = vRoadX(col);
    const x2 = vRoadX(col + 1);
    roadGraph.edges.push({
      from, to, horizontal: true,
      lanes: [
        { offset: -LANE_W * 1.5, dir: 1 },   // outer lane going +X (east)
        { offset: -LANE_W * 0.5, dir: 1 },   // inner lane going +X (east)
        { offset: LANE_W * 0.5, dir: -1 },    // inner lane going -X (west)
        { offset: LANE_W * 1.5, dir: -1 },    // outer lane going -X (west)
      ],
      centerZ: z, x1, x2,
    });
  }
}

// Add edges — vertical road segments between (col,row) and (col,row+1)
for (let col = 0; col <= GRID_COLS; col++) {
  for (let row = 0; row < GRID_ROWS; row++) {
    const from = `${col}_${row}`;
    const to = `${col}_${row + 1}`;
    const x = vRoadX(col);
    const z1 = hRoadZ(row);
    const z2 = hRoadZ(row + 1);
    roadGraph.edges.push({
      from, to, horizontal: false,
      lanes: [
        { offset: -LANE_W * 1.5, dir: 1 },   // outer lane going +Z (south)
        { offset: -LANE_W * 0.5, dir: 1 },   // inner lane going +Z (south)
        { offset: LANE_W * 0.5, dir: -1 },    // inner lane going -Z (north)
        { offset: LANE_W * 1.5, dir: -1 },    // outer lane going -Z (north)
      ],
      centerX: x, z1, z2,
    });
  }
}

// Debug group (created early so road graph debug can use it)
let debugMeshVisible = false;
const debugGroup = new THREE.Group();
debugGroup.visible = debugMeshVisible;
scene.add(debugGroup);

// Build adjacency lookup: nodeId -> [edges]
const nodeEdges = {};
for (const id in roadGraph.nodes) nodeEdges[id] = [];
for (const edge of roadGraph.edges) {
  nodeEdges[edge.from].push(edge);
  nodeEdges[edge.to].push(edge);
}

// Debug: add road graph edges to debug overlay
function addRoadGraphDebug() {
  const mat = new THREE.LineBasicMaterial({ color: 0xfcee0a, transparent: true, opacity: 0.4 });
  for (const edge of roadGraph.edges) {
    const fromNode = roadGraph.nodes[edge.from];
    const toNode = roadGraph.nodes[edge.to];
    const pts = [
      new THREE.Vector3(fromNode.x, Y_DEBUG + 0.1, fromNode.z),
      new THREE.Vector3(toNode.x, Y_DEBUG + 0.1, toNode.z),
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geo, mat);
    debugGroup.add(line);
  }
  // Node markers
  const nodeMat = new THREE.MeshBasicMaterial({ color: 0xff2a6d, transparent: true, opacity: 0.6 });
  for (const id in roadGraph.nodes) {
    const n = roadGraph.nodes[id];
    const m = new THREE.Mesh(new THREE.SphereGeometry(1.5, 6, 4), nodeMat);
    m.position.set(n.x, Y_DEBUG + 0.3, n.z);
    debugGroup.add(m);
  }
}
addRoadGraphDebug();

// ============================================================
// AUGMENT ROAD EDGES FOR IDM — add ax,az,bx,bz,length,numLanesPerDir,laneWidth
// ============================================================
for (const edge of roadGraph.edges) {
  if (edge.horizontal) {
    edge.ax = edge.x1;
    edge.az = edge.centerZ;
    edge.bx = edge.x2;
    edge.bz = edge.centerZ;
  } else {
    edge.ax = edge.centerX;
    edge.az = edge.z1;
    edge.bx = edge.centerX;
    edge.bz = edge.z2;
  }
  edge.length = Math.sqrt((edge.bx - edge.ax) ** 2 + (edge.bz - edge.az) ** 2);
  edge.numLanesPerDir = 2;
  edge.laneWidth = LANE_W;
}

// Build modular RoadNetwork (with lane connections for Bezier turns)
const modularRoadNetwork = new RoadNetwork();
modularRoadNetwork.buildFromGrid(GRID_COLS, GRID_ROWS, BLOCK_W, BLOCK_H, ROAD_W, LANE_W, NUM_LANES);
// Cross-reference: ensure modular edge IDs match existing roadGraph edge references
// The modular network edges have IDs like h_col_row and v_col_row
// We need to map them to the existing roadGraph.edges array
for (const edge of roadGraph.edges) {
  // Find matching modular edge and copy the lane connections
  let modId;
  if (edge.horizontal) {
    const fromNode = roadGraph.nodes[edge.from];
    modId = `h_${fromNode.col}_${fromNode.row}`;
  } else {
    const fromNode = roadGraph.nodes[edge.from];
    modId = `v_${fromNode.col}_${fromNode.row}`;
  }
  const modEdge = modularRoadNetwork.edgeById[modId];
  if (modEdge) {
    edge.id = modId; // assign ID for lane connection lookup
  }
}
console.log(`[RoadNetwork] Built modular network: ${Object.keys(modularRoadNetwork.nodes).length} nodes, ${modularRoadNetwork.edges.length} edges, ${Object.keys(modularRoadNetwork.laneConnections).length} lane connections`);

// Build traffic light lookup by intersection ID for fast access
const tlByIntersection = {};

// ============================================================
// TRAFFIC LIGHTS — proper per-intersection controllers
// ============================================================
const TL_GREEN = 0x00ff44;
const TL_YELLOW = 0xffcc00;
const TL_RED = 0xff2200;
const TL_DIM = 0.15;    // dim bulb emissive intensity
const TL_BRIGHT = 1.0;  // active bulb emissive intensity

const trafficLights = [];  // per-intersection controller + visuals

function createLightBulb(color, localY) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 6),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: TL_DIM })
  );
  mesh.position.y = localY;
  return mesh;
}

function createTrafficLightPole(x, z, facingAngle) {
  const group = new THREE.Group();

  // Pole
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 5, 4),
    new THREE.MeshStandardMaterial({ color: 0x333333 })
  );
  pole.position.y = 2.5;
  group.add(pole);

  // Housing
  const housing = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.4, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  housing.position.y = 5.5;
  group.add(housing);

  // Lights: red (top), yellow (mid), green (bottom)
  const lightR = createLightBulb(TL_RED, 5.9);
  const lightY = createLightBulb(TL_YELLOW, 5.5);
  const lightG = createLightBulb(TL_GREEN, 5.1);
  group.add(lightR, lightY, lightG);

  group.position.set(x, 0, z);
  group.rotation.y = facingAngle;
  scene.add(group);

  return { group, lightR, lightY, lightG };
}

function setTrafficLightState(tlVisual, state) {
  // state: 'red', 'yellow', 'green'
  tlVisual.lightR.material.emissiveIntensity = state === 'red' ? TL_BRIGHT : TL_DIM;
  tlVisual.lightY.material.emissiveIntensity = state === 'yellow' ? TL_BRIGHT : TL_DIM;
  tlVisual.lightG.material.emissiveIntensity = state === 'green' ? TL_BRIGHT : TL_DIM;
}

function createTrafficController(node) {
  const approaches = node.approaches;
  const phases = [];

  if (approaches.length === 4) {
    // 4-way: NS green, then EW green
    phases.push({ green: ['N', 'S'], duration: 30 });
    phases.push({ yellow: ['N', 'S'], duration: 3 });
    phases.push({ allRed: true, duration: 2 });
    phases.push({ green: ['E', 'W'], duration: 30 });
    phases.push({ yellow: ['E', 'W'], duration: 3 });
    phases.push({ allRed: true, duration: 2 });
  } else if (approaches.length === 3) {
    // T-junction: find the two that are opposite, then the solo
    const hasN = approaches.includes('N'), hasS = approaches.includes('S');
    const hasE = approaches.includes('E'), hasW = approaches.includes('W');
    if (hasN && hasS) {
      phases.push({ green: ['N', 'S'], duration: 30 });
      phases.push({ yellow: ['N', 'S'], duration: 3 });
      phases.push({ allRed: true, duration: 2 });
      const solo = hasE ? 'E' : 'W';
      phases.push({ green: [solo], duration: 20 });
      phases.push({ yellow: [solo], duration: 3 });
      phases.push({ allRed: true, duration: 2 });
    } else {
      phases.push({ green: ['E', 'W'], duration: 30 });
      phases.push({ yellow: ['E', 'W'], duration: 3 });
      phases.push({ allRed: true, duration: 2 });
      const solo = hasN ? 'N' : 'S';
      phases.push({ green: [solo], duration: 20 });
      phases.push({ yellow: [solo], duration: 3 });
      phases.push({ allRed: true, duration: 2 });
    }
  } else if (approaches.length === 2) {
    // Corner: alternate between the two
    phases.push({ green: [approaches[0]], duration: 30 });
    phases.push({ yellow: [approaches[0]], duration: 3 });
    phases.push({ allRed: true, duration: 2 });
    phases.push({ green: [approaches[1]], duration: 30 });
    phases.push({ yellow: [approaches[1]], duration: 3 });
    phases.push({ allRed: true, duration: 2 });
  } else if (approaches.length === 1) {
    // Dead-end: always green
    phases.push({ green: [approaches[0]], duration: 999 });
  }

  return { phases, currentPhase: 0, timer: (phases[0]?.duration || 30) * (0.5 + seededRandom() * 0.5) };
}

// Approach direction info: where to place the traffic light pole for each approach
// The light faces incoming traffic, placed at the stop line (road edge near intersection)
const approachPlacement = {
  // Approach 'N' means traffic coming FROM north (going south, -Z direction)
  // Stop line is on the north side of intersection, light faces north
  N: { dx: ROAD_SURFACE_W / 2 + 0.5, dz: -ROAD_SURFACE_W / 2 - 1, angle: Math.PI },
  S: { dx: -ROAD_SURFACE_W / 2 - 0.5, dz: ROAD_SURFACE_W / 2 + 1, angle: 0 },
  E: { dx: ROAD_SURFACE_W / 2 + 1, dz: ROAD_SURFACE_W / 2 + 0.5, angle: -Math.PI / 2 },
  W: { dx: -ROAD_SURFACE_W / 2 - 1, dz: -ROAD_SURFACE_W / 2 - 0.5, angle: Math.PI / 2 },
};

for (const id in roadGraph.nodes) {
  const node = roadGraph.nodes[id];
  const controller = createTrafficController(node);

  // Create visual traffic light per approach
  const lights = {};
  for (const approach of node.approaches) {
    const p = approachPlacement[approach];
    lights[approach] = createTrafficLightPole(node.x + p.dx, node.z + p.dz, p.angle);
    setTrafficLightState(lights[approach], 'red'); // start all red
  }

  const tl = {
    intersection: node,
    controller,
    lights,
    // Convenience: which approaches are currently green
    greenApproaches: new Set(),
  };

  // Set initial state
  if (controller.phases.length > 0) {
    const phase = controller.phases[0];
    if (phase.green) {
      for (const a of phase.green) {
        tl.greenApproaches.add(a);
        if (lights[a]) setTrafficLightState(lights[a], 'green');
      }
    }
  }

  trafficLights.push(tl);
  tlByIntersection[node.id] = tl;
}

function updateTrafficLights(dt) {
  for (const tl of trafficLights) {
    const ctrl = tl.controller;
    if (ctrl.phases.length === 0) continue;

    ctrl.timer -= dt;
    if (ctrl.timer <= 0) {
      ctrl.currentPhase = (ctrl.currentPhase + 1) % ctrl.phases.length;
      const phase = ctrl.phases[ctrl.currentPhase];
      ctrl.timer = phase.duration;

      // Reset all to red
      tl.greenApproaches.clear();
      for (const a in tl.lights) setTrafficLightState(tl.lights[a], 'red');

      // Apply phase
      if (phase.green) {
        for (const a of phase.green) {
          tl.greenApproaches.add(a);
          if (tl.lights[a]) setTrafficLightState(tl.lights[a], 'green');
        }
      } else if (phase.yellow) {
        // Yellow: still allow cars to pass (virtual obstacles removed)
        // Cars already close will proceed; new arrivals during all-red will stop
        for (const a of phase.yellow) {
          tl.greenApproaches.add(a); // treat as "still passable"
          if (tl.lights[a]) setTrafficLightState(tl.lights[a], 'yellow');
        }
      }
      // allRed: everything stays red (already set above)
    }
  }
}

// Check if a car approaching from a given direction has a green light
function isGreenForApproach(intersectionId, approachDir) {
  for (const tl of trafficLights) {
    if (tl.intersection.id === intersectionId) {
      return tl.greenApproaches.has(approachDir);
    }
  }
  return true; // default: go
}

      buildings.push({ zone, bx: bx + ox, bz: bz + oz, bw, bd });

      // Door (colored rectangle on face nearest to road)
      const doorColor = zone === 'commercial' ? 0x00aaff : zone === 'civic' ? 0x00f0ff : 0x886644;
      const doorMat = new THREE.MeshStandardMaterial({ color: doorColor, emissive: doorColor, emissiveIntensity: 0.3 });

      // Pick face closest to block edge (nearest sidewalk)
      const distToLeft = (bx + ox) - (col * (BLOCK_W + ROAD_W) + ROAD_W);
      const distToRight = (col * (BLOCK_W + ROAD_W) + ROAD_W + BLOCK_W) - (bx + ox);
      const distToTop = (bz + oz) - (row * (BLOCK_H + ROAD_W) + ROAD_W);
      const distToBot = (row * (BLOCK_H + ROAD_W) + ROAD_W + BLOCK_H) - (bz + oz);
      const minDist = Math.min(distToLeft, distToRight, distToTop, distToBot);

      let doorX, doorZ;
      const door = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2.5), doorMat);
      if (minDist === distToLeft) {
        doorX = bx + ox - bw / 2 - 0.01;

        door.position.set(doorX, 1.25, doorZ);
        door.rotation.y = -Math.PI / 2;

        door.rotation.y = Math.PI / 2;

      buildingEntries.push({ x: doorX, z: doorZ, blockRow: row, blockCol: col, zone });

      );
      pSign.position.set(garageX + 2.5, 2, garageZ);
      scene.add(pSign);
    }
  }
}

function rect(x1, z1, x2, z2) {
  const poly = new YUKA.Polygon();
  poly.fromContour([
    new YUKA.Vector3(x1, 0, z1),
    new YUKA.Vector3(x2, 0, z1),
    new YUKA.Vector3(x2, 0, z2),
    new YUKA.Vector3(x1, 0, z2),
  ]);
  return poly;
}

// --- Pedestrian NavMesh: sidewalks + crosswalks + plaza + building entries ---
const pedPolygons = [];
const debugPedRects = [];
const sidewalkOnlyRects = []; // ONLY sidewalks — not crosswalks, not plaza

function addPedRect(x1, z1, x2, z2, isSidewalk = false) {
  pedPolygons.push(rect(x1, z1, x2, z2));
  debugPedRects.push({ x1, z1, x2, z2 });
  if (isSidewalk) sidewalkOnlyRects.push({ x1, z1, x2, z2 });
}

// Horizontal road segments — from intersection edge to intersection edge
// Uses ROAD_W for z range so they match intersection rects exactly
for (let row = 0; row <= GRID_ROWS; row++) {
  const roadCenterZ = hRoadZ(row);
  const zTop = roadCenterZ - ROAD_W / 2;
  const zBot = roadCenterZ + ROAD_W / 2;

  for (let col = 0; col < GRID_COLS; col++) {
    // Segment between intersection col and col+1
    const x1 = vRoadX(col) + ROAD_W / 2;     // right edge of left intersection
    const x2 = vRoadX(col + 1) - ROAD_W / 2; // left edge of right intersection
    if (x2 > x1) {
      addPedRect(x1, zTop, x2, zTop + SIDEWALK_W, true);  // north sidewalk
      addPedRect(x1, zBot - SIDEWALK_W, x2, zBot, true);  // south sidewalk
    }
  }
}

// Vertical road segments — from intersection edge to intersection edge
for (let col = 0; col <= GRID_COLS; col++) {
  const roadCenterX = vRoadX(col);
  const xLeft = roadCenterX - ROAD_W / 2;
  const xRight = roadCenterX + ROAD_W / 2;

  for (let row = 0; row < GRID_ROWS; row++) {
    const z1 = hRoadZ(row) + ROAD_W / 2;     // bottom edge of top intersection
    const z2 = hRoadZ(row + 1) - ROAD_W / 2; // top edge of bottom intersection
    if (z2 > z1) {
      addPedRect(xLeft, z1, xLeft + SIDEWALK_W, z2, true);  // west sidewalk
      addPedRect(xRight - SIDEWALK_W, z1, xRight, z2, true); // east sidewalk
    }
  }
}

// Intersection crosswalks + corner pads + intersection road surface
for (let row = 0; row <= GRID_ROWS; row++) {
  for (let col = 0; col <= GRID_COLS; col++) {
    const ix = vRoadX(col);
    const iz = hRoadZ(row);
    const halfRoad = ROAD_W / 2; // Use full road corridor width so rects connect

    // Corner sidewalk pads (pedestrian)
    addPedRect(ix - halfRoad, iz - halfRoad,
               ix - halfRoad + SIDEWALK_W, iz - halfRoad + SIDEWALK_W);
    addPedRect(ix + halfRoad - SIDEWALK_W, iz - halfRoad,
               ix + halfRoad, iz - halfRoad + SIDEWALK_W);
    addPedRect(ix - halfRoad, iz + halfRoad - SIDEWALK_W,
               ix - halfRoad + SIDEWALK_W, iz + halfRoad);
    addPedRect(ix + halfRoad - SIDEWALK_W, iz + halfRoad - SIDEWALK_W,
               ix + halfRoad, iz + halfRoad);

    // Crosswalks (pedestrian can cross here)
    const cHalf = ROAD_SURFACE_W / 2;
    addPedRect(ix - cHalf, iz - halfRoad, ix + cHalf, iz - halfRoad + CROSSWALK_W);
    addPedRect(ix - cHalf, iz + halfRoad - CROSSWALK_W, ix + cHalf, iz + halfRoad);
    addPedRect(ix - halfRoad, iz - cHalf, ix - halfRoad + CROSSWALK_W, iz + cHalf);

  }
}

// --- Point generation helpers ---
function randomSidewalkPoint() {
  // Pick a random point on a SIDEWALK only (not crosswalk, not plaza)
  const rects = sidewalkOnlyRects.length > 0 ? sidewalkOnlyRects : debugPedRects;
  const r = rects[Math.floor(Math.random() * rects.length)];
  return new YUKA.Vector3(
    r.x1 + Math.random() * (r.x2 - r.x1),
    0,
    r.z1 + Math.random() * (r.z2 - r.z1)
  );
}

// Pick a random edge and lane position for spawning/destination
function randomEdgeLanePosition() {
  const edge = roadGraph.edges[Math.floor(Math.random() * roadGraph.edges.length)];
  // Pick a lane that goes in a positive direction (index 0 or 1)
  const laneIndex = Math.floor(Math.random() * 4);
  const lane = edge.lanes[laneIndex];
  const t = 0.2 + Math.random() * 0.6; // avoid spawning too close to intersections
  let x, z;
  if (edge.horizontal) {
    x = edge.x1 + t * (edge.x2 - edge.x1);
    z = edge.centerZ + lane.offset;
  } else {
    x = edge.centerX + lane.offset;
    z = edge.z1 + t * (edge.z2 - edge.z1);
  }
  return { pos: new YUKA.Vector3(x, 0, z), edge, laneIndex };
}

function randomBuildingEntry() {
  if (buildingEntries.length === 0) return randomSidewalkPoint();
  const e = buildingEntries[Math.floor(Math.random() * buildingEntries.length)];
  return new YUKA.Vector3(e.x, 0, e.z);
}

function findNavPath(from, to, mesh) {
  try {
    return mesh.findPath(from, to);
  } catch {
    return null;
  }
}

function createPathLine(color) {
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.5 });
  const geo = new THREE.BufferGeometry();
  const line = new THREE.Line(geo, mat);
  line.frustumCulled = false;
  scene.add(line);
  return line;
}

function updatePathLine(line, points) {
  if (!points || points.length === 0) {
    line.geometry.setFromPoints([]);
    return;
  }
  const pts = points.map(p => new THREE.Vector3(p.x, 0.3, p.z));
  line.geometry.dispose();
  line.geometry = new THREE.BufferGeometry().setFromPoints(pts);
}

  );

  mesh.castShadow = true;

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 8, 6),
    new THREE.MeshStandardMaterial({ color })
  );
  head.position.y = 1.45;
  mesh.add(head);

  vehicle.setRenderComponent(mesh, (entity, renderComponent) => {
    renderComponent.position.set(entity.position.x, 1.1, entity.position.z);
    const dir = entity.getDirection(new YUKA.Vector3());
    if (dir.squaredLength() > 0.001) {
      renderComponent.lookAt(
        entity.position.x + dir.x, 1.1, entity.position.z + dir.z
      );
    }
  });

  const followPath = new YUKA.FollowPathBehavior();
  followPath.active = false;
  vehicle.steering.add(followPath);

  const wander = new YUKA.WanderBehavior();
  wander.radius = 2;
  wander.distance = 4;
  wander.jitter = 10;
  wander.active = false;
  vehicle.steering.add(wander);

  entityManager.add(vehicle);

  const npc = {
    id: `npc_${npcs.length}`,
    vehicle, mesh, followPath, wander, type,
    state: STATE.IDLE, stateTimer: 0, moveTime: 0,
    currentPath: null,
    pathLine: createPathLine(color),
    hasStateMachine: !!hasStateMachine,
    protestMode: false,
  };

  assignNPCDestination(npc);
  npcs.push(npc);
  return npc;
}

function assignNPCDestination(npc, target) {
  const dest = target || (Math.random() < 0.4 ? randomBuildingEntry() : randomSidewalkPoint());
  const mesh = npc.protestMode ? combinedNavMesh : pedNavMesh;
  const path = findNavPath(
    new YUKA.Vector3(npc.vehicle.position.x, 0, npc.vehicle.position.z),
    dest, mesh
  );

  if (path && path.length > 1) {
    npc.followPath.path = new YUKA.Path();
    for (const p of path) npc.followPath.path.add(p);
    npc.followPath.active = true;
    npc.wander.active = false;
    npc.currentPath = path;
    npc.moveTime = 0;
    npc.state = STATE.WALK_TO;
    updatePathLine(npc.pathLine, path);
  } else {
    npc.followPath.active = false;
    npc.wander.active = true;
    npc.state = STATE.IDLE;
    npc.stateTimer = 1;
    updatePathLine(npc.pathLine, []);
  }
}

// Find which edge a position is closest to (for route recovery)
function findNearestEdge(x, z) {
  let best = null, bestDist = Infinity;
  for (const edge of roadGraph.edges) {
    let dist;
    if (edge.horizontal) {
      const cx = Math.max(edge.x1, Math.min(edge.x2, x));
      dist = Math.abs(z - edge.centerZ) + Math.abs(x - cx) * 0.1;
    } else {
      const cz = Math.max(edge.z1, Math.min(edge.z2, z));
      dist = Math.abs(x - edge.centerX) + Math.abs(z - cz) * 0.1;
    }
    if (dist < bestDist) { bestDist = dist; best = edge; }
  }
  return best;
}

// Pick a random lane index that goes in a given direction on an edge
function pickLaneForDir(edge, dir) {
  // dir: 1 = positive direction (from→to), -1 = negative (to→from)
  const candidates = [];
  for (let i = 0; i < edge.lanes.length; i++) {
    if (edge.lanes[i].dir === dir) candidates.push(i);
  }
  return candidates.length > 0 ? candidates[Math.floor(Math.random() * candidates.length)] : 0;
}

// Compute the approach direction a car uses when arriving at a node via an edge
function getApproachDir(edge, nodeId) {
  if (edge.horizontal) {
    // Arriving at 'to' node means car was going +X → approaching from West
    if (nodeId === edge.to) return 'W';
    // Arriving at 'from' node means car was going -X → approaching from East
    return 'E';
  } else {
    if (nodeId === edge.to) return 'N';
    return 'S';
  }
}

// Pick next edge at an intersection (random turn)
function pickNextEdge(currentEdge, arrivalNodeId, laneDir) {
  const edges = nodeEdges[arrivalNodeId];
  // Filter: don't U-turn (don't go back on the same edge), and pick edges we can travel on
  const candidates = [];
  for (const e of edges) {
    if (e === currentEdge) continue; // no U-turn
    candidates.push(e);
  }
  if (candidates.length === 0) {
    // Dead end — U-turn allowed
    return { edge: currentEdge, laneDir: -laneDir };
  }
  const next = candidates[Math.floor(Math.random() * candidates.length)];
  // Determine direction on the new edge
  // If we arrived at nodeId, we leave from nodeId
  // If nodeId is next.from, we go dir=1; if nodeId is next.to, we go dir=-1
  const newDir = (arrivalNodeId === next.from) ? 1 : -1;
  return { edge: next, laneDir: newDir };
}

// Compute lane position along an edge at parameter t (0..1 from node 'from' to 'to')
function lanePosition(edge, laneIndex, t) {
  const lane = edge.lanes[laneIndex];
  if (edge.horizontal) {
    return {
      x: edge.x1 + t * (edge.x2 - edge.x1),
      z: edge.centerZ + lane.offset,
    };
  } else {
    return {
      x: edge.centerX + lane.offset,
      z: edge.z1 + t * (edge.z2 - edge.z1),
    };
  }
}

// Compute parameter t for a position on an edge
function edgeParameter(edge, x, z) {
  if (edge.horizontal) {
    const len = edge.x2 - edge.x1;
    return len > 0 ? (x - edge.x1) / len : 0.5;
  } else {
    const len = edge.z2 - edge.z1;
    return len > 0 ? (z - edge.z1) / len : 0.5;
  }
}

// Assign initial route to a car with Dijkstra path planning
function assignCarRoute(car) {
  const spawn = randomEdgeLanePosition();
  car.road = spawn.edge;
  car.lane = spawn.laneIndex;
  car.u = spawn.edge.length * (0.2 + Math.random() * 0.6);
  car.speed = 2 + Math.random() * 4;
  car.acc = 0;
  car.gap = Infinity;
  car.leader = null;
  if (!car.desiredSpeed) car.desiredSpeed = 10 + Math.random() * 4;
  if (!car.idmParams) car.idmParams = { ...IDM_DEFAULTS, v0: car.desiredSpeed };
  if (!car.length) car.length = 4;

  // Plan route to a random destination using Dijkstra
  planCarRoute(car);

  // Snap car to lane position
  const isForward = car.lane < (car.road.numLanesPerDir || 2);
  const roadU = isForward ? car.u : (car.road.length - car.u);
  const world = roadToWorld(car.road, car.lane, roadU);
  car.vehicle.position.set(world.x, 0, world.z);
  car.mesh.position.set(world.x, 0, world.z);
  car.mesh.rotation.y = world.angle;
}

// Plan a Dijkstra route from current position to a nearby destination (2-5 blocks)
function planCarRoute(car) {
  if (!modularRoadNetwork) { car.route = []; return; }

  const isForward = car.lane < (car.road.numLanesPerDir || 2);
  const currentNodeId = isForward ? car.road.to : car.road.from;
  const cn = modularRoadNetwork.nodes[currentNodeId];
  if (!cn) { car.route = []; return; }

  // Pick a destination: any interior intersection, 2+ blocks away
  const nodeIds = Object.keys(modularRoadNetwork.nodes);
  let bestDest = null;

  for (let attempt = 0; attempt < 30; attempt++) {
    const candidateId = nodeIds[Math.floor(Math.random() * nodeIds.length)];
    if (candidateId === currentNodeId) continue;
    const dn = modularRoadNetwork.nodes[candidateId];
    if (!dn) continue;
    const dist = Math.abs(dn.x - cn.x) + Math.abs(dn.z - cn.z);
    if (dist < 60) continue; // at least 1 block away
    bestDest = candidateId;
    break;
  }
  if (!bestDest) bestDest = nodeIds[Math.floor(Math.random() * nodeIds.length)];

  car.destination = bestDest;
  car.route = modularRoadNetwork.findPath(currentNodeId, bestDest);
  car.routeIndex = 0;
  car.routeReplanTimer = 0;

  updateCarRouteLine(car);
}

// Create route line with animated pulse (color-matched dashed)
function createRouteLine(color) {
  const mat = new THREE.LineDashedMaterial({
    color: color || 0x00f0ff, dashSize: 3, gapSize: 2,
    transparent: true, opacity: 0.35,
  });
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, -10, 0), new THREE.Vector3(0, -10, 0)
  ]);
  const line = new THREE.Line(geo, mat);
  line.computeLineDistances();
  scene.add(line);
  return line;
}

// Create pulse arrow that travels along the route line (color matches car)
function createPulseArrow(color) {
  // Cone pointing forward (+Z) as an arrow indicator
  const mat = new THREE.MeshBasicMaterial({ color: color || 0x00f0ff, transparent: true, opacity: 0.85 });
  const cone = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1.5, 4), mat);
  cone.rotation.x = Math.PI / 2; // point forward along Z
  const group = new THREE.Group();
  group.add(cone);
  group.position.y = -10; // hidden initially
  scene.add(group);
  return group;
}

// Create short-term trajectory line (yellow, brighter, closer spacing)
function createTrajectoryLine() {
  const mat = new THREE.LineDashedMaterial({
    color: 0xfcee0a, dashSize: 1.5, gapSize: 0.5,
    transparent: true, opacity: 0.7,
  });

  ]);

  line.computeLineDistances();
  scene.add(line);
  return line;
}

// Update short-term trajectory (shows where car is heading in next ~20m)
function updateCarTrajectory(car) {
  if (!car.trajectoryLine || !car.road) return;

  const points = [];
  const pos = car.mesh.position;
  points.push(new THREE.Vector3(pos.x, 0.4, pos.z));

  if (car.turningState) {
    // Show Bezier arc during turning
    const ts = car.turningState;
    for (let i = 0; i < 8; i++) {
      const t = ts.t + (1 - ts.t) * (i / 7);
      const u = 1 - t;
      const px = u*u*ts.p0.x + 2*u*t*ts.p1.x + t*t*ts.p2.x;
      const pz = u*u*ts.p0.z + 2*u*t*ts.p1.z + t*t*ts.p2.z;
      points.push(new THREE.Vector3(px, 0.4, pz));
    }
  } else {
    // Show straight line along current lane for ~20m
    const isForward = car.lane < (car.road.numLanesPerDir || 2);
    for (let d = 4; d <= 20; d += 4) {
      const futureU = Math.min(car.road.length, car.u + d);
      const roadU = isForward ? futureU : (car.road.length - futureU);
      const w = roadToWorld(car.road, car.lane, roadU);
      points.push(new THREE.Vector3(w.x, 0.4, w.z));
    }
  }

  if (points.length < 2) {
    points.push(new THREE.Vector3(pos.x, -10, pos.z));
  }

  car.trajectoryLine.geometry.dispose();
  car.trajectoryLine.geometry = new THREE.BufferGeometry().setFromPoints(points);
}

// Update route visualization — trace each road edge exactly (no shortcuts through blocks)
function updateCarRouteLine(car) {
  if (!car.routeLine) return;

  const points = [];
  points.push(new THREE.Vector3(car.mesh.position.x, 0.3, car.mesh.position.z));

  if (car.route && car.route.length > 0 && modularRoadNetwork) {
    // Track which node we're coming from
    const isForward = car.lane < (car.road?.numLanesPerDir || 2);
    let prevNodeId = isForward ? car.road?.to : car.road?.from;

    for (let i = car.routeIndex || 0; i < car.route.length; i++) {
      const step = car.route[i];
      const edge = step.edge;
      if (!edge) continue;

      // Each edge goes from node 'from' to node 'to'
      // We need to trace it in the correct direction based on which node we're at
      const fromNode = modularRoadNetwork.nodes[edge.from];
      const toNode = modularRoadNetwork.nodes[edge.to];
      if (!fromNode || !toNode) continue;

      // Add the edge's start point (the node we're coming FROM on this edge)
      if (prevNodeId === edge.from) {
        // We travel from→to: add from point then to point
        points.push(new THREE.Vector3(fromNode.x, 0.3, fromNode.z));
        points.push(new THREE.Vector3(toNode.x, 0.3, toNode.z));
        prevNodeId = edge.to;
      } else {
        // We travel to→from: add to point then from point
        points.push(new THREE.Vector3(toNode.x, 0.3, toNode.z));
        points.push(new THREE.Vector3(fromNode.x, 0.3, fromNode.z));
        prevNodeId = edge.from;
      }
    }
  }

  if (points.length < 2) {
    points.push(new THREE.Vector3(points[0].x, -10, points[0].z));
  }

  car.routeLine.geometry.dispose();
  car.routeLine.geometry = new THREE.BufferGeometry().setFromPoints(points);
  car.routeLine.computeLineDistances();
}

        }
      }
      break;

    case STATE.WALK_TO:
      npc.moveTime += dt;
      if (npc.moveTime > 0.5 && speed < 0.1 && npc.followPath.active) {
        npc.state = STATE.AT_DESTINATION;
        npc.stateTimer = 2 + Math.random() * 3;
        npc.followPath.active = false;
        npc.wander.active = false;
        updatePathLine(npc.pathLine, []);
      }
      break;

    case STATE.AT_DESTINATION:
      npc.wander.active = true;
      npc.vehicle.maxSpeed = 0.5;
      npc.stateTimer -= dt;
      if (npc.stateTimer <= 0) {
        npc.state = STATE.IDLE;
        npc.stateTimer = 0.5;
        npc.wander.active = false;
      }
      break;

    case STATE.PROTEST:
      npc.moveTime += dt;
      if (npc.moveTime > 0.5 && speed < 0.1 && npc.followPath.active) {
        npc.followPath.active = false;
        npc.wander.active = true;
        npc.vehicle.maxSpeed = 1.2;
      }
      if (!npc.protestMode) {
        npc.state = STATE.IDLE;
        npc.stateTimer = 1;
        npc.wander.active = false;
      }
      break;
  }
}

// Simple NPC update (non-state-machine)
function updateSimpleNPC(npc, dt) {
  npc.moveTime += dt;
  const speed = npc.vehicle.velocity.length();
  if (npc.moveTime > 0.5 && speed < 0.1 && npc.followPath.active) {
    npc.stateTimer += dt;
    if (npc.stateTimer > 2) {
      npc.stateTimer = 0;
      assignNPCDestination(npc);
    }
  } else if (speed >= 0.1) {
    npc.stateTimer = 0;
  }
}

// ============================================================
// TRAFFIC LIGHT VIRTUAL OBSTACLES — appear as stopped cars at red lights
// ============================================================
const virtualStopCars = []; // rebuilt each frame

function buildVirtualStopCars() {
  virtualStopCars.length = 0;
  for (const tl of trafficLights) {
    const node = tl.intersection;
    for (const approach of node.approaches) {
      if (tl.greenApproaches.has(approach)) continue; // green = no obstacle

      // Find the road edge and lane that approaches this intersection from this direction
      // and place a virtual stopped car at the stop line
      const edges = nodeEdges[node.id];
      for (const edge of edges) {
        // Determine if this edge + lane combination arrives at this node from this approach
        // u convention: always distance-in-direction-of-travel
        // Forward lanes (0,1): u goes 0..length (A->B), stop near length
        // Backward lanes (2,3): u goes 0..length (B->A), stop near length
        let stopLanes;

        if (approach === 'W' && edge.horizontal && edge.to === node.id) {
          // Traffic from west: going +X (A->B), forward lanes (0,1), stop near end
          stopLanes = [0, 1];
        } else if (approach === 'E' && edge.horizontal && edge.from === node.id) {
          // Traffic from east: going -X (B->A), backward lanes (2,3), stop near end
          stopLanes = [2, 3];
        } else if (approach === 'N' && !edge.horizontal && edge.to === node.id) {
          // Traffic from north: going +Z (A->B), forward lanes (0,1), stop near end
          stopLanes = [0, 1];
        } else if (approach === 'S' && !edge.horizontal && edge.from === node.id) {
          // Traffic from south: going -Z (B->A), backward lanes (2,3), stop near end
          stopLanes = [2, 3];
        } else {
          continue;
        }

        // In our convention, u=length-2 means "2m before reaching the intersection"
        // This works for both forward and backward lanes
        const stopU = edge.length - 2;

        for (const lane of stopLanes) {
          virtualStopCars.push({
            id: `virt_${node.id}_${approach}_${lane}`,
            road: edge,
            lane: lane,
            u: stopU,
            speed: 0,
            length: 1, // small virtual obstacle
            isVirtual: true,
          });
        }
      }
    }
  }
}

// Transition car to next road at intersection — now uses Bezier turning
function transitionToNextRoad(car) {
  const isForward = car.lane < (car.road.numLanesPerDir || 2);
  const arrivalNodeId = isForward ? car.road.to : car.road.from;

  // Follow planned route if available, otherwise random
  let connection = null;
  if (modularRoadNetwork && car.route && car.routeIndex < car.route.length) {
    // Follow route: find connection to next route edge
    const nextStep = car.route[car.routeIndex];
    const connections = modularRoadNetwork.getLaneConnections(car.road.id, car.lane, arrivalNodeId);
    connection = connections.find(c => c.toEdge.id === nextStep.edge.id);
    if (connection) {
      car.routeIndex++;
      // If route complete, plan new destination
      if (car.routeIndex >= car.route.length) {
        planCarRoute(car);
      }
    }
  }
  // Fallback: random connection
  if (!connection && modularRoadNetwork) {
    connection = modularRoadNetwork.pickRandomConnection(car.road.id, car.lane, arrivalNodeId);
  }

  if (connection) {
    // Calculate Bezier turn path
    const entryU = isForward ? car.road.length : 0;
    const entryWorld = roadToWorld(car.road, car.lane, entryU);

    const toIsForward = connection.toLane < (connection.toEdge.numLanesPerDir || 2);
    const exitU = toIsForward ? 0 : connection.toEdge.length;
    const exitWorld = roadToWorld(connection.toEdge, connection.toLane, exitU);

    const ctrl = connection.bezierControl || {
      x: roadGraph.nodes[arrivalNodeId].x,
      z: roadGraph.nodes[arrivalNodeId].z,
    };

    // Estimate arc length for turn duration
    const dx1 = ctrl.x - entryWorld.x, dz1 = ctrl.z - entryWorld.z;
    const dx2 = exitWorld.x - ctrl.x, dz2 = exitWorld.z - ctrl.z;
    const arcLen = Math.sqrt(dx1*dx1 + dz1*dz1) + Math.sqrt(dx2*dx2 + dz2*dz2);
    const turnSpeed = Math.max(2, car.speed * 0.5);
    const duration = Math.max(0.5, Math.min(2.5, arcLen / Math.max(1, turnSpeed)));

    car.turningState = {
      p0: { x: entryWorld.x, z: entryWorld.z },
      p1: ctrl,
      p2: { x: exitWorld.x, z: exitWorld.z },
      t: 0,
      duration,
      toEdge: connection.toEdge,
      toLane: connection.toLane,
      turnSpeed,
      turnType: connection.turnType || 'straight',
    };
  } else {
    // Fallback: original behavior (instant transition)
    const currentLaneDir = isForward ? 1 : -1;
    const result = pickNextEdge(car.road, arrivalNodeId, currentLaneDir);
    car.road = result.edge;
    if (result.laneDir === 1) {
      car.lane = Math.random() < 0.5 ? 0 : 1;
    } else {
      car.lane = Math.random() < 0.5 ? 2 : 3;
    }
    car.u = 0;
  }
}

// Custom findLeader: all cars use u-increases-in-travel-direction convention
function findLeaderCustom(car, allCars) {
  let bestGap = Infinity;
  let leader = null;

  for (const other of allCars) {
    if (other === car) continue;
    if (other.road !== car.road) continue;
    if (other.lane !== car.lane) continue;

    // Leader is ahead = higher u (both forward and backward lanes use this convention)
    const gap = other.u - car.u;
    if (gap > 0 && gap < bestGap) {
      bestGap = gap;
      leader = other;
    }
  }

  // Subtract car lengths for bumper-to-bumper gap
  if (leader) {
    bestGap = Math.max(0.1, bestGap - (car.length || 4) - (leader.length || 4));
  }

  return { leader, gap: bestGap };
}

// IDM-based car update with Bezier intersection turning
function updateCar(car, dt) {
  if (!car.road) {
    assignCarRoute(car);
    return;
  }

  // Handle Bezier turning through intersection
  if (car.turningState) {
    const ts = car.turningState;
    ts.t += dt / ts.duration;
    car.speed = Math.max(2, ts.turnSpeed);
    car.acc = 0;

    if (ts.t >= 1) {
      // Turn complete — enter new road
      car.road = ts.toEdge;
      car.lane = ts.toLane;
      car.u = 0;
      car.turningState = null;
      // Derive world position normally
      const isF = car.lane < (car.road.numLanesPerDir || 2);
      const rU = isF ? car.u : (car.road.length - car.u);
      const w = roadToWorld(car.road, car.lane, rU);
      car.vehicle.position.set(w.x, 0, w.z);
      car.mesh.position.set(w.x, 0, w.z);
      car.mesh.rotation.y = w.angle;
    } else {
      // Position from Bezier curve
      const pos = bezierPosition(ts.p0, ts.p1, ts.p2, ts.t);
      const tang = bezierTangent(ts.p0, ts.p1, ts.p2, ts.t);
      const angle = tangentToAngle(tang);
      car.vehicle.position.set(pos.x, 0, pos.z);
      car.mesh.position.set(pos.x, 0, pos.z);
      car.mesh.rotation.y = angle;
    }
    updatePathLine(car.pathLine, []);
    updateCarTrajectory(car);
    return;
  }

  // Normal driving on a road segment
  // Combine real cars and virtual stop cars for leader finding
  // Emergency vehicles ignore virtual obstacles (run red lights)
  const allCars = car.isEmergency ? cars : cars.concat(virtualStopCars);

  // Find leader: car ahead in same lane, same road, with higher u
  const { leader, gap } = findLeaderCustom(car, allCars);
  car.gap = gap;
  car.leader = leader;

  // Calculate IDM acceleration
  const leaderSpeed = leader ? leader.speed : car.speed;
  car.acc = idmAcceleration(car.speed, gap, leaderSpeed, car.idmParams);

  // Brake lights
  car.brakeLightsOn = car.acc < -0.5;

  // MOBIL lane change (only if not already changing, not turning, not close to intersection)
  if (!car.laneChangeState && !car.turningState && car.road && car.u < car.road.length - 30) {
    const laneChangeResult = decideLaneChange(car, allCars, car.mobilParams);
    if (laneChangeResult.direction && laneChangeResult.targetLane !== null) {
      car.laneChangeState = createLaneChangeState(car.lane, laneChangeResult.targetLane, 2.0);
    }
  }

  // Update lane change animation
  if (car.laneChangeState) {
    const lcResult = updateLaneChange(car.laneChangeState, dt);
    if (lcResult.complete) {
      car.lane = car.laneChangeState.toLane;
      car.laneChangeState = null;
    }
  }

  // Ballistic update
  const updated = ballisticUpdate(car.u, car.speed, car.acc, dt);
  car.u = updated.u;
  car.speed = updated.v;

  // Check for pedestrians in the car's path (treat as obstacles)
  for (const npc of npcs) {
    const npcPos = npc.vehicle.position;
    const carPos = car.mesh.position;
    const dx = npcPos.x - carPos.x, dz = npcPos.z - carPos.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    // Only care about NPCs within 15m ahead in roughly the same direction
    if (dist < 15 && dist > 1) {
      // Check if NPC is ahead (dot product with car forward direction)
      const fwdX = Math.sin(car.mesh.rotation.y);
      const fwdZ = Math.cos(car.mesh.rotation.y);
      const dot = (dx * fwdX + dz * fwdZ) / dist;
      if (dot > 0.5) { // within ~60° cone ahead
        // Lateral distance to centerline
        const lateral = Math.abs(-dx * fwdZ + dz * fwdX);
        if (lateral < 2.5) { // within lane width
          // Treat as leader at distance dist
          const pedGap = Math.max(0.5, dist - car.length);
          if (pedGap < car.gap) {
            car.gap = pedGap;
            car.leader = { id: npc.id, speed: 1.0, length: 0.6 };
            car.acc = idmAcceleration(car.speed, pedGap, 1.0, car.idmParams);
          }
        }
      }
    }
  }

  // Stuck detection
  if (car.speed < 0.1) {
    car.stuckTimer = (car.stuckTimer || 0) + dt;
    if (car.stuckTimer > 30) {
      assignCarRoute(car);
      car.stuckTimer = 0;
      return;
    }
  } else {
    car.stuckTimer = 0;
  }

  // Route replan every 10 seconds
  car.routeReplanTimer = (car.routeReplanTimer || 0) + dt;
  if (car.routeReplanTimer > 10) {
    car.routeReplanTimer = 0;
    updateCarRouteLine(car);
  }

  // Check if reached end of road → start intersection turn
  if (car.u >= car.road.length) {
    car.u = car.road.length; // clamp before transition
    transitionToNextRoad(car);
    if (car.turningState) return; // started a Bezier turn, don't update position
  }

  // Derive world position and orientation from road coordinates
  const isForward = car.lane < (car.road.numLanesPerDir || 2);
  const roadU = isForward ? car.u : (car.road.length - car.u);
  // During lane change, interpolate between lanes for smooth lateral movement
  let effectiveLane = car.lane;
  if (car.laneChangeState && car.laneChangeState.active) {
    const smoothT = 0.5 - 0.5 * Math.cos(car.laneChangeState.t * Math.PI);
    effectiveLane = car.laneChangeState.fromLane + (car.laneChangeState.toLane - car.laneChangeState.fromLane) * smoothT;
  }
  const world = roadToWorld(car.road, effectiveLane, roadU);
  car.vehicle.position.set(world.x, 0, world.z);
  car.mesh.position.set(world.x, 0, world.z);
  car.mesh.rotation.y = world.angle;

  // Update brake light visuals (children indices: 0=body, 1=cabin, 2=hlL, 3=hlR, 4=tlL, 5=tlR, 6=tsFL, 7=tsFR, 8=tsRL, 9=tsRR)
  if (car.mesh.children[4] && car.mesh.children[5]) {
    const intensity = car.brakeLightsOn ? 0.8 : 0.2;
    car.mesh.children[4].material.emissiveIntensity = intensity;
    car.mesh.children[5].material.emissiveIntensity = intensity;
  }

  // Update turn signal indicators
  const blinkOn = Math.sin(performance.now() * 0.006) > 0; // ~2Hz blink
  const tsChildren = [car.mesh.children[6], car.mesh.children[7], car.mesh.children[8], car.mesh.children[9]]; // FL, FR, RL, RR
  if (tsChildren[0]) {
    let leftOn = false, rightOn = false;
    // Approaching intersection — signal upcoming turn
    if (car.turningState) {
      if (car.turningState.turnType === 'left') leftOn = blinkOn;
      else if (car.turningState.turnType === 'right') rightOn = blinkOn;
    } else if (car.road && car.u > car.road.length - 25) {
      // 25m before intersection, preview the turn direction
      const isF = car.lane < (car.road.numLanesPerDir || 2);
      const nId = isF ? car.road.to : car.road.from;
      if (car.road.id && modularRoadNetwork) {
        const conn = modularRoadNetwork.pickRandomConnection(car.road.id, car.lane, nId);
        if (conn && conn.turnType === 'left') leftOn = blinkOn;
        else if (conn && conn.turnType === 'right') rightOn = blinkOn;
      }
    }
    // Hazard: stopped > 10 seconds
    if ((car.stuckTimer || 0) > 10) { leftOn = blinkOn; rightOn = blinkOn; }

    tsChildren[0].material.emissiveIntensity = leftOn ? 1.0 : 0;  // FL
    tsChildren[1].material.emissiveIntensity = rightOn ? 1.0 : 0; // FR
    tsChildren[2].material.emissiveIntensity = leftOn ? 1.0 : 0;  // RL
    tsChildren[3].material.emissiveIntensity = rightOn ? 1.0 : 0; // RR
  }

  // Emergency siren light animation (red/blue alternating)
  if (car.isEmergency && car.sirenActive) {
    const sirenPhase = Math.sin(performance.now() * 0.015) > 0; // ~3Hz flash
    // Siren meshes are after turn signals: children[10] = red, children[11] = blue
    const sirenL = car.mesh.children[10];
    const sirenR = car.mesh.children[11];
    if (sirenL && sirenR) {
      sirenL.material.emissiveIntensity = sirenPhase ? 1.5 : 0.1;
      sirenR.material.emissiveIntensity = sirenPhase ? 0.1 : 1.5;
    }
  }

  // Update short-term trajectory line (yellow)
  updateCarTrajectory(car);

  // Update path debug line
  const destNodeId = isForward ? car.road.to : car.road.from;
  const destNode = roadGraph.nodes[destNodeId];
  if (destNode) {
    updatePathLine(car.pathLine, [
      { x: world.x, z: world.z },
      { x: destNode.x, z: destNode.z },
    ]);
  }
}

let protestActive = false;
let showTrafficLights = true;
let showCarDebug = false;
const carDebugEl = document.getElementById('car-debug');

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    protestActive = !protestActive;
    if (protestActive) {
      protestEngine.start();
    } else {
      protestEngine.stop();
    }
    smNPCs.forEach(npc => { npc.protestMode = protestActive; });
  }
  if (e.code === 'KeyD') {
    debugMeshVisible = !debugMeshVisible;
    debugGroup.visible = debugMeshVisible;
  }
  if (e.code === 'KeyL') {
    showTrafficLights = !showTrafficLights;
    for (const tl of trafficLights) {
      for (const a in tl.lights) tl.lights[a].group.visible = showTrafficLights;
    }
  }
  if (e.code === 'KeyC') {
    showCarDebug = !showCarDebug;
    carDebugEl.style.display = showCarDebug ? 'block' : 'none';
    // Toggle route and trajectory line visibility
    for (const car of cars) {
      if (car.routeLine) car.routeLine.visible = showCarDebug;
      if (car.trajectoryLine) car.trajectoryLine.visible = showCarDebug;
    }
  }
  if (e.code === 'KeyR') {
    npcs.forEach(npc => {
      npc.state = STATE.IDLE;
      npc.stateTimer = 0;
      npc.protestMode = false;
      assignNPCDestination(npc);
    });
    protestActive = false;
  }
});

function updateHUD() {
  frameCount++;
  const now = performance.now();
  if (now - lastFPSTime > 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFPSTime = now;
  }

  const stateNames = ['IDLE', 'WALK_TO', 'AT_DEST', 'PROTEST'];
  const smStatus = smNPCs.map(n =>
    `  ${n.type.padEnd(10)} ${stateNames[n.state]}`
  ).join('\n');

  // Count zones
  const zoneCounts = {};
  for (const row of blockZones) for (const z of row) zoneCounts[z] = (zoneCounts[z] || 0) + 1;
  const zoneStr = Object.entries(zoneCounts).map(([k, v]) => `${k}:${v}`).join(' ');

  hudEl.innerHTML = `
<span class="label">CITY3D v4 — ${simClock.getTimeString()} Day ${simClock.getDay()}</span>
<span class="label">FPS:</span> ${fps} &nbsp; <span class="label">Entities:</span> ${npcs.length + cars.length}
<span class="label">Pedestrians:</span> ${npcs.length} &nbsp; <span class="label">Cars:</span> ${cars.length}
<span class="label">Ped NavMesh:</span> ${pedPolygons.length} polys &nbsp; <span class="label">Road Graph:</span> ${Object.keys(roadGraph.nodes).length} nodes, ${roadGraph.edges.length} edges

<span class="label">Protest:</span> ${protestActive ? `<span class="warn">${protestEngine.currentPhase} (${protestEngine.getDebugInfo().active} active, ${protestEngine.getDebugInfo().arrested} arrested)</span>` : 'off [SPACE to start]'}

function updateCarDebug() {
  if (!showCarDebug) return;
  const lines = ['CAR DEBUG (C to toggle)', ''];
  for (const car of cars) {
    if (car.useNewSystem) {
      const brakeStr = car.brakeLightsOn ? ' [BRAKE]' : '';
      const turnStr = car.inTurn ? ' TURN' : '';
      const destStr = car.destination ? ` dest:${car.destination}` : '';
      lines.push(
        `${car.id}: d=${car.d.toFixed(1)} v=${car.speed.toFixed(1)} acc=${car.acc.toFixed(2)} path=${car.path?.totalLength?.toFixed(0)||0}m${brakeStr}${turnStr}${destStr}`
      );
    } else {
      const roadId = car.road ? `${car.road.horizontal ? 'h' : 'v'}_${car.road.from}_${car.road.to}` : 'none';
      lines.push(
        `${car.id}: road=${roadId} lane=${car.lane} u=${car.u?.toFixed(1)} v=${car.speed.toFixed(1)} acc=${car.acc.toFixed(2)} [OLD]`
      );
    }
  }
  lines.push('');
  lines.push(`Virtual stops: ${virtualStopCars.length}`);
  carDebugEl.textContent = lines.join('\n');
}

// ============================================================
// ANIMATION LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  const delta = time.update().getDelta();
  const dt = Math.min(delta, 0.1);

  // Update sim clock
  simClock.tick(dt);

  // Check NPC schedule transitions (every ~1 second of real time)
  if (Math.floor(simClock.totalElapsed) !== Math.floor(simClock.totalElapsed - dt)) {
    for (const npc of npcs) {
      const { shouldTransition, goal } = scheduleExec.checkTransition(npc.id);
      if (shouldTransition && goal) {
        if (goal.action === 'go_to' && goal.destination) {
          // Find a location matching the destination zone
          const destEntry = buildingEntries.find(e => blockZones[e.blockRow]?.[e.blockCol] === goal.destination);
          if (destEntry) {
            assignNPCDestination(npc, new YUKA.Vector3(destEntry.x, 0, destEntry.z));
          } else if (goal.destination === 'home' || goal.destination === 'work') {
            // Use POI from schedule
            const pois = scheduleExec.schedules.get(npc.id)?.pois;
            if (pois && pois[goal.destination]) {
              const p = pois[goal.destination];
              assignNPCDestination(npc, new YUKA.Vector3(p.x, 0, p.z));
            }
          }
        } else if (goal.action === 'stay_at') {
          // NPC should idle at current location
          npc.followPath.active = false;
          npc.wander.active = true;
          npc.vehicle.maxSpeed = 0.5;
        }
      }
    }
  }

  // Update protest engine
  if (protestActive) {
    const npcPositions = npcs.map(n => ({
      id: n.id,
      x: n.vehicle.position.x,
      z: n.vehicle.position.z,
      type: n.type,
    }));
    const protestState = protestEngine.tick(dt, npcPositions);

    // Apply protest goals to NPCs
    for (const npc of npcs) {
      const goal = protestEngine.getAgentGoal(npc.id);
      if (goal) {
        if (goal.action === 'go_to' && goal.target) {
          npc.vehicle.maxSpeed = goal.speed || 2.5;
          assignNPCDestination(npc, new YUKA.Vector3(goal.target.x, 0, goal.target.z));
        } else if (goal.action === 'mill' && goal.target) {
          // Wander near target
          npc.vehicle.maxSpeed = goal.speed || 1.0;
          const ox = (Math.random() - 0.5) * (goal.radius || 20);
          const oz = (Math.random() - 0.5) * (goal.radius || 20);
          if (!npc.followPath.active || Math.random() < 0.02) { // occasionally re-target
            assignNPCDestination(npc, new YUKA.Vector3(goal.target.x + ox, 0, goal.target.z + oz));
          }
        } else if (goal.action === 'flee') {
          npc.vehicle.maxSpeed = goal.speed || 3.5;
          // Flee away from plaza
          const dx = npc.vehicle.position.x - PLAZA_X;
          const dz = npc.vehicle.position.z - PLAZA_Z;
          const dist = Math.sqrt(dx * dx + dz * dz) || 1;
          const fleeX = npc.vehicle.position.x + (dx / dist) * 50;
          const fleeZ = npc.vehicle.position.z + (dz / dist) * 50;
          assignNPCDestination(npc, new YUKA.Vector3(fleeX, 0, fleeZ));
        } else if (goal.action === 'stay') {
          npc.followPath.active = false;
          npc.wander.active = false;
          npc.vehicle.maxSpeed = 0;
        }
      }
    }
  }

  // Update traffic lights
  updateTrafficLights(dt);

  // Rebuild virtual stop cars for red lights (before car update)
  buildVirtualStopCars();

  // Update NPCs
  for (const npc of npcs) {
    if (npc.hasStateMachine) {
      updateNPCState(npc, dt);
    } else {
      updateSimpleNPC(npc, dt);
    }
  }

  // Update cars — use new CarPath system
  const pedPositions = npcs.map(n => ({ x: n.vehicle.position.x, z: n.vehicle.position.z, speed: n.vehicle.velocity.length() }));
  for (const car of cars) {
    if (car.useNewSystem && car.path) {
      tickCar(car, dt, cars, pedPositions, null, modularRoadNetwork);
      // Sync Three.js mesh from CarPath position
      car.mesh.position.set(car.worldX, 0, car.worldZ);
      car.mesh.rotation.y = car.worldHeading;
      car.vehicle.position.set(car.worldX, 0, car.worldZ);
    } else {
      updateCar(car, dt); // fallback to old system
    }
  }
  // Resolve visual overlaps
  if (frameCount % 5 === 0) resolveOverlaps(cars);

  // Update yuka entity manager
  entityManager.update(delta);

  // Clamp NPCs to pedestrian NavMesh every 3rd frame (expensive operation)
  if (frameCount % 3 === 0) {
    const _clampResult = new YUKA.Vector3();
    for (const npc of npcs) {
      const pos = npc.vehicle.position;
      const mesh = npc.protestMode ? combinedNavMesh : pedNavMesh;
      try {
        mesh.clampMovement(pos, pos, _clampResult);
        pos.copy(_clampResult);
      } catch(e) { /* outside navmesh entirely */ }
    }
  }
  // Separation force every 5th frame
  if (frameCount % 5 === 0) {
    for (let i = 0; i < npcs.length; i++) {
      const a = npcs[i].vehicle.position;
      for (let j = i + 1; j < npcs.length; j++) {
        const b = npcs[j].vehicle.position;
        const dx = a.x - b.x, dz = a.z - b.z;
        const distSq = dx * dx + dz * dz;
        if (distSq < 1.44 && distSq > 0.001) { // 1.2² = 1.44
          const dist = Math.sqrt(distSq);
          const push = (1.2 - dist) * 0.5;
          const nx = dx / dist, nz = dz / dist;
          a.x += nx * push; a.z += nz * push;
          b.x -= nx * push; b.z -= nz * push;
        }
      }
    }
  }
  // Cars use road graph lane following — no NavMesh clamping needed

  // Update route + trajectory visualization
  for (const car of cars) {
    if (!car.useNewSystem || !car.path) continue;

    // Route line: full path ahead (update geometry every 30 frames)
    if (car.routeLine && frameCount % 30 === 0) {
      const endD = car.path.totalLength;
      const points = car.path.sample(car.d, endD, 4)
        .map(p => new THREE.Vector3(p.x, 0.3, p.z));
      if (points.length >= 2) {
        car.routeLine.geometry.dispose();
        car.routeLine.geometry = new THREE.BufferGeometry().setFromPoints(points);
        car.routeLine.computeLineDistances();
      }
    }

    // Animate dash offset for pulse effect (every frame)
    if (car.routeLine && car.routeLine.material.dashOffset !== undefined) {
      car.routeLine.material.dashOffset -= dt * 8; // pulse speed
    }

    // Pulse arrow: travels from car to end of route, oriented along path heading
    if (car.pulseDot && car.path.totalLength > car.d + 10) {
      car.pulseT += dt * 0.25; // pulse travel speed
      if (car.pulseT > 1) car.pulseT -= 1;
      const remaining = car.path.totalLength - car.d;
      const pulseD = car.d + 5 + car.pulseT * (remaining - 5); // start 5m ahead
      const pulsePos = car.path.getPosition(pulseD);
      const pulseHeading = car.path.getHeading(pulseD);
      car.pulseDot.position.set(pulsePos.x, 0.5, pulsePos.z);
      car.pulseDot.rotation.y = pulseHeading; // orient arrow along path
      // Fade: bright near car, dimmer at end
      const childMat = car.pulseDot.children[0]?.material;
      if (childMat) childMat.opacity = 0.9 - car.pulseT * 0.5;
    }

    // Trajectory line: next 25m (update every 10 frames)
    if (car.trajectoryLine && frameCount % 10 === 0) {
      const trajEnd = Math.min(car.d + 25, car.path.totalLength);
      const trajPoints = car.path.sample(car.d, trajEnd, 1.5)
        .map(p => new THREE.Vector3(p.x, 0.4, p.z));
      if (trajPoints.length >= 2) {
        car.trajectoryLine.geometry.dispose();
        car.trajectoryLine.geometry = new THREE.BufferGeometry().setFromPoints(trajPoints);
        car.trajectoryLine.computeLineDistances();
      }
    }
  }

  // Tick sensor bridge (generates BLE sightings + camera detections)
  sensorBridge.tick(dt,
    npcs.map(n => ({ id: n.id, x: n.vehicle.position.x, z: n.vehicle.position.z, bleMac: n.bleMac, type: n.type })),
    cars.map(c => ({ id: c.id, x: c.mesh.position.x, z: c.mesh.position.z, tpmsId: c.tpmsId, vehicleType: c.vehicleType }))
  );

  controls.update();
  renderer.render(scene, camera);
  updateHUD();
  updateCarDebug();
}

animate();

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

console.log(`[Yuka Prototype v3] City: ${CITY_W}x${CITY_H}, Ped NavMesh: ${pedPolygons.length} polys, Road Graph: ${Object.keys(roadGraph.nodes).length} nodes / ${roadGraph.edges.length} edges, NPCs: ${npcs.length}, Cars: ${cars.length}, Entries: ${buildingEntries.length}, Intersections: ${intersections.length}`);

// Expose state for external debugging/testing
window.__city3d = {
  npcs, cars, buildings, buildingEntries, intersections, trafficLights,
  pedNavMesh, combinedNavMesh, roadGraph, nodeEdges, modularRoadNetwork,
  entityManager, smNPCs, simClock, scheduleExec, protestEngine, sensorBridge,
  get state() { return { protestActive, debugMeshVisible, showTrafficLights, simTime: simClock.getTimeString() }; },
  sidewalkOnlyRects, debugPedRects, blockZones,
  CITY_W, CITY_H, PLAZA_X, PLAZA_Z, scene, renderer,
  // Benchmark: spawn more cars at runtime
  addCars(n) {
    for (let i = 0; i < n; i++) {
      const c = spawnCar('sedan');
      const carState = createCar(modularRoadNetwork, LANE_W);
      if (carState) {
        Object.assign(c, { path: carState.path, d: carState.d, laneOffset: carState.laneOffset,
          worldX: carState.worldX, worldZ: carState.worldZ, worldHeading: carState.worldHeading,
          route: carState.route, routeIndex: carState.routeIndex, destination: carState.destination,
          useNewSystem: true });
        const pos = c.path.getPosition(c.d);
        c.mesh.position.set(pos.x, 0, pos.z);
      }
    }
    return cars.length;
  },
  get renderInfo() { const i = renderer.info; return { calls: i.render.calls, triangles: i.render.triangles, geometries: i.memory.geometries, textures: i.memory.textures }; },
};
</script>
