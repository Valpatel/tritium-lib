{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/",

  }

<body>
<div id="hud"></div>
<div id="controls">[SPACE] Protest mode &nbsp; [D] Debug mesh &nbsp; [R] Reset &nbsp; [L] Traffic lights</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import * as YUKA from 'yuka';

// ============================================================
// CITY GRID CONSTANTS
// ============================================================
const BLOCK_W = 60, BLOCK_H = 50, ROAD_W = 16;
const GRID_COLS = 8, GRID_ROWS = 6;
const CITY_W = GRID_COLS * (BLOCK_W + ROAD_W) + ROAD_W;
const CITY_H = GRID_ROWS * (BLOCK_H + ROAD_W) + ROAD_W;
const CENTER_COL = 4, CENTER_ROW = 3;

// Road structure dimensions
const SIDEWALK_W = 2;       // sidewalk width on each side
const CURB_W = 0.15;        // visual curb thickness
const LANE_W = 3;           // single lane width
const NUM_LANES = 2;        // lanes per direction
const ROAD_SURFACE_W = LANE_W * NUM_LANES * 2; // 12m driving surface
const CROSSWALK_W = 3;      // crosswalk strip width

// Heights (Y)
const Y_ROAD = 0.01;
const Y_SIDEWALK = 0.06;
const Y_CURB = 0.08;
const Y_CROSSWALK = 0.02;
const Y_LANE_MARK = 0.015;
const Y_DEBUG = 0.2;

// Plaza center
const PLAZA_X = CENTER_COL * (BLOCK_W + ROAD_W) + ROAD_W + BLOCK_W / 2;
const PLAZA_Z = CENTER_ROW * (BLOCK_H + ROAD_W) + ROAD_W + BLOCK_H / 2;

// ============================================================
// ZONE TYPES
// ============================================================
const ZONE_TYPES = ['residential', 'commercial', 'office', 'park', 'civic', 'parking'];
const ZONE_COLORS = {
  residential: 0x8B7355,
  commercial: 0x556677,
  office: 0x667788,
  civic: 0x557788,
  park: 0x2a5a2a,
  parking: 0x555555,
  plaza: 0x666666,
};

// Procedural zone assignment per block
const blockZones = [];
const seededRandom = ((seed) => {
  let s = seed;
  return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
})(42);

for (let row = 0; row < GRID_ROWS; row++) {
  blockZones[row] = [];
  for (let col = 0; col < GRID_COLS; col++) {
    if (col === CENTER_COL && row === CENTER_ROW) {
      blockZones[row][col] = 'plaza';
    } else if (row === 0 || row === GRID_ROWS - 1 || col === 0 || col === GRID_COLS - 1) {
      blockZones[row][col] = 'residential';
    } else {
      blockZones[row][col] = ZONE_TYPES[Math.floor(seededRandom() * ZONE_TYPES.length)];
    }
  }
}

// ============================================================
// THREE.JS SETUP
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 300, 600);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 1000);
camera.position.set(CITY_W / 2, 200, CITY_H + 100);
camera.lookAt(CITY_W / 2, 0, CITY_H / 2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(CITY_W / 2, 0, CITY_H / 2);
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();

// Lighting
scene.add(new THREE.AmbientLight(0x334455, 0.6));
const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
sun.position.set(CITY_W / 2, 150, CITY_H / 3);
sun.castShadow = true;
sun.shadow.camera.left = -CITY_W / 2;
sun.shadow.camera.right = CITY_W / 2;
sun.shadow.camera.top = CITY_H / 2;
sun.shadow.camera.bottom = -CITY_H / 2;
scene.add(sun);

// ============================================================
// CITY GEOMETRY — GROUND
// ============================================================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(CITY_W + 40, CITY_H + 40),
  new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(CITY_W / 2, -0.05, CITY_H / 2);
ground.receiveShadow = true;
scene.add(ground);

// ============================================================
// HELPER: create flat rectangle in scene
// ============================================================
function addFlatRect(x, z, w, h, y, color, opts = {}) {
  const mat = new THREE.MeshStandardMaterial({
    color, roughness: opts.roughness || 0.8,
    ...(opts.transparent ? { transparent: true, opacity: opts.opacity || 0.5 } : {})
  });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x, y, z);
  if (opts.receiveShadow !== false) mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// ============================================================
// ROAD SURFACES, SIDEWALKS, CURBS, LANE MARKINGS, CROSSWALKS
// ============================================================
const intersections = []; // {x, z, col, row} for traffic light placement

// Helper: road center for a given row/col
function hRoadZ(row) { return row * (BLOCK_H + ROAD_W) + ROAD_W / 2; }
function vRoadX(col) { return col * (BLOCK_W + ROAD_W) + ROAD_W / 2; }

// Draw a road segment with lanes, sidewalks, curbs, and lane markings
function drawRoadSegment(cx, cz, length, isHorizontal) {
  // Road surface (dark asphalt)
  const rw = isHorizontal ? length : ROAD_SURFACE_W;
  const rh = isHorizontal ? ROAD_SURFACE_W : length;
  addFlatRect(cx, cz, rw, rh, Y_ROAD, 0x2a2a2a);

  // Sidewalks (slightly raised, lighter)
  const sw = isHorizontal ? length : SIDEWALK_W;
  const sh = isHorizontal ? SIDEWALK_W : length;
  const offset = ROAD_SURFACE_W / 2 + SIDEWALK_W / 2;

  if (isHorizontal) {
    addFlatRect(cx, cz - offset, sw, sh, Y_SIDEWALK, 0x444444);
    addFlatRect(cx, cz + offset, sw, sh, Y_SIDEWALK, 0x444444);
    // Curbs
    addFlatRect(cx, cz - ROAD_SURFACE_W / 2 - CURB_W / 2, length, CURB_W, Y_CURB, 0x666666);
    addFlatRect(cx, cz + ROAD_SURFACE_W / 2 + CURB_W / 2, length, CURB_W, Y_CURB, 0x666666);
  } else {
    addFlatRect(cx - offset, cz, sw, sh, Y_SIDEWALK, 0x444444);
    addFlatRect(cx + offset, cz, sw, sh, Y_SIDEWALK, 0x444444);
    // Curbs
    addFlatRect(cx - ROAD_SURFACE_W / 2 - CURB_W / 2, cz, CURB_W, length, Y_CURB, 0x666666);
    addFlatRect(cx + ROAD_SURFACE_W / 2 + CURB_W / 2, cz, CURB_W, length, Y_CURB, 0x666666);
  }

  // Lane markings
  const DASH_LEN = 2, DASH_GAP = 3, DASH_W_VIS = 0.15;
  const numDashes = Math.floor(length / (DASH_LEN + DASH_GAP));

  for (let d = 0; d < numDashes; d++) {
    const t = -length / 2 + (d + 0.5) * (DASH_LEN + DASH_GAP);

    // Center line (yellow dashed) — between directions
    if (isHorizontal) {
      addFlatRect(cx + t, cz, DASH_LEN, DASH_W_VIS, Y_LANE_MARK, 0xccaa00);
    } else {
      addFlatRect(cx, cz + t, DASH_W_VIS, DASH_LEN, Y_LANE_MARK, 0xccaa00);
    }

    // White dashed between same-direction lanes
    const laneOffset = LANE_W; // between lane 1 and lane 2 in each direction
    if (isHorizontal) {
      addFlatRect(cx + t, cz - laneOffset, DASH_LEN, DASH_W_VIS, Y_LANE_MARK, 0xaaaaaa);
      addFlatRect(cx + t, cz + laneOffset, DASH_LEN, DASH_W_VIS, Y_LANE_MARK, 0xaaaaaa);
    } else {
      addFlatRect(cx - laneOffset, cz + t, DASH_W_VIS, DASH_LEN, Y_LANE_MARK, 0xaaaaaa);
      addFlatRect(cx + laneOffset, cz + t, DASH_W_VIS, DASH_LEN, Y_LANE_MARK, 0xaaaaaa);
    }
  }

  // White solid edge lines
  if (isHorizontal) {
    addFlatRect(cx, cz - ROAD_SURFACE_W / 2 + DASH_W_VIS, length, DASH_W_VIS, Y_LANE_MARK, 0xffffff);
    addFlatRect(cx, cz + ROAD_SURFACE_W / 2 - DASH_W_VIS, length, DASH_W_VIS, Y_LANE_MARK, 0xffffff);
  } else {
    addFlatRect(cx - ROAD_SURFACE_W / 2 + DASH_W_VIS, cz, DASH_W_VIS, length, Y_LANE_MARK, 0xffffff);
    addFlatRect(cx + ROAD_SURFACE_W / 2 - DASH_W_VIS, cz, DASH_W_VIS, length, Y_LANE_MARK, 0xffffff);
  }
}

// Horizontal roads (segments between intersections)
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = hRoadZ(row);
  for (let col = 0; col < GRID_COLS; col++) {
    const x1 = col * (BLOCK_W + ROAD_W) + ROAD_W;
    const x2 = x1 + BLOCK_W;
    drawRoadSegment((x1 + x2) / 2, z, BLOCK_W, true);
  }
}

// Vertical roads (segments between intersections)
for (let col = 0; col <= GRID_COLS; col++) {
  const x = vRoadX(col);
  for (let row = 0; row < GRID_ROWS; row++) {
    const z1 = row * (BLOCK_H + ROAD_W) + ROAD_W;
    const z2 = z1 + BLOCK_H;
    drawRoadSegment(x, (z1 + z2) / 2, BLOCK_H, false);
  }
}

// Intersections — asphalt square + crosswalks
for (let row = 0; row <= GRID_ROWS; row++) {
  for (let col = 0; col <= GRID_COLS; col++) {
    const ix = vRoadX(col);
    const iz = hRoadZ(row);
    intersections.push({ x: ix, z: iz, col, row });

    // Intersection asphalt
    addFlatRect(ix, iz, ROAD_W, ROAD_W, Y_ROAD, 0x2a2a2a);

    // Sidewalk corner pads (the small squares at intersection corners)
    const cornerOff = ROAD_SURFACE_W / 2 + SIDEWALK_W / 2;
    addFlatRect(ix - cornerOff, iz - cornerOff, SIDEWALK_W, SIDEWALK_W, Y_SIDEWALK, 0x444444);
    addFlatRect(ix + cornerOff, iz - cornerOff, SIDEWALK_W, SIDEWALK_W, Y_SIDEWALK, 0x444444);
    addFlatRect(ix - cornerOff, iz + cornerOff, SIDEWALK_W, SIDEWALK_W, Y_SIDEWALK, 0x444444);
    addFlatRect(ix + cornerOff, iz + cornerOff, SIDEWALK_W, SIDEWALK_W, Y_SIDEWALK, 0x444444);

    // 4 crosswalks at each intersection (N, S, E, W)
    const crossOff = ROAD_SURFACE_W / 2 + CROSSWALK_W / 2 - 0.5;
    // North/South crosswalks (cross the horizontal road)
    if (row > 0 || true) {
      drawCrosswalk(ix, iz - crossOff, ROAD_SURFACE_W, CROSSWALK_W, true);
      drawCrosswalk(ix, iz + crossOff, ROAD_SURFACE_W, CROSSWALK_W, true);
    }
    // East/West crosswalks (cross the vertical road)
    if (col > 0 || true) {
      drawCrosswalk(ix - crossOff, iz, CROSSWALK_W, ROAD_SURFACE_W, false);
      drawCrosswalk(ix + crossOff, iz, CROSSWALK_W, ROAD_SURFACE_W, false);
    }
  }
}

function drawCrosswalk(cx, cz, w, h, isHorizontal) {
  // White stripes
  const stripeCount = isHorizontal ? Math.floor(w / 1.5) : Math.floor(h / 1.5);
  const stripeW = 0.6;
  for (let i = 0; i < stripeCount; i++) {
    const t = -((stripeCount - 1) * 1.5) / 2 + i * 1.5;
    if (isHorizontal) {
      addFlatRect(cx + t, cz, stripeW, h, Y_CROSSWALK, 0xdddddd);
    } else {
      addFlatRect(cx, cz + t, w, stripeW, Y_CROSSWALK, 0xdddddd);
    }
  }
}

// ============================================================
// ROAD GRAPH — directed graph for vehicle lane following
// ============================================================
const roadGraph = { nodes: {}, edges: [] };

// Add intersection nodes with approach directions
for (const inter of intersections) {
  const id = `${inter.col}_${inter.row}`;
  const isTop = inter.row === 0;
  const isBot = inter.row === GRID_ROWS;
  const isLeft = inter.col === 0;
  const isRight = inter.col === GRID_COLS;
  const approaches = [];
  if (!isTop) approaches.push('N');    // traffic can arrive from the north (row-1)
  if (!isBot) approaches.push('S');    // traffic can arrive from the south (row+1)
  if (!isLeft) approaches.push('W');   // traffic can arrive from the west (col-1)
  if (!isRight) approaches.push('E');  // traffic can arrive from the east (col+1)

  roadGraph.nodes[id] = {
    ...inter, id, approaches,
    type: approaches.length === 4 ? '4-way' :
          approaches.length === 3 ? '3-way' :
          approaches.length === 2 ? '2-way' : '1-way',
  };
}

// Add edges — horizontal road segments between (col,row) and (col+1,row)
for (let row = 0; row <= GRID_ROWS; row++) {
  for (let col = 0; col < GRID_COLS; col++) {
    const from = `${col}_${row}`;
    const to = `${col + 1}_${row}`;
    const z = hRoadZ(row);
    const x1 = vRoadX(col);
    const x2 = vRoadX(col + 1);
    roadGraph.edges.push({
      from, to, horizontal: true,
      lanes: [
        { offset: -LANE_W * 1.5, dir: 1 },   // outer lane going +X (east)
        { offset: -LANE_W * 0.5, dir: 1 },   // inner lane going +X (east)
        { offset: LANE_W * 0.5, dir: -1 },    // inner lane going -X (west)
        { offset: LANE_W * 1.5, dir: -1 },    // outer lane going -X (west)
      ],
      centerZ: z, x1, x2,
    });
  }
}

// Add edges — vertical road segments between (col,row) and (col,row+1)
for (let col = 0; col <= GRID_COLS; col++) {
  for (let row = 0; row < GRID_ROWS; row++) {
    const from = `${col}_${row}`;
    const to = `${col}_${row + 1}`;
    const x = vRoadX(col);
    const z1 = hRoadZ(row);
    const z2 = hRoadZ(row + 1);
    roadGraph.edges.push({
      from, to, horizontal: false,
      lanes: [
        { offset: -LANE_W * 1.5, dir: 1 },   // outer lane going +Z (south)
        { offset: -LANE_W * 0.5, dir: 1 },   // inner lane going +Z (south)
        { offset: LANE_W * 0.5, dir: -1 },    // inner lane going -Z (north)
        { offset: LANE_W * 1.5, dir: -1 },    // outer lane going -Z (north)
      ],
      centerX: x, z1, z2,
    });
  }
}

// Debug group (created early so road graph debug can use it)
let debugMeshVisible = false;
const debugGroup = new THREE.Group();
debugGroup.visible = debugMeshVisible;
scene.add(debugGroup);

// Build adjacency lookup: nodeId -> [edges]
const nodeEdges = {};
for (const id in roadGraph.nodes) nodeEdges[id] = [];
for (const edge of roadGraph.edges) {
  nodeEdges[edge.from].push(edge);
  nodeEdges[edge.to].push(edge);
}

// Debug: add road graph edges to debug overlay
function addRoadGraphDebug() {
  const mat = new THREE.LineBasicMaterial({ color: 0xfcee0a, transparent: true, opacity: 0.4 });
  for (const edge of roadGraph.edges) {
    const fromNode = roadGraph.nodes[edge.from];
    const toNode = roadGraph.nodes[edge.to];
    const pts = [
      new THREE.Vector3(fromNode.x, Y_DEBUG + 0.1, fromNode.z),
      new THREE.Vector3(toNode.x, Y_DEBUG + 0.1, toNode.z),
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geo, mat);
    debugGroup.add(line);
  }
  // Node markers
  const nodeMat = new THREE.MeshBasicMaterial({ color: 0xff2a6d, transparent: true, opacity: 0.6 });
  for (const id in roadGraph.nodes) {
    const n = roadGraph.nodes[id];
    const m = new THREE.Mesh(new THREE.SphereGeometry(1.5, 6, 4), nodeMat);
    m.position.set(n.x, Y_DEBUG + 0.3, n.z);
    debugGroup.add(m);
  }
}
addRoadGraphDebug();

// ============================================================
// TRAFFIC LIGHTS — proper per-intersection controllers
// ============================================================
const TL_GREEN = 0x00ff44;
const TL_YELLOW = 0xffcc00;
const TL_RED = 0xff2200;
const TL_DIM = 0.15;    // dim bulb emissive intensity
const TL_BRIGHT = 1.0;  // active bulb emissive intensity

const trafficLights = [];  // per-intersection controller + visuals

function createLightBulb(color, localY) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 6),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: TL_DIM })
  );
  mesh.position.y = localY;
  return mesh;
}

function createTrafficLightPole(x, z, facingAngle) {
  const group = new THREE.Group();

  // Pole
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 5, 4),
    new THREE.MeshStandardMaterial({ color: 0x333333 })
  );
  pole.position.y = 2.5;
  group.add(pole);

  // Housing
  const housing = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.4, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  housing.position.y = 5.5;
  group.add(housing);

  // Lights: red (top), yellow (mid), green (bottom)
  const lightR = createLightBulb(TL_RED, 5.9);
  const lightY = createLightBulb(TL_YELLOW, 5.5);
  const lightG = createLightBulb(TL_GREEN, 5.1);
  group.add(lightR, lightY, lightG);

  group.position.set(x, 0, z);
  group.rotation.y = facingAngle;
  scene.add(group);

  return { group, lightR, lightY, lightG };
}

function setTrafficLightState(tlVisual, state) {
  // state: 'red', 'yellow', 'green'
  tlVisual.lightR.material.emissiveIntensity = state === 'red' ? TL_BRIGHT : TL_DIM;
  tlVisual.lightY.material.emissiveIntensity = state === 'yellow' ? TL_BRIGHT : TL_DIM;
  tlVisual.lightG.material.emissiveIntensity = state === 'green' ? TL_BRIGHT : TL_DIM;
}

function createTrafficController(node) {
  const approaches = node.approaches;
  const phases = [];

  if (approaches.length === 4) {
    // 4-way: NS green, then EW green
    phases.push({ green: ['N', 'S'], duration: 30 });
    phases.push({ yellow: ['N', 'S'], duration: 3 });
    phases.push({ allRed: true, duration: 2 });
    phases.push({ green: ['E', 'W'], duration: 30 });
    phases.push({ yellow: ['E', 'W'], duration: 3 });
    phases.push({ allRed: true, duration: 2 });
  } else if (approaches.length === 3) {
    // T-junction: find the two that are opposite, then the solo
    const hasN = approaches.includes('N'), hasS = approaches.includes('S');
    const hasE = approaches.includes('E'), hasW = approaches.includes('W');
    if (hasN && hasS) {
      phases.push({ green: ['N', 'S'], duration: 30 });
      phases.push({ yellow: ['N', 'S'], duration: 3 });
      phases.push({ allRed: true, duration: 2 });
      const solo = hasE ? 'E' : 'W';
      phases.push({ green: [solo], duration: 20 });
      phases.push({ yellow: [solo], duration: 3 });
      phases.push({ allRed: true, duration: 2 });
    } else {
      phases.push({ green: ['E', 'W'], duration: 30 });
      phases.push({ yellow: ['E', 'W'], duration: 3 });
      phases.push({ allRed: true, duration: 2 });
      const solo = hasN ? 'N' : 'S';
      phases.push({ green: [solo], duration: 20 });
      phases.push({ yellow: [solo], duration: 3 });
      phases.push({ allRed: true, duration: 2 });
    }
  } else if (approaches.length === 2) {
    // Corner: alternate between the two
    phases.push({ green: [approaches[0]], duration: 30 });
    phases.push({ yellow: [approaches[0]], duration: 3 });
    phases.push({ allRed: true, duration: 2 });
    phases.push({ green: [approaches[1]], duration: 30 });
    phases.push({ yellow: [approaches[1]], duration: 3 });
    phases.push({ allRed: true, duration: 2 });
  } else if (approaches.length === 1) {
    // Dead-end: always green
    phases.push({ green: [approaches[0]], duration: 999 });
  }

  return { phases, currentPhase: 0, timer: (phases[0]?.duration || 30) * (0.5 + seededRandom() * 0.5) };
}

// Approach direction info: where to place the traffic light pole for each approach
// The light faces incoming traffic, placed at the stop line (road edge near intersection)
const approachPlacement = {
  // Approach 'N' means traffic coming FROM north (going south, -Z direction)
  // Stop line is on the north side of intersection, light faces north
  N: { dx: ROAD_SURFACE_W / 2 + 0.5, dz: -ROAD_SURFACE_W / 2 - 1, angle: Math.PI },
  S: { dx: -ROAD_SURFACE_W / 2 - 0.5, dz: ROAD_SURFACE_W / 2 + 1, angle: 0 },
  E: { dx: ROAD_SURFACE_W / 2 + 1, dz: ROAD_SURFACE_W / 2 + 0.5, angle: -Math.PI / 2 },
  W: { dx: -ROAD_SURFACE_W / 2 - 1, dz: -ROAD_SURFACE_W / 2 - 0.5, angle: Math.PI / 2 },
};

for (const id in roadGraph.nodes) {
  const node = roadGraph.nodes[id];
  const controller = createTrafficController(node);

  // Create visual traffic light per approach
  const lights = {};
  for (const approach of node.approaches) {
    const p = approachPlacement[approach];
    lights[approach] = createTrafficLightPole(node.x + p.dx, node.z + p.dz, p.angle);
    setTrafficLightState(lights[approach], 'red'); // start all red
  }

  const tl = {
    intersection: node,
    controller,
    lights,
    // Convenience: which approaches are currently green
    greenApproaches: new Set(),
  };

  // Set initial state
  if (controller.phases.length > 0) {
    const phase = controller.phases[0];
    if (phase.green) {
      for (const a of phase.green) {
        tl.greenApproaches.add(a);
        if (lights[a]) setTrafficLightState(lights[a], 'green');
      }
    }
  }

  trafficLights.push(tl);
}

function updateTrafficLights(dt) {
  for (const tl of trafficLights) {
    const ctrl = tl.controller;
    if (ctrl.phases.length === 0) continue;

    ctrl.timer -= dt;
    if (ctrl.timer <= 0) {
      ctrl.currentPhase = (ctrl.currentPhase + 1) % ctrl.phases.length;
      const phase = ctrl.phases[ctrl.currentPhase];
      ctrl.timer = phase.duration;

      // Reset all to red
      tl.greenApproaches.clear();
      for (const a in tl.lights) setTrafficLightState(tl.lights[a], 'red');

      // Apply phase
      if (phase.green) {
        for (const a of phase.green) {
          tl.greenApproaches.add(a);
          if (tl.lights[a]) setTrafficLightState(tl.lights[a], 'green');
        }
      } else if (phase.yellow) {
        for (const a of phase.yellow) {
          if (tl.lights[a]) setTrafficLightState(tl.lights[a], 'yellow');
        }
      }
      // allRed: everything stays red (already set above)
    }
  }
}

// Check if a car approaching from a given direction has a green light
function isGreenForApproach(intersectionId, approachDir) {
  for (const tl of trafficLights) {
    if (tl.intersection.id === intersectionId) {
      return tl.greenApproaches.has(approachDir);
    }
  }
  return true; // default: go
}

      }
      // Park entries
      buildingEntries.push({ x: bx, z: bz - BLOCK_H / 2, blockRow: row, blockCol: col, zone });
      buildingEntries.push({ x: bx, z: bz + BLOCK_H / 2, blockRow: row, blockCol: col, zone });
      continue;
    }

    // Regular block — 1-3 buildings
    const buildingMat = new THREE.MeshStandardMaterial({ color: zoneColor, roughness: 0.7 });
    const count = 1 + Math.floor(seededRandom() * 3);
    for (let b = 0; b < count; b++) {
      const bw = 8 + seededRandom() * 20;
      const bh = zone === 'office' ? 12 + seededRandom() * 30 : 6 + seededRandom() * 25;
      const bd = 8 + seededRandom() * 16;
      const ox = (seededRandom() - 0.5) * (BLOCK_W - bw - 4);
      const oz = (seededRandom() - 0.5) * (BLOCK_H - bd - 4);
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), buildingMat);
      mesh.position.set(bx + ox, bh / 2, bz + oz);

      scene.add(mesh);
      buildings.push({ mesh, zone, bx: bx + ox, bz: bz + oz, bw, bd });

      // Door (colored rectangle on face nearest to road)
      const doorColor = zone === 'commercial' ? 0x00aaff : zone === 'civic' ? 0x00f0ff : 0x886644;
      const doorMat = new THREE.MeshStandardMaterial({ color: doorColor, emissive: doorColor, emissiveIntensity: 0.3 });

      // Pick face closest to block edge (nearest sidewalk)
      const distToLeft = (bx + ox) - (col * (BLOCK_W + ROAD_W) + ROAD_W);
      const distToRight = (col * (BLOCK_W + ROAD_W) + ROAD_W + BLOCK_W) - (bx + ox);
      const distToTop = (bz + oz) - (row * (BLOCK_H + ROAD_W) + ROAD_W);
      const distToBot = (row * (BLOCK_H + ROAD_W) + ROAD_W + BLOCK_H) - (bz + oz);
      const minDist = Math.min(distToLeft, distToRight, distToTop, distToBot);

      let doorX, doorZ;
      const door = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2.5), doorMat);
      if (minDist === distToLeft) {
        doorX = bx + ox - bw / 2 - 0.01;
        doorZ = bz + oz;
        door.position.set(doorX, 1.25, doorZ);
        door.rotation.y = -Math.PI / 2;
        doorX -= SIDEWALK_W;

        doorX = bx + ox + bw / 2 + 0.01;
        doorZ = bz + oz;
        door.position.set(doorX, 1.25, doorZ);
        door.rotation.y = Math.PI / 2;
        doorX += SIDEWALK_W;
      } else if (minDist === distToTop) {
        doorX = bx + ox;
        doorZ = bz + oz - bd / 2 - 0.01;
        door.position.set(doorX, 1.25, doorZ);
        doorZ -= SIDEWALK_W;

        doorZ = bz + oz + bd / 2 + 0.01;
        door.position.set(doorX, 1.25, doorZ);
        door.rotation.y = Math.PI;
        doorZ += SIDEWALK_W;
      }
      scene.add(door);
      buildingEntries.push({ x: doorX, z: doorZ, blockRow: row, blockCol: col, zone });
    }
  }
}

// NAVMESH — SEPARATE PEDESTRIAN AND ROAD MESHES

function rect(x1, z1, x2, z2) {
  const poly = new YUKA.Polygon();
  poly.fromContour([
    new YUKA.Vector3(x1, 0, z1),
    new YUKA.Vector3(x2, 0, z1),
    new YUKA.Vector3(x2, 0, z2),
    new YUKA.Vector3(x1, 0, z2),
  ]);
  return poly;
}

// --- Pedestrian NavMesh: sidewalks + crosswalks + plaza + building entries ---
const pedPolygons = [];
const debugPedRects = [];
const sidewalkOnlyRects = []; // ONLY sidewalks — not crosswalks, not plaza

function addPedRect(x1, z1, x2, z2, isSidewalk = false) {
  pedPolygons.push(rect(x1, z1, x2, z2));
  debugPedRects.push({ x1, z1, x2, z2 });
  if (isSidewalk) sidewalkOnlyRects.push({ x1, z1, x2, z2 });
}

// Horizontal road segments — from intersection edge to intersection edge
// Uses ROAD_W for z range so they match intersection rects exactly
for (let row = 0; row <= GRID_ROWS; row++) {
  const roadCenterZ = hRoadZ(row);
  const zTop = roadCenterZ - ROAD_W / 2;
  const zBot = roadCenterZ + ROAD_W / 2;

  for (let col = 0; col < GRID_COLS; col++) {
    // Segment between intersection col and col+1
    const x1 = vRoadX(col) + ROAD_W / 2;     // right edge of left intersection
    const x2 = vRoadX(col + 1) - ROAD_W / 2; // left edge of right intersection
    if (x2 > x1) {
      addPedRect(x1, zTop, x2, zTop + SIDEWALK_W, true);  // north sidewalk
      addPedRect(x1, zBot - SIDEWALK_W, x2, zBot, true);  // south sidewalk
    }
  }
}

// Vertical road segments — from intersection edge to intersection edge
for (let col = 0; col <= GRID_COLS; col++) {
  const roadCenterX = vRoadX(col);
  const xLeft = roadCenterX - ROAD_W / 2;
  const xRight = roadCenterX + ROAD_W / 2;

  for (let row = 0; row < GRID_ROWS; row++) {
    const z1 = hRoadZ(row) + ROAD_W / 2;     // bottom edge of top intersection
    const z2 = hRoadZ(row + 1) - ROAD_W / 2; // top edge of bottom intersection
    if (z2 > z1) {
      addPedRect(xLeft, z1, xLeft + SIDEWALK_W, z2, true);  // west sidewalk
      addPedRect(xRight - SIDEWALK_W, z1, xRight, z2, true); // east sidewalk
    }
  }
}

// Intersection crosswalks + corner pads + intersection road surface
for (let row = 0; row <= GRID_ROWS; row++) {
  for (let col = 0; col <= GRID_COLS; col++) {
    const ix = vRoadX(col);

    // Corner sidewalk pads (pedestrian)
    addPedRect(ix - halfRoad, iz - halfRoad,
               ix - halfRoad + SIDEWALK_W, iz - halfRoad + SIDEWALK_W);
    addPedRect(ix + halfRoad - SIDEWALK_W, iz - halfRoad,
               ix + halfRoad, iz - halfRoad + SIDEWALK_W);
    addPedRect(ix - halfRoad, iz + halfRoad - SIDEWALK_W,
               ix - halfRoad + SIDEWALK_W, iz + halfRoad);
    addPedRect(ix + halfRoad - SIDEWALK_W, iz + halfRoad - SIDEWALK_W,
               ix + halfRoad, iz + halfRoad);

    // Crosswalks (pedestrian can cross here)

    addPedRect(ix - cHalf, iz + halfRoad - CROSSWALK_W, ix + cHalf, iz + halfRoad);
    addPedRect(ix - halfRoad, iz - cHalf, ix - halfRoad + CROSSWALK_W, iz + cHalf);

const NPC_COLORS = { pedestrian: 0x05ffa1, police: 0x00a0ff, hostile: 0xff2a6d };
const CAR_COLOR = 0xfcee0a;
const npcs = [];
const cars = [];
const STATE = { IDLE: 0, WALK_TO: 1, AT_DESTINATION: 2, PROTEST: 3 };

// --- Point generation helpers ---
function randomSidewalkPoint() {
  // Pick a random point on a SIDEWALK only (not crosswalk, not plaza)
  const rects = sidewalkOnlyRects.length > 0 ? sidewalkOnlyRects : debugPedRects;
  const r = rects[Math.floor(Math.random() * rects.length)];
  return new YUKA.Vector3(
    r.x1 + Math.random() * (r.x2 - r.x1),
    0,
    r.z1 + Math.random() * (r.z2 - r.z1)
  );
}

// Pick a random edge and lane position for spawning/destination
function randomEdgeLanePosition() {
  const edge = roadGraph.edges[Math.floor(Math.random() * roadGraph.edges.length)];
  // Pick a lane that goes in a positive direction (index 0 or 1)
  const laneIndex = Math.floor(Math.random() * 4);
  const lane = edge.lanes[laneIndex];
  const t = 0.2 + Math.random() * 0.6; // avoid spawning too close to intersections
  let x, z;
  if (edge.horizontal) {
    x = edge.x1 + t * (edge.x2 - edge.x1);
    z = edge.centerZ + lane.offset;
  } else {
    x = edge.centerX + lane.offset;
    z = edge.z1 + t * (edge.z2 - edge.z1);
  }
  return { pos: new YUKA.Vector3(x, 0, z), edge, laneIndex };
}

function randomBuildingEntry() {
  if (buildingEntries.length === 0) return randomSidewalkPoint();
  const e = buildingEntries[Math.floor(Math.random() * buildingEntries.length)];
  return new YUKA.Vector3(e.x, 0, e.z);
}

function findNavPath(from, to, mesh) {
  try {
    return mesh.findPath(from, to);
  } catch {
    return null;
  }
}

function createPathLine(color) {
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.5 });
  const geo = new THREE.BufferGeometry();
  const line = new THREE.Line(geo, mat);
  line.frustumCulled = false;
  scene.add(line);
  return line;
}

function updatePathLine(line, points) {
  if (!points || points.length === 0) {
    line.geometry.setFromPoints([]);
    return;
  }
  const pts = points.map(p => new THREE.Vector3(p.x, 0.3, p.z));
  line.geometry.dispose();
  line.geometry = new THREE.BufferGeometry().setFromPoints(pts);
}

// ============================================================
// SPAWN PEDESTRIAN NPCs
// ============================================================
function spawnNPC(type, hasStateMachine) {
  const vehicle = new YUKA.Vehicle();
  const start = randomSidewalkPoint();
  vehicle.position.copy(start);
  vehicle.maxSpeed = 2.5;
  vehicle.maxForce = 8;
  vehicle.updateNeighborhood = false;

  const color = NPC_COLORS[type] || NPC_COLORS.pedestrian;
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 2.2, 0.8),
    new THREE.MeshStandardMaterial({ color })
  );
  mesh.position.set(start.x, 1.1, start.z);
  mesh.castShadow = true;
  scene.add(mesh);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 8, 6),
    new THREE.MeshStandardMaterial({ color })
  );
  head.position.y = 1.45;
  mesh.add(head);

  vehicle.setRenderComponent(mesh, (entity, renderComponent) => {
    renderComponent.position.set(entity.position.x, 1.1, entity.position.z);
    const dir = entity.getDirection(new YUKA.Vector3());
    if (dir.squaredLength() > 0.001) {
      renderComponent.lookAt(
        entity.position.x + dir.x, 1.1, entity.position.z + dir.z
      );
    }
  });

  const followPath = new YUKA.FollowPathBehavior();
  followPath.active = false;
  vehicle.steering.add(followPath);

  const wander = new YUKA.WanderBehavior();
  wander.radius = 2;
  wander.distance = 4;
  wander.jitter = 10;
  wander.active = false;
  vehicle.steering.add(wander);

  entityManager.add(vehicle);

  const npc = {
    vehicle, mesh, followPath, wander, type,
    state: STATE.IDLE, stateTimer: 0, moveTime: 0,
    currentPath: null,
    pathLine: createPathLine(color),
    hasStateMachine: !!hasStateMachine,
    protestMode: false,
  };

  assignNPCDestination(npc);
  npcs.push(npc);
  return npc;
}

function assignNPCDestination(npc, target) {
  const dest = target || (Math.random() < 0.4 ? randomBuildingEntry() : randomSidewalkPoint());
  const mesh = npc.protestMode ? combinedNavMesh : pedNavMesh;
  const path = findNavPath(
    new YUKA.Vector3(npc.vehicle.position.x, 0, npc.vehicle.position.z),
    dest, mesh
  );

  if (path && path.length > 1) {
    npc.followPath.path = new YUKA.Path();
    for (const p of path) npc.followPath.path.add(p);
    npc.followPath.active = true;
    npc.wander.active = false;
    npc.currentPath = path;
    npc.moveTime = 0;
    npc.state = STATE.WALK_TO;
    updatePathLine(npc.pathLine, path);
  } else {
    npc.followPath.active = false;
    npc.wander.active = true;
    npc.state = STATE.IDLE;
    npc.stateTimer = 1;
    updatePathLine(npc.pathLine, []);
  }
}

// ============================================================
// SPAWN CARS — road graph + lane following (no NavMesh)
// ============================================================

// Find which edge a position is closest to (for route recovery)
function findNearestEdge(x, z) {
  let best = null, bestDist = Infinity;
  for (const edge of roadGraph.edges) {
    let dist;
    if (edge.horizontal) {
      const cx = Math.max(edge.x1, Math.min(edge.x2, x));
      dist = Math.abs(z - edge.centerZ) + Math.abs(x - cx) * 0.1;
    } else {
      const cz = Math.max(edge.z1, Math.min(edge.z2, z));
      dist = Math.abs(x - edge.centerX) + Math.abs(z - cz) * 0.1;
    }
    if (dist < bestDist) { bestDist = dist; best = edge; }
  }
  return best;
}

// Pick a random lane index that goes in a given direction on an edge
function pickLaneForDir(edge, dir) {
  // dir: 1 = positive direction (from→to), -1 = negative (to→from)
  const candidates = [];
  for (let i = 0; i < edge.lanes.length; i++) {
    if (edge.lanes[i].dir === dir) candidates.push(i);
  }
  return candidates.length > 0 ? candidates[Math.floor(Math.random() * candidates.length)] : 0;
}

// Compute the approach direction a car uses when arriving at a node via an edge
function getApproachDir(edge, nodeId) {
  if (edge.horizontal) {
    // Arriving at 'to' node means car was going +X → approaching from West
    if (nodeId === edge.to) return 'W';
    // Arriving at 'from' node means car was going -X → approaching from East
    return 'E';
  } else {
    if (nodeId === edge.to) return 'N';
    return 'S';
  }
}

// Pick next edge at an intersection (random turn)
function pickNextEdge(currentEdge, arrivalNodeId, laneDir) {
  const edges = nodeEdges[arrivalNodeId];
  // Filter: don't U-turn (don't go back on the same edge), and pick edges we can travel on
  const candidates = [];
  for (const e of edges) {
    if (e === currentEdge) continue; // no U-turn
    candidates.push(e);
  }
  if (candidates.length === 0) {
    // Dead end — U-turn allowed
    return { edge: currentEdge, laneDir: -laneDir };
  }
  const next = candidates[Math.floor(Math.random() * candidates.length)];
  // Determine direction on the new edge
  // If we arrived at nodeId, we leave from nodeId
  // If nodeId is next.from, we go dir=1; if nodeId is next.to, we go dir=-1
  const newDir = (arrivalNodeId === next.from) ? 1 : -1;
  return { edge: next, laneDir: newDir };
}

// Compute lane position along an edge at parameter t (0..1 from node 'from' to 'to')
function lanePosition(edge, laneIndex, t) {
  const lane = edge.lanes[laneIndex];
  if (edge.horizontal) {
    return {
      x: edge.x1 + t * (edge.x2 - edge.x1),
      z: edge.centerZ + lane.offset,
    };
  } else {
    return {
      x: edge.centerX + lane.offset,
      z: edge.z1 + t * (edge.z2 - edge.z1),
    };
  }
}

// Compute parameter t for a position on an edge
function edgeParameter(edge, x, z) {
  if (edge.horizontal) {
    const len = edge.x2 - edge.x1;
    return len > 0 ? (x - edge.x1) / len : 0.5;
  } else {
    const len = edge.z2 - edge.z1;
    return len > 0 ? (z - edge.z1) / len : 0.5;
  }
}

// Assign initial route to a car
function assignCarRoute(car) {
  const spawn = randomEdgeLanePosition();
  car.currentEdge = spawn.edge;
  car.laneIndex = spawn.laneIndex;
  car.laneDir = spawn.edge.lanes[spawn.laneIndex].dir;
  car.t = edgeParameter(spawn.edge, spawn.pos.x, spawn.pos.z);
  car.speed = 8 + Math.random() * 6;  // 8-14 m/s
  car.maxSpeed = car.speed;
  car.stopped = false;
  car.stopTimer = 0;

  // Snap car to lane position
  const p = lanePosition(car.currentEdge, car.laneIndex, car.t);
  car.vehicle.position.set(p.x, 0, p.z);
  car.mesh.position.set(p.x, 0, p.z);
}

function spawnCar() {
  const vehicle = new YUKA.Vehicle();
  vehicle.maxSpeed = 12;
  vehicle.maxForce = 15;
  vehicle.updateNeighborhood = false;

  const bodyColor = [0xfcee0a, 0xff4444, 0x4488ff, 0x44ff44, 0xffffff, 0x888888][Math.floor(Math.random() * 6)];
  const group = new THREE.Group();

  // Car body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(4, 1.2, 2),
    new THREE.MeshStandardMaterial({ color: bodyColor })
  );
  body.position.y = 0.6;
  group.add(body);

  // Cabin
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(2, 0.8, 1.6),
    new THREE.MeshStandardMaterial({ color: 0x222233 })
  );
  cabin.position.set(-0.3, 1.3, 0);
  group.add(cabin);

  // Headlights
  const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 0.3 });
  const hlL = new THREE.Mesh(new THREE.SphereGeometry(0.15, 4, 4), hlMat);
  hlL.position.set(2, 0.5, 0.7);
  group.add(hlL);
  const hlR = new THREE.Mesh(new THREE.SphereGeometry(0.15, 4, 4), hlMat);
  hlR.position.set(2, 0.5, -0.7);
  group.add(hlR);

  // Taillights
  const tlMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.2 });
  const tlL = new THREE.Mesh(new THREE.SphereGeometry(0.12, 4, 4), tlMat);
  tlL.position.set(-2, 0.5, 0.7);
  group.add(tlL);
  const tlR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 4, 4), tlMat);
  tlR.position.set(-2, 0.5, -0.7);
  group.add(tlR);

  group.position.set(0, 0, 0);
  group.castShadow = true;
  scene.add(group);

  // We use yuka Vehicle for entity management but NOT for steering
  vehicle.setRenderComponent(group, (entity, renderComponent) => {
    renderComponent.position.set(entity.position.x, 0, entity.position.z);
  });

  entityManager.add(vehicle);

  const car = {
    vehicle, mesh: group,
    pathLine: createPathLine(bodyColor),
    // Lane following state
    currentEdge: null, laneIndex: 0, laneDir: 1,
    t: 0.5, speed: 10, maxSpeed: 10,
    stopped: false, stopTimer: 0,
    prevX: 0, prevZ: 0,  // for rotation smoothing
  };

  assignCarRoute(car);
  car.prevX = car.vehicle.position.x;
  car.prevZ = car.vehicle.position.z;
  cars.push(car);
  return car;
}

// ============================================================
// STATE MACHINE UPDATE — SPECIAL NPCs
// ============================================================
function updateNPCState(npc, dt) {
  const speed = npc.vehicle.velocity.length();

  switch (npc.state) {
    case STATE.IDLE:
      npc.followPath.active = false;
      npc.wander.active = true;
      npc.vehicle.maxSpeed = 0.8;
      npc.stateTimer -= dt;
      if (npc.stateTimer <= 0) {
        if (npc.protestMode) {
          npc.vehicle.maxSpeed = 3;
          const px = PLAZA_X + (Math.random() - 0.5) * 30;
          const pz = PLAZA_Z + (Math.random() - 0.5) * 20;
          assignNPCDestination(npc, new YUKA.Vector3(px, 0, pz));
          npc.state = STATE.PROTEST;
        } else {
          npc.vehicle.maxSpeed = 2.5;
          assignNPCDestination(npc);
        }
      }
      break;

    case STATE.WALK_TO:
      npc.moveTime += dt;
      if (npc.moveTime > 0.5 && speed < 0.1 && npc.followPath.active) {
        npc.state = STATE.AT_DESTINATION;
        npc.stateTimer = 2 + Math.random() * 3;
        npc.followPath.active = false;
        npc.wander.active = false;
        updatePathLine(npc.pathLine, []);
      }
      break;

    case STATE.AT_DESTINATION:
      npc.wander.active = true;
      npc.vehicle.maxSpeed = 0.5;
      npc.stateTimer -= dt;
      if (npc.stateTimer <= 0) {
        npc.state = STATE.IDLE;
        npc.stateTimer = 0.5;
        npc.wander.active = false;
      }
      break;

    case STATE.PROTEST:
      npc.moveTime += dt;
      if (npc.moveTime > 0.5 && speed < 0.1 && npc.followPath.active) {
        npc.followPath.active = false;
        npc.wander.active = true;
        npc.vehicle.maxSpeed = 1.2;
      }
      if (!npc.protestMode) {
        npc.state = STATE.IDLE;
        npc.stateTimer = 1;
        npc.wander.active = false;
      }
      break;
  }
}

// Simple NPC update (non-state-machine)
function updateSimpleNPC(npc, dt) {
  npc.moveTime += dt;
  const speed = npc.vehicle.velocity.length();
  if (npc.moveTime > 0.5 && speed < 0.1 && npc.followPath.active) {
    npc.stateTimer += dt;
    if (npc.stateTimer > 2) {
      npc.stateTimer = 0;
      assignNPCDestination(npc);
    }
  } else if (speed >= 0.1) {
    npc.stateTimer = 0;
  }
}

// Car update with traffic light stops
// Car update: lane following along road graph edges
function updateCar(car, dt) {
  if (!car.currentEdge) {
    assignCarRoute(car);
    return;
  }

  const edge = car.currentEdge;
  const lane = edge.lanes[car.laneIndex];
  const edgeLen = edge.horizontal ? (edge.x2 - edge.x1) : (edge.z2 - edge.z1);
  if (edgeLen <= 0) { assignCarRoute(car); return; }

  // Compute parameter step
  const tStep = (car.speed * dt) / edgeLen;

  // Advance t in lane direction
  if (car.laneDir > 0) {
    // laneDir 1 means lane.dir determines actual motion direction
    car.t += lane.dir * tStep;
  } else {
    car.t += lane.dir * tStep;
  }

  // Determine which intersection we're approaching
  const approachingEnd = car.t >= 1.0;
  const approachingStart = car.t <= 0.0;
  const STOP_DIST = 0.1; // t-parameter distance to start checking lights

  // Check if approaching an intersection — need to check traffic light
  if (!car.stopped) {
    let nearEndNode = null;
    let approachDir = null;

    if (car.t > (1.0 - STOP_DIST)) {
      nearEndNode = edge.to;
      approachDir = getApproachDir(edge, edge.to);
    } else if (car.t < STOP_DIST) {
      nearEndNode = edge.from;
      approachDir = getApproachDir(edge, edge.from);
    }

    if (nearEndNode && approachDir) {
      const green = isGreenForApproach(nearEndNode, approachDir);
      if (!green && !approachingEnd && !approachingStart) {
        car.stopped = true;
        car.stopApproach = approachDir;
        car.stopNodeId = nearEndNode;
        // Clamp t so car doesn't enter intersection
        if (car.t > 0.5) car.t = Math.min(car.t, 1.0 - STOP_DIST * 0.3);
        else car.t = Math.max(car.t, STOP_DIST * 0.3);
      }
    }
  } else {
    // Check if light has turned green
    if (car.stopNodeId && car.stopApproach) {
      const green = isGreenForApproach(car.stopNodeId, car.stopApproach);
      if (green) {
        car.stopped = false;
        car.stopNodeId = null;
        car.stopApproach = null;
      }
    }
  }

  // If stopped, don't move
  if (car.stopped) {
    // Keep position stable
    const p = lanePosition(edge, car.laneIndex, car.t);
    car.vehicle.position.set(p.x, 0, p.z);
    car.mesh.position.set(p.x, 0, p.z);
    return;
  }

  // Check if car reached end of edge
  if (approachingEnd || approachingStart) {
    const arrivalNodeId = approachingEnd ? edge.to : edge.from;
    const result = pickNextEdge(edge, arrivalNodeId, lane.dir);
    car.currentEdge = result.edge;
    car.laneIndex = pickLaneForDir(result.edge, result.laneDir);
    car.laneDir = result.laneDir;

    // Place at start of new edge
    const node = roadGraph.nodes[arrivalNodeId];
    if (result.laneDir > 0) {
      // Going from→to: start at from end
      car.t = (arrivalNodeId === result.edge.from) ? 0.05 : 0.95;
    } else {
      car.t = (arrivalNodeId === result.edge.to) ? 0.95 : 0.05;
    }
  }

  // Update position on lane
  car.t = Math.max(0, Math.min(1, car.t));
  const p = lanePosition(car.currentEdge, car.laneIndex, car.t);
  car.vehicle.position.set(p.x, 0, p.z);
  car.mesh.position.set(p.x, 0, p.z);

  // Smooth rotation: face direction of travel
  const dx = p.x - car.prevX;
  const dz = p.z - car.prevZ;
  if (Math.abs(dx) > 0.01 || Math.abs(dz) > 0.01) {
    const angle = Math.atan2(dx, dz);
    // Smooth rotate toward target angle
    let current = car.mesh.rotation.y;
    let diff = angle - current;
    // Normalize to -PI..PI
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    car.mesh.rotation.y += diff * Math.min(1, dt * 8);
  }
  car.prevX = p.x;
  car.prevZ = p.z;

  // Update path debug line (show next few waypoints)
  const fromNode = roadGraph.nodes[car.currentEdge.from];
  const toNode = roadGraph.nodes[car.currentEdge.to];
  updatePathLine(car.pathLine, [
    { x: car.vehicle.position.x, z: car.vehicle.position.z },
    { x: (lane.dir > 0) ? toNode.x : fromNode.x, z: (lane.dir > 0) ? toNode.z : fromNode.z },
  ]);
}

let protestActive = false;
let showTrafficLights = true;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    protestActive = !protestActive;
    smNPCs.forEach(npc => { npc.protestMode = protestActive; });
  }
  if (e.code === 'KeyD') {
    debugMeshVisible = !debugMeshVisible;
    debugGroup.visible = debugMeshVisible;
  }
  if (e.code === 'KeyL') {
    showTrafficLights = !showTrafficLights;
    for (const tl of trafficLights) {
      for (const a in tl.lights) tl.lights[a].group.visible = showTrafficLights;
    }
  }
  if (e.code === 'KeyR') {
    npcs.forEach(npc => {
      npc.state = STATE.IDLE;
      npc.stateTimer = 0;
      npc.protestMode = false;
      assignNPCDestination(npc);
    });
    protestActive = false;
  }
});

// ============================================================
// HUD
// ============================================================
const hudEl = document.getElementById('hud');
let frameCount = 0, fps = 0, lastFPSTime = performance.now();

function updateHUD() {
  frameCount++;
  const now = performance.now();
  if (now - lastFPSTime > 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFPSTime = now;
  }

  const stateNames = ['IDLE', 'WALK_TO', 'AT_DEST', 'PROTEST'];
  const smStatus = smNPCs.map(n =>
    `  ${n.type.padEnd(10)} ${stateNames[n.state]}`
  ).join('\n');

  // Count zones
  const zoneCounts = {};
  for (const row of blockZones) for (const z of row) zoneCounts[z] = (zoneCounts[z] || 0) + 1;
  const zoneStr = Object.entries(zoneCounts).map(([k, v]) => `${k}:${v}`).join(' ');

  hudEl.innerHTML = `
<span class="label">YUKA ROAD GRAPH PROTOTYPE v3</span>
<span class="label">FPS:</span> ${fps} &nbsp; <span class="label">Entities:</span> ${npcs.length + cars.length}
<span class="label">Pedestrians:</span> ${npcs.length} &nbsp; <span class="label">Cars:</span> ${cars.length}
<span class="label">Ped NavMesh:</span> ${pedPolygons.length} polys &nbsp; <span class="label">Road Graph:</span> ${Object.keys(roadGraph.nodes).length} nodes, ${roadGraph.edges.length} edges
<span class="label">Building entries:</span> ${buildingEntries.length} &nbsp; <span class="label">Intersections:</span> ${intersections.length}
<span class="label">Protest:</span> ${protestActive ? '<span class="warn">ACTIVE — NPCs march in street</span>' : 'off'}
<span class="zone">Zones:</span> ${zoneStr}
<span class="label">State machines:</span>
${smStatus}
  `.trim().replace(/\n/g, '<br>');
}

// ============================================================
// ANIMATION LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  const delta = time.update().getDelta();
  const dt = Math.min(delta, 0.1);

  // Update traffic lights
  updateTrafficLights(dt);

  // Update NPCs
  for (const npc of npcs) {
    if (npc.hasStateMachine) {
      updateNPCState(npc, dt);
    } else {
      updateSimpleNPC(npc, dt);
    }
  }

  // Update cars
  for (const car of cars) {
    updateCar(car, dt);
  }

  // Update yuka entity manager
  entityManager.update(delta);

  // Clamp NPCs to pedestrian NavMesh (prevent walking through buildings)
  const _clampResult = new YUKA.Vector3();
  for (const npc of npcs) {
    const pos = npc.vehicle.position;
    const mesh = npc.protestMode ? combinedNavMesh : pedNavMesh;
    try {
      mesh.clampMovement(pos, pos, _clampResult);
      pos.copy(_clampResult);
    } catch(e) { /* outside navmesh entirely, leave as-is */ }
  }
  // Cars use road graph lane following — no NavMesh clamping needed

  controls.update();
  renderer.render(scene, camera);
  updateHUD();
}

animate();

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
