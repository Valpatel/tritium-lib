<html lang="en">
<head>
<meta charset="utf-8">
<title>City3D — Clean Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 10px; left: 10px; color: #00f0ff; font-size: 13px;
    background: rgba(10,10,15,0.85); padding: 10px 14px; border: 1px solid #00f0ff33;
    border-radius: 4px; pointer-events: none; line-height: 1.6;
  }
  #hud .g { color: #05ffa1; }
  #hud .y { color: #fcee0a; }
  #controls {
    position: fixed; bottom: 10px; left: 10px; color: #00f0ff88; font-size: 11px;
    pointer-events: none;
  }
  #tooltip {
    position: fixed; display: none; background: rgba(0,0,0,0.85); color: #00f0ff;
    padding: 4px 8px; border: 1px solid #00f0ff44; border-radius: 3px;
    font-size: 12px; pointer-events: none; z-index: 999;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.172.0/build/three.webgpu.js",
    "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/",
    "yuka": "https://unpkg.com/yuka@0.7.8/build/yuka.module.js"
  }
}
</script>
</head>
<body>
<div id="hud"></div>
<div id="tooltip"></div>
<div id="controls">[SPACE] Protest &nbsp; [+/-] Cars &nbsp; [1-5] Speed &nbsp; [C] Debug</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

import { RoadNetwork } from './js/sim/road-network.js';
import { World } from './js/sim/core/world.js';
import { computeWeather } from './js/sim/weather.js';

// ============================================================
// CONSTANTS
// ============================================================
const BLOCK_W = 60, BLOCK_H = 50, ROAD_W = 16;
const GRID_COLS = 8, GRID_ROWS = 6;
const CITY_W = GRID_COLS * (BLOCK_W + ROAD_W) + ROAD_W;
const CITY_H = GRID_ROWS * (BLOCK_H + ROAD_W) + ROAD_W;
const LANE_W = 3;

// ============================================================
// THREE.JS SETUP
// ============================================================
const renderer = new THREE.WebGPURenderer({ antialias: true });
await renderer.init();
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 500, 1500);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 2000);
camera.position.set(CITY_W / 2, 80, CITY_H / 2 + 120);
camera.lookAt(CITY_W / 2, 0, CITY_H / 2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(CITY_W / 2, 0, CITY_H / 2);
controls.minDistance = 10;
controls.maxDistance = 800;
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();

// Lighting
const ambient = new THREE.AmbientLight(0x334455, 0.7);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffeedd, 1.4);
sun.position.set(CITY_W / 2, 150, CITY_H / 3);
scene.add(sun);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(CITY_W + 40, CITY_H + 40),
  new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(CITY_W / 2, -0.05, CITY_H / 2);
scene.add(ground);

// ============================================================
// CITY GEOMETRY (roads, buildings, trees — batched for performance)
// ============================================================
// Road surfaces, lane markings, sidewalks, crosswalks
// (Reuse the batched geometry building from the old prototype)
// For now: simple road rectangles
const roadMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.8 });
const buildingEntries = [];

function hRoadZ(row) { return row * (BLOCK_H + ROAD_W) + ROAD_W / 2; }
function vRoadX(col) { return col * (BLOCK_W + ROAD_W) + ROAD_W / 2; }

// Horizontal roads
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = hRoadZ(row);
  const geo = new THREE.PlaneGeometry(CITY_W, ROAD_W - 4);
  geo.rotateX(-Math.PI / 2);
  geo.translate(CITY_W / 2, 0.01, z);
  scene.add(new THREE.Mesh(geo, roadMat));
}

// Vertical roads
for (let col = 0; col <= GRID_COLS; col++) {
  const x = vRoadX(col);
  const geo = new THREE.PlaneGeometry(ROAD_W - 4, CITY_H);
  geo.rotateX(-Math.PI / 2);
  geo.translate(x, 0.01, CITY_H / 2);
  scene.add(new THREE.Mesh(geo, roadMat));
}

// Intersection squares
for (let row = 0; row <= GRID_ROWS; row++) {
  for (let col = 0; col <= GRID_COLS; col++) {
    const ix = vRoadX(col), iz = hRoadZ(row);
    const geo = new THREE.PlaneGeometry(ROAD_W, ROAD_W);
    geo.rotateX(-Math.PI / 2);
    geo.translate(ix, 0.01, iz);
    scene.add(new THREE.Mesh(geo, roadMat));
  }
}

// Lane markings (batched into merged geometry)
const yellowGeos = [], whiteGeos = [], crosswalkGeos = [];
const DASH = 2, GAP = 3, MW = 0.15;

// Horizontal road markings
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = hRoadZ(row);
  for (let col = 0; col < GRID_COLS; col++) {
    const x1 = vRoadX(col) + ROAD_W / 2;
    const x2 = vRoadX(col + 1) - ROAD_W / 2;
    const segLen = x2 - x1;
    const nDash = Math.floor(segLen / (DASH + GAP));
    for (let d = 0; d < nDash; d++) {
      const cx = x1 + (d + 0.5) * (DASH + GAP);
      // Center yellow
      const yg = new THREE.PlaneGeometry(DASH, MW); yg.rotateX(-Math.PI / 2); yg.translate(cx, 0.015, z);
      yellowGeos.push(yg);
      // White between lanes
      const wg1 = new THREE.PlaneGeometry(DASH, MW); wg1.rotateX(-Math.PI / 2); wg1.translate(cx, 0.015, z - LANE_W);
      const wg2 = new THREE.PlaneGeometry(DASH, MW); wg2.rotateX(-Math.PI / 2); wg2.translate(cx, 0.015, z + LANE_W);
      whiteGeos.push(wg1, wg2);
    }
  }
}

// Vertical road markings
for (let col = 0; col <= GRID_COLS; col++) {
  const x = vRoadX(col);
  for (let row = 0; row < GRID_ROWS; row++) {
    const z1 = hRoadZ(row) + ROAD_W / 2;
    const z2 = hRoadZ(row + 1) - ROAD_W / 2;
    const segLen = z2 - z1;
    const nDash = Math.floor(segLen / (DASH + GAP));
    for (let d = 0; d < nDash; d++) {
      const cz = z1 + (d + 0.5) * (DASH + GAP);
      const yg = new THREE.PlaneGeometry(MW, DASH); yg.rotateX(-Math.PI / 2); yg.translate(x, 0.015, cz);
      yellowGeos.push(yg);
      const wg1 = new THREE.PlaneGeometry(MW, DASH); wg1.rotateX(-Math.PI / 2); wg1.translate(x - LANE_W, 0.015, cz);
      const wg2 = new THREE.PlaneGeometry(MW, DASH); wg2.rotateX(-Math.PI / 2); wg2.translate(x + LANE_W, 0.015, cz);
      whiteGeos.push(wg1, wg2);
    }
  }
}

// Crosswalks at intersections
for (let row = 0; row <= GRID_ROWS; row++) {
  for (let col = 0; col <= GRID_COLS; col++) {
    const ix = vRoadX(col), iz = hRoadZ(row);
    const cw = 3; // crosswalk width
    // 4 crosswalks per intersection (N, S, E, W)
    for (const [dx, dz, isH] of [[0, -(ROAD_W/2-1), true], [0, ROAD_W/2-1, true], [-(ROAD_W/2-1), 0, false], [ROAD_W/2-1, 0, false]]) {
      for (let s = -3; s <= 3; s++) {
        const sg = isH
          ? new THREE.PlaneGeometry(1.2, 0.4)
          : new THREE.PlaneGeometry(0.4, 1.2);
        sg.rotateX(-Math.PI / 2);
        sg.translate(ix + dx + (isH ? s * 1.5 : 0), 0.02, iz + dz + (isH ? 0 : s * 1.5));
        crosswalkGeos.push(sg);
      }
    }
  }
}

// Merge and add
if (yellowGeos.length) {
  const m = mergeGeometries(yellowGeos, false);
  scene.add(new THREE.Mesh(m, new THREE.MeshBasicMaterial({ color: 0xccaa00 })));
}
if (whiteGeos.length) {
  const m = mergeGeometries(whiteGeos, false);
  scene.add(new THREE.Mesh(m, new THREE.MeshBasicMaterial({ color: 0xdddddd })));
}
if (crosswalkGeos.length) {
  const m = mergeGeometries(crosswalkGeos, false);
  scene.add(new THREE.Mesh(m, new THREE.MeshBasicMaterial({ color: 0xffffff })));
}

// Sidewalks (raised, lighter color) — batched
const sidewalkGeos = [];
const SW = 2; // sidewalk width
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = hRoadZ(row);
  for (const side of [-1, 1]) {
    const g = new THREE.PlaneGeometry(CITY_W, SW);
    g.rotateX(-Math.PI / 2);
    g.translate(CITY_W / 2, 0.05, z + side * (ROAD_W / 2 - SW / 2 + 0.5));
    sidewalkGeos.push(g);
  }
}
for (let col = 0; col <= GRID_COLS; col++) {
  const x = vRoadX(col);
  for (const side of [-1, 1]) {
    const g = new THREE.PlaneGeometry(SW, CITY_H);
    g.rotateX(-Math.PI / 2);
    g.translate(x + side * (ROAD_W / 2 - SW / 2 + 0.5), 0.05, CITY_H / 2);
    sidewalkGeos.push(g);
  }
}
if (sidewalkGeos.length) {
  scene.add(new THREE.Mesh(mergeGeometries(sidewalkGeos, false), new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 })));
}

// Buildings with zone-based variety
const ZONE_COLORS = {
  residential: 0x8B7355, commercial: 0x556677, office: 0x667788,
  civic: 0x557788, park: 0x2a5a2a, parking: 0x444444,
};
const ZONES = ['residential', 'commercial', 'office', 'residential', 'civic', 'residential'];
const seeded = ((s) => () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; })(42);
const buildGeos = {}; // color → [geos] for batching

// Instanced trees (1 draw call for all trunks, 1 for all canopies)
const treePositions = [];

for (let row = 0; row < GRID_ROWS; row++) {
  for (let col = 0; col < GRID_COLS; col++) {
    const bx = col * (BLOCK_W + ROAD_W) + ROAD_W + BLOCK_W / 2;
    const bz = row * (BLOCK_H + ROAD_W) + ROAD_W + BLOCK_H / 2;
    const zone = (col === 4 && row === 3) ? 'park' : ZONES[Math.floor(seeded() * ZONES.length)];
    const zoneColor = ZONE_COLORS[zone] || 0x667788;

    if (zone === 'park') {
      // Green ground + instanced trees
      const pg = new THREE.PlaneGeometry(BLOCK_W - 2, BLOCK_H - 2);
      pg.rotateX(-Math.PI / 2); pg.translate(bx, 0.04, bz);
      scene.add(new THREE.Mesh(pg, new THREE.MeshStandardMaterial({ color: 0x2a5a2a })));
      for (let t = 0; t < 6; t++) {
        treePositions.push({
          x: bx + (seeded() - 0.5) * (BLOCK_W - 8),
          z: bz + (seeded() - 0.5) * (BLOCK_H - 8),
          r: 1.5 + seeded() * 1.5, h: 3.5 + seeded(),
        });
      }
    } else {
      // 1-2 buildings per block
      const count = 1 + Math.floor(seeded() * 2);
      for (let b = 0; b < count; b++) {
        const h = zone === 'office' ? 12 + seeded() * 30 : 5 + seeded() * 20;
        const w = 10 + seeded() * 25;
        const d = 10 + seeded() * 18;
        const ox = (seeded() - 0.5) * (BLOCK_W - w - 4);
        const oz = (seeded() - 0.5) * (BLOCK_H - d - 4);
        const key = zoneColor;
        if (!buildGeos[key]) buildGeos[key] = [];
        const bg = new THREE.BoxGeometry(w, h, d);
        bg.translate(bx + ox, h / 2, bz + oz);
        buildGeos[key].push(bg);
      }
    }

    buildingEntries.push({ x: bx, z: bz + BLOCK_H / 2 - 2, blockRow: row, blockCol: col, zone });
    buildingEntries.push({ x: bx, z: bz - BLOCK_H / 2 + 2, blockRow: row, blockCol: col, zone });
  }
}

// Batch buildings by zone color
for (const [colorKey, geos] of Object.entries(buildGeos)) {
  if (geos.length === 0) continue;
  const merged = mergeGeometries(geos, false);
  const mat = new THREE.MeshStandardMaterial({ color: parseInt(colorKey), roughness: 0.7 });
  const mesh = new THREE.Mesh(merged, mat);
  mesh.castShadow = true;
  scene.add(mesh);
}

// Instanced trees (2 draw calls total)
if (treePositions.length > 0) {
  const trunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 3, 6);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3520 });
  const trunkMesh = new THREE.InstancedMesh(trunkGeo, trunkMat, treePositions.length);
  const canopyGeo = new THREE.SphereGeometry(1, 8, 6);
  const canopyMat = new THREE.MeshStandardMaterial({ color: 0x228833 });
  const canopyMesh = new THREE.InstancedMesh(canopyGeo, canopyMat, treePositions.length);
  const dm = new THREE.Object3D();
  for (let i = 0; i < treePositions.length; i++) {
    const t = treePositions[i];
    dm.position.set(t.x, 1.5, t.z); dm.scale.set(1,1,1); dm.updateMatrix();
    trunkMesh.setMatrixAt(i, dm.matrix);
    dm.position.set(t.x, t.h, t.z); dm.scale.set(t.r, t.r, t.r); dm.updateMatrix();
    canopyMesh.setMatrixAt(i, dm.matrix);
  }
  trunkMesh.instanceMatrix.needsUpdate = true;
  canopyMesh.instanceMatrix.needsUpdate = true;
  trunkMesh.castShadow = true; canopyMesh.castShadow = true;
  scene.add(trunkMesh); scene.add(canopyMesh);
}

// ============================================================
// ROAD NETWORK
// ============================================================
const roadNetwork = new RoadNetwork();
roadNetwork.buildFromGrid(GRID_COLS, GRID_ROWS, BLOCK_W, BLOCK_H, ROAD_W, LANE_W, 2);

// ============================================================
// WORLD
// ============================================================
const world = new World(scene, roadNetwork, {
  maxVehicles: 5000,
  maxPedestrians: 500,
  startHour: 7,
  timeScale: 1,
  buildingEntries,
});

// Initial spawn
world.spawnCars(200);
world.spawnPedestrians(50, buildingEntries);

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  // Tick simulation
  world.tick(dt);

  // Update weather (sky, lighting)
  const weather = world.getWeather();
  const skyC = new THREE.Color(weather.skyColor);
  scene.background.copy(skyC);
  scene.fog.color.copy(skyC);
  scene.fog.near = world.isNight ? 200 : 500;
  scene.fog.far = world.isNight ? 600 : 1500;
  ambient.intensity = weather.ambientIntensity;
  sun.intensity = weather.sunIntensity;

  // Render
  controls.update();
  renderer.render(scene, camera);

  // HUD
  const s = world.getStats();
  document.getElementById('hud').innerHTML = `
    <span class="g">CITY3D</span> — ${s.simTime} Day ${s.day}
    FPS: ${s.fps} &nbsp; Draws: ${s.drawCalls}
    <span class="g">Cars:</span> ${s.vehicles} (${s.vehiclesStopped} stopped)
    <span class="g">Peds:</span> ${s.pedestrians} (${s.pedsDown} down)
    ${s.spawning > 0 ? `<span class="y">Spawning: ${s.spawning}</span>` : ''}
  `.trim().replace(/\n\s*/g, '<br>');
}

animate();

// ============================================================
// CONTROLS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.code === 'Equal' || e.code === 'NumpadAdd') world.addCars(50);
  if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
    // Remove last 50 vehicles
    for (let i = 0; i < 50 && world.vehicles.length > 10; i++) world.vehicles.pop();
  }
  if (e.code >= 'Digit1' && e.code <= 'Digit5') {
    world.setTimeScale([0.5, 1, 2, 5, 10][parseInt(e.code.slice(5)) - 1]);
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Expose for debugging
window.__city3d = world;
</script>
</body>
</html>
