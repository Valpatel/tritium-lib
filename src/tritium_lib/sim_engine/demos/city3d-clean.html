<html lang="en">
<head>
<meta charset="utf-8">
<title>City3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud { position: fixed; top: 10px; left: 10px; color: #00f0ff; font-size: 13px;
    background: rgba(10,10,15,0.85); padding: 10px 14px; border: 1px solid #00f0ff33;
    border-radius: 4px; pointer-events: none; line-height: 1.6; }
  #hud .g { color: #05ffa1; }
  #controls { position: fixed; bottom: 10px; left: 10px; color: #00f0ff88; font-size: 11px; pointer-events: none; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.172.0/build/three.webgpu.js",
    "three/addons/": "https://unpkg.com/three@0.172.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud"></div>
<div id="controls">[+/-] Cars &nbsp; [1-5] Speed &nbsp; [SPACE] Protest</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CityBuilder } from './js/sim/core/city-builder.js';
import { World } from './js/sim/core/world.js';
import { computeWeather } from './js/sim/weather.js';

// ---- Renderer ----
const renderer = new THREE.WebGPURenderer({ antialias: true });
await renderer.init();
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// ---- Scene ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 500, 1500);
const ambient = new THREE.AmbientLight(0x334455, 0.7);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffeedd, 1.4);
sun.position.set(300, 150, 200);
scene.add(sun);

// ---- Build City ----
const city = CityBuilder.buildGrid(scene, { cols: 8, rows: 6 });

// ---- Camera ----
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 2000);
camera.position.set(city.width / 2, 120, city.height / 2 + 180);
camera.lookAt(city.width / 2, 0, city.height / 2);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(city.width / 2, 0, city.height / 2);
controls.minDistance = 10; controls.maxDistance = 800;
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();

// ---- World ----
const world = new World(scene, city.roadNetwork, {
  trafficCtrl: city.trafficMgr,
  buildingEntries: city.entries,
  startHour: 7, timeScale: 1,
});
world.spawnCars(200);
world.spawnPedestrians(50, city.entries);

// ---- Animation Loop ----
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);

  // Traffic lights
  city.trafficMgr.tick(dt);
  for (let i = 0; i < city.tlPositions.length; i++) {
    const tl = city.tlPositions[i];
    const state = city.trafficMgr.getLightState(tl.nodeId, tl.approach);
    const r = state === 'red' ? 1 : 0, g = state === 'green' ? 1 : 0, b = 0;
    const y = state === 'yellow' ? 0.8 : 0;
    city.bulbMesh.instanceColor.setXYZ(i, r + y, g + y, b);
  }
  city.bulbMesh.instanceColor.needsUpdate = true;

  // Simulation
  world.tick(dt);

  // Weather
  const weather = world.getWeather();
  const skyC = new THREE.Color(weather.skyColor);
  scene.background.copy(skyC);
  if (scene.fog) { scene.fog.color.copy(skyC); scene.fog.near = world.isNight ? 200 : 500; scene.fog.far = world.isNight ? 600 : 1500; }
  ambient.intensity = weather.ambientIntensity;
  sun.intensity = weather.sunIntensity;

  // Render
  controls.update();
  renderer.render(scene, camera);

  // HUD
  const s = world.getStats();
  document.getElementById('hud').innerHTML =
    `<span class="g">CITY3D</span> ${s.simTime} Day ${s.day} FPS:${s.fps}<br>` +
    `<span class="g">Cars:</span> ${s.vehicles} (${s.vehiclesStopped} stopped)<br>` +
    `<span class="g">Peds:</span> ${s.pedestrians} (${s.pedsDown} down)` +
    (s.spawning > 0 ? `<br>Spawning: ${s.spawning}` : '');
}
animate();

// ---- Controls ----
document.addEventListener('keydown', (e) => {
  if (e.code === 'Equal' || e.code === 'NumpadAdd') world.addCars(50);
  if (e.code === 'Minus' || e.code === 'NumpadSubtract') { for (let i = 0; i < 50 && world.vehicles.length > 10; i++) world.vehicles.pop(); }
  if (e.code >= 'Digit1' && e.code <= 'Digit5') world.setTimeScale([0.5, 1, 2, 5, 10][parseInt(e.code.slice(5)) - 1]);
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Debug
window.__city3d = world;
window.__city = city;
</script>
</body>
</html>
