// =========================================================================
// Update Loop
// =========================================================================
let lastTime = performance.now();
let frameCount = 0;
let fpsDisplay = 0;
let fpsTimer = 0;

function update(dt) {
  // Advance sim time (1 real second = 2 sim minutes)
  simTime += dt * (2 / 60);
  if (simTime >= 24) simTime -= 24;

  const isNight = nightMode || simTime < 6 || simTime > 20;

  // Day/night lighting
  const dayFactor = isNight ? 0.2 : 1.0;
  ambientLight.intensity = 0.3 + dayFactor * 0.4;
  sunLight.intensity = dayFactor * 1.2;
  hemiLight.intensity = 0.3 + dayFactor * 0.3;
  scene.fog.density = isNight ? 0.004 : 0.0015;
  renderer.toneMappingExposure = isNight ? 0.9 : 1.4;

  // Street lamps
  for (const lamp of streetLamps) {
    lamp.light.intensity = isNight ? 1.5 : 0.2;
  }

  // ---- Update pedestrians ----
  let needsPersonUpdate = false;
  for (const ped of pedestrians) {
    if (!ped.alive) continue;

    // If riot, civilians near plaza flee
    if (riotMode && !ped.fleeing) {
      const distToPlaza = dist2d(ped, { x: PLAZA_X, z: PLAZA_Z });
      if (distToPlaza < 80 && riotPhase !== 'PEACEFUL') {
        ped.fleeing = true;
        ped.speed = 3 + rng() * 2;
        // Pick a building FAR from the plaza to flee to (away from danger)
        if (buildings.length > 0) {
          let bestBldg = null, bestDist = 0;
          for (let bi = 0; bi < Math.min(buildings.length, 20); bi++) {
            const candidate = buildings[Math.floor(rng() * buildings.length)];
            const bd = dist2d(candidate, { x: PLAZA_X, z: PLAZA_Z });
            if (bd > bestDist) { bestDist = bd; bestBldg = candidate; }
          }
          if (bestBldg) {
            ped.target = { x: bestBldg.x, z: bestBldg.z + bestBldg.d / 2 };
          } else {
            ped.target = edgeSpawnPos();
          }
        } else {
          ped.target = edgeSpawnPos();
        }
        if (rng() < 0.15) addKillFeedEntry('Civilian fled to building');
      }
    }

    const dx = ped.target.x - ped.x;
    const dz = ped.target.z - ped.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 2) {
      if (ped.fleeing) {
        ped.alive = false;
        hidePersonInstance(ped.slot);
      } else {
        ped.target = randomSidewalkPos();
      }
    } else {
      const s = ped.speed * dt;
      ped.x += (dx / dist) * s;
      ped.z += (dz / dist) * s;
      ped.rotY = Math.atan2(dx, dz);
    }

    if (ped.alive) {
      updatePersonInstance(ped.slot, ped.x, 0, ped.z, ped.rotY, ped.bodyColor, ped.headColor, ped.scale);
      needsPersonUpdate = true;
    }
  }

  let needsCarUpdate = false;

  // ---- Update car-driving civilians ----
  for (const cd of carDrivers) {
    if (!cd.alive) continue;
    cd.stateTimer -= dt;

    if (cd.state === 'at_home' && cd.stateTimer <= 0) {
      // Start walking to car
      cd.state = 'walk_to_car';
      cd.visible = true;
    } else if (cd.state === 'walk_to_car') {
      const dx = cd.homeCurb.x - cd.x;
      const dz = cd.homeCurb.z - cd.z;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d < 1.5) {
        // Get in car
        cd.state = 'driving';
        cd.visible = false;
        cd.carMoving = true;
        hidePersonInstance(cd.personSlot);
        cd.roadPath = planRoadPath(cd.homeCurb.x, cd.homeCurb.z, cd.destCurb.x, cd.destCurb.z);
        cd.roadIdx = 0;
      } else {
        const s = cd.speed * dt;
        cd.x += (dx / d) * s;
        cd.z += (dz / d) * s;
        cd.rotY = Math.atan2(dx, dz);
      }
    } else if (cd.state === 'driving') {
      if (cd.roadIdx < cd.roadPath.length) {
        const wp = cd.roadPath[cd.roadIdx];
        const dx = wp.x - cd.x;
        const dz = wp.z - cd.z;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < 2) {
          cd.roadIdx++;
        } else {
          const s = 8 * dt;
          cd.x += (dx / d) * s;
          cd.z += (dz / d) * s;
        }
      } else {
        // Arrived at dest curb — park and get out
        cd.x = cd.destCurb.x;
        cd.z = cd.destCurb.z;
        cd.state = 'walk_to_dest';
        cd.visible = true;
        cd.carMoving = false;
      }
      // Update car position while driving
      if (cd.carMoving && cd.roadIdx < cd.roadPath.length) {
        const wp = cd.roadPath[cd.roadIdx];
        const rotY = -Math.atan2(wp.x - cd.x, wp.z - cd.z);
        updateCarInstance(cd.carSlot, cd.x, 0, cd.z, rotY, cd.carBodyColor, cd.carCabinColor);
        updateCarHeadlights(cd.carSlot, cd.x, cd.z, rotY, isNight);
        needsCarUpdate = true;
      }
    } else if (cd.state === 'walk_to_dest') {
      const dx = cd.destDoor.x - cd.x;
      const dz = cd.destDoor.z - cd.z;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d < 1.5) {
        cd.state = 'at_dest';
        cd.stateTimer = 10 + rng() * 20;
        cd.visible = false;
        hidePersonInstance(cd.personSlot);
      } else {
        const s = cd.speed * dt;
        cd.x += (dx / d) * s;
        cd.z += (dz / d) * s;
        cd.rotY = Math.atan2(dx, dz);
      }
    } else if (cd.state === 'at_dest' && cd.stateTimer <= 0) {
      // Walk back to car for return trip
      cd.state = 'walk_to_car_return';
      cd.x = cd.destDoor.x;
      cd.z = cd.destDoor.z;
      cd.visible = true;
    } else if (cd.state === 'walk_to_car_return') {
      const dx = cd.destCurb.x - cd.x;
      const dz = cd.destCurb.z - cd.z;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d < 1.5) {
        cd.state = 'driving_home';
        cd.visible = false;
        cd.carMoving = true;
        hidePersonInstance(cd.personSlot);
        cd.roadPath = planRoadPath(cd.destCurb.x, cd.destCurb.z, cd.homeCurb.x, cd.homeCurb.z);
        cd.roadIdx = 0;
      } else {
        const s = cd.speed * dt;
        cd.x += (dx / d) * s;
        cd.z += (dz / d) * s;
        cd.rotY = Math.atan2(dx, dz);
      }
    } else if (cd.state === 'driving_home') {
      if (cd.roadIdx < cd.roadPath.length) {
        const wp = cd.roadPath[cd.roadIdx];
        const dx = wp.x - cd.x;
        const dz = wp.z - cd.z;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < 2) {
          cd.roadIdx++;
        } else {
          const s = 8 * dt;
          cd.x += (dx / d) * s;
          cd.z += (dz / d) * s;
        }
      } else {
        cd.x = cd.homeCurb.x;
        cd.z = cd.homeCurb.z;
        cd.state = 'walk_home';
        cd.visible = true;
        cd.carMoving = false;
      }
      if (cd.carMoving && cd.roadIdx < cd.roadPath.length) {
        const wp = cd.roadPath[cd.roadIdx];
        const rotY = -Math.atan2(wp.x - cd.x, wp.z - cd.z);
        updateCarInstance(cd.carSlot, cd.x, 0, cd.z, rotY, cd.carBodyColor, cd.carCabinColor);
        updateCarHeadlights(cd.carSlot, cd.x, cd.z, rotY, isNight);
        needsCarUpdate = true;
      }
    } else if (cd.state === 'walk_home') {
      const dx = cd.homeDoor.x - cd.x;
      const dz = cd.homeDoor.z - cd.z;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d < 1.5) {
        cd.state = 'at_home';
        cd.stateTimer = 10 + rng() * 20;
        cd.visible = false;
        hidePersonInstance(cd.personSlot);
        // Pick new destination for next trip
        if (houseBuildings.length > 1) {
          let ni;
          do { ni = Math.floor(rng() * houseBuildings.length); } while (houseBuildings[ni] === cd.home);
          cd.dest = houseBuildings[ni];
          cd.destDoor = doorPos(cd.dest);
          cd.destCurb = curbNearBuilding(cd.dest);
        }
      } else {
        const s = cd.speed * dt;
        cd.x += (dx / d) * s;
        cd.z += (dz / d) * s;
        cd.rotY = Math.atan2(dx, dz);
      }
    }

    // Render person if visible
    if (cd.visible && cd.alive) {
      updatePersonInstance(cd.personSlot, cd.x, 0, cd.z, cd.rotY, cd.bodyColor, cd.headColor, cd.scale);
      needsPersonUpdate = true;
    }
    // Park car when not moving — face along the nearest road
    if (!cd.carMoving) {
      const parkPos = (cd.state.includes('home') || cd.state === 'at_home' || cd.state === 'walk_to_car') ? cd.homeCurb : cd.destCurb;
      // Determine parked rotation: face along nearest road direction
      const parkRoad = snapToNearestRoad(parkPos.x, parkPos.z);
      let parkRotY = 0;
      if (parkRoad && parkRoad.horizontal) {
        // Parked along horizontal road — face along X axis
        parkRotY = Math.PI / 2;
      }
      // else vertical road — face along Z axis, rotY = 0
      updateCarInstance(cd.carSlot, parkPos.x, 0, parkPos.z, parkRotY, cd.carBodyColor, cd.carCabinColor);
      updateCarHeadlights(cd.carSlot, parkPos.x, parkPos.z, parkRotY, false);
    }
  }

  // ---- Update taxis ----
  for (const taxi of taxis) {
    if (!taxi.alive) continue;
    if (taxi.pauseTimer > 0) { taxi.pauseTimer -= dt; continue; }

    if (taxi.state === 'cruising') {
      // Drive like normal cars on road grid
      if (!taxi.nextIntersection) {
        const start = pickRandomRoadStart();
        taxi.x = start.x; taxi.z = start.z;
        taxi.horizontal = start.horizontal; taxi.dir = start.dir;
        taxi.nextIntersection = findNextIntersection(taxi.x, taxi.z, taxi.horizontal, taxi.dir);
        taxi.pauseTimer = 0.5;
        continue;
      }
      const target = taxi.nextIntersection;
      if (taxi.horizontal) {
        taxi.z = target.z;
        const dist = Math.abs(target.x - taxi.x);
        if (dist < 2) {
          taxi.x = target.x; taxi.z = target.z;
          taxi.pauseTimer = 0.3 + rng() * 0.5;
          const turnRoll = rng();
          if (turnRoll < 0.35) { taxi.horizontal = !taxi.horizontal; taxi.dir = rng() < 0.5 ? 1 : -1; }
          else if (turnRoll < 0.5) { taxi.dir = -taxi.dir; }
          taxi.nextIntersection = findNextIntersection(taxi.x, taxi.z, taxi.horizontal, taxi.dir);
        } else {
          taxi.x += taxi.dir * taxi.speed * dt;
        }
      } else {
        taxi.x = target.x;
        const dist = Math.abs(target.z - taxi.z);
        if (dist < 2) {
          taxi.x = target.x; taxi.z = target.z;
          taxi.pauseTimer = 0.3 + rng() * 0.5;
          const turnRoll = rng();
          if (turnRoll < 0.35) { taxi.horizontal = !taxi.horizontal; taxi.dir = rng() < 0.5 ? 1 : -1; }
          else if (turnRoll < 0.5) { taxi.dir = -taxi.dir; }
          taxi.nextIntersection = findNextIntersection(taxi.x, taxi.z, taxi.horizontal, taxi.dir);
        } else {
          taxi.z += taxi.dir * taxi.speed * dt;
        }
      }

      // Look for nearby pedestrians who need a ride (randomly assign some as needing taxi)
      if (rng() < 0.002) {
        for (const ped of pedestrians) {
          if (!ped.alive || ped.fleeing || ped.inTaxi) continue;
          if (ped.inTaxi) continue;
          const d = dist2d(taxi, ped);
          if (d < 15) {
            taxi.passenger = ped;
            taxi.state = 'picking_up';
            taxi.pickupTarget = { x: ped.x, z: ped.z };
            break;
          }
        }
      }
    } else if (taxi.state === 'picking_up') {
      if (!taxi.passenger || !taxi.passenger.alive) {
        taxi.state = 'cruising';
        taxi.passenger = null;
        continue;
      }
      const dx = taxi.pickupTarget.x - taxi.x;
      const dz = taxi.pickupTarget.z - taxi.z;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d < 4) {
        // Pick up passenger
        taxi.passenger.inTaxi = true;
        taxi.passenger.alive = false;
        hidePersonInstance(taxi.passenger.slot);
        taxi.state = 'dropping_off';
        taxi.dropoffTarget = randomSidewalkPos();
        taxi.roadPath = planRoadPath(taxi.x, taxi.z, taxi.dropoffTarget.x, taxi.dropoffTarget.z);
        taxi.roadIdx = 0;
        if (rng() < 0.3) addKillFeedEntry('Taxi picked up passenger');
      } else {
        const s = taxi.speed * 0.8 * dt;
        taxi.x += (dx / d) * s;
        taxi.z += (dz / d) * s;
      }
    } else if (taxi.state === 'dropping_off') {
      if (taxi.roadIdx < taxi.roadPath.length) {
        const wp = taxi.roadPath[taxi.roadIdx];
        const dx = wp.x - taxi.x;
        const dz = wp.z - taxi.z;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < 2) { taxi.roadIdx++; }
        else {
          const s = taxi.speed * dt;
          taxi.x += (dx / d) * s;
          taxi.z += (dz / d) * s;
        }
      } else {
        // Drop off passenger — respawn as new pedestrian
        if (taxi.passenger) {
          const newSlot = allocPersonSlot();
          if (newSlot >= 0) {
            const pos = taxi.dropoffTarget;
            pedestrians.push({
              slot: newSlot,
              x: pos.x, z: pos.z, y: 0, rotY: 0,
              bodyColor: COLOR_CIVILIAN,
              headColor: taxi.passenger.headColor || SKIN_TONES[Math.floor(rng() * SKIN_TONES.length)],
              scale: 1.0,
              speed: 1.5 + rng() * 1.5,
              target: randomSidewalkPos(),
              alive: true, fleeing: false,
            });
          }
        }
        taxi.passenger = null;
        taxi.state = 'cruising';
        taxi.nextIntersection = findNextIntersection(taxi.x, taxi.z, rng() < 0.5, rng() < 0.5 ? 1 : -1);
        taxi.horizontal = rng() < 0.5;
        taxi.dir = rng() < 0.5 ? 1 : -1;
      }
    }

    let rotY;
    if (taxi.state === 'dropping_off' && taxi.roadIdx < taxi.roadPath.length) {
      const wp = taxi.roadPath[taxi.roadIdx];
      rotY = -Math.atan2(wp.x - taxi.x, wp.z - taxi.z);
    } else if (taxi.horizontal) {
      rotY = taxi.dir > 0 ? -Math.PI / 2 : Math.PI / 2;
    } else {
      rotY = taxi.dir > 0 ? 0 : Math.PI;
    }
    updateCarInstance(taxi.idx, taxi.x, 0, taxi.z, rotY, taxi.bodyColor, taxi.cabinColor);
    updateCarHeadlights(taxi.idx, taxi.x, taxi.z, rotY, isNight);
    needsCarUpdate = true;
  }

  // ---- Update cars — road following ----
  for (const car of cars) {
    if (!car.alive) continue;
    if (car.pauseTimer > 0) { car.pauseTimer -= dt; continue; }

    if (!car.nextIntersection) {
      // Off the edge — pick a new road
      const start = pickRandomRoadStart();
      car.x = start.x;
      car.z = start.z;
      car.horizontal = start.horizontal;
      car.dir = start.dir;
      car.nextIntersection = findNextIntersection(car.x, car.z, car.horizontal, car.dir);
      car.pauseTimer = 0.5;
      continue;
    }

    // Move toward next intersection
    const target = car.nextIntersection;
    // Lane offset: road=10 wide, sidewalk=3 each side, 2 lanes of 2. Offset from center = 1.5
    const LANE_OFFSET = 1.5;
    let dx, dz;
    if (car.horizontal) {
      dx = target.x - car.x;
      dz = 0;
      // Right-side lane: dir>0 (moving +X) → offset +Z; dir<0 → offset -Z
      car.z = target.z + car.dir * LANE_OFFSET;
    } else {
      dx = 0;
      dz = target.z - car.z;
      // Right-side lane: dir>0 (moving +Z) → offset -X; dir<0 → offset +X
      car.x = target.x - car.dir * LANE_OFFSET;
    }

    const dist = Math.abs(dx + dz); // one is always 0
    // Stop BEFORE the intersection (5 units back = one car length)
    const STOP_DIST = 5;
    if (dist < STOP_DIST) {
      // Stop short of intersection center — stay one car length back
      if (dist > 2) {
        // Still approaching — snap to stop line, not the center
        if (car.horizontal) {
          car.x = target.x - car.dir * (STOP_DIST - 1);
        } else {
          car.z = target.z - car.dir * (STOP_DIST - 1);
        }
      }

      // Pause at stop line
      car.pauseTimer = 0.3 + rng() * 0.8;

      // Decide: continue straight, or turn
      const turnRoll = rng();
      if (turnRoll < 0.35) {
        car.horizontal = !car.horizontal;
        car.dir = rng() < 0.5 ? 1 : -1;
      } else if (turnRoll < 0.5) {
        car.dir = -car.dir;
      }

      // After pause expires, car will proceed through intersection to next one
      car.nextIntersection = findNextIntersection(target.x, target.z, car.horizontal, car.dir);
    } else {
      // Simple forward collision avoidance — slow down if car ahead
      let blocked = false;
      for (const other of cars) {
        if (other === car || !other.alive) continue;
        const odx = other.x - car.x, odz = other.z - car.z;
        const oDist = Math.sqrt(odx * odx + odz * odz);
        if (oDist > 12 || oDist < 0.5) continue;
        if (car.horizontal && Math.abs(odz) < 4 && odx * car.dir > 0 && Math.abs(odx) < 8) { blocked = true; break; }
        if (!car.horizontal && Math.abs(odx) < 4 && odz * car.dir > 0 && Math.abs(odz) < 8) { blocked = true; break; }
      }
      const speedMult = blocked ? 0.15 : 1.0;
      const s = car.speed * speedMult * dt;
      if (car.horizontal) {
        car.x += car.dir * s;
      } else {
        car.z += car.dir * s;
      }
    }

    // Calculate rotation: car's long axis is +Z in local space
    // horizontal dir>0 = moving +X → rotY = -PI/2 so +Z faces +X
    // horizontal dir<0 = moving -X → rotY = +PI/2 so +Z faces -X
    // vertical dir>0 = moving +Z → rotY = 0 (default forward)
    // vertical dir<0 = moving -Z → rotY = PI (face backward)
    let targetRotY;
    if (car.horizontal) {
      targetRotY = car.dir > 0 ? -Math.PI / 2 : Math.PI / 2;
    } else {
      targetRotY = car.dir > 0 ? 0 : Math.PI;
    }
    // Smooth rotation toward target (interpolate for turns)
    if (car.rotY === undefined) car.rotY = targetRotY;
    let diff = targetRotY - car.rotY;
    // Normalize angle diff to [-PI, PI]
    while (diff > Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    car.rotY += diff * Math.min(1, dt * 5); // smooth turn at 5 rad/s
    const rotY = car.rotY;

    updateCarInstance(car.idx, car.x, 0, car.z, rotY, car.bodyColor, car.cabinColor);
    updateCarHeadlights(car.idx, car.x, car.z, rotY, isNight);
    needsCarUpdate = true;
  }

  if (needsCarUpdate) {
    carBodyMesh.instanceMatrix.needsUpdate = true;
    if (carBodyMesh.instanceColor) carBodyMesh.instanceColor.needsUpdate = true;
    carCabinMesh.instanceMatrix.needsUpdate = true;
    if (carCabinMesh.instanceColor) carCabinMesh.instanceColor.needsUpdate = true;
    carHLMesh.instanceMatrix.needsUpdate = true;
    carTLMesh.instanceMatrix.needsUpdate = true;
  }

  // ---- RIOT ----
  if (riotMode) {
    riotTimer += dt;

    // Phase progression
    if (riotPhase === 'TENSION' && riotTimer > 8) {
      riotPhase = 'RIOT';
      addKillFeedEntry('*** RIOT ERUPTED ***');
    }
    if (riotPhase === 'RIOT' && protestors.filter(p => p.alive && !p.arrested).length < 5) {
      riotPhase = 'DISPERSAL';
      addKillFeedEntry('Crowd dispersing');
    }

    // Update protestors
    for (const pr of protestors) {
      if (!pr.alive || pr.arrested) continue;

      if (pr.fleeing) {
        // Compute persistent flee direction away from plaza (once)
        if (!pr.fleeTarget) {
          const awayX = pr.x - PLAZA_X;
          const awayZ = pr.z - PLAZA_Z;
          const awayLen = Math.sqrt(awayX * awayX + awayZ * awayZ) || 1;
          pr.fleeTarget = {
            x: pr.x + (awayX / awayLen) * 80 + (rng() - 0.5) * 30,
            z: pr.z + (awayZ / awayLen) * 80 + (rng() - 0.5) * 30,
          };
        }
        const target = pr.fleeTarget;
        const dx = target.x - pr.x;
        const dz = target.z - pr.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 1) {
          const s = pr.speed * 1.5 * dt;
          pr.x += (dx / dist) * s;
          pr.z += (dz / dist) * s;
          pr.rotY = Math.atan2(dx, dz);
        }
        if (pr.x < -10 || pr.x > CITY_W + 10 || pr.z < -10 || pr.z > CITY_H + 10) {
          pr.alive = false;
          hidePersonInstance(pr.slot);
        }
        if (pr.alive) updatePersonInstance(pr.slot, pr.x, 0, pr.z, pr.rotY, pr.bodyColor, pr.headColor, pr.scale);
        continue;
      }

      // Move toward target in plaza (grounded, y=0)
      const dx = pr.target.x - pr.x;
      const dz = pr.target.z - pr.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist < 3) {
        pr.target = { x: PLAZA_X + (rng() - 0.5) * 40, z: PLAZA_Z + (rng() - 0.5) * 40 };
      } else {
        const s = pr.speed * dt;
        pr.x += (dx / dist) * s;
        pr.z += (dz / dist) * s;
        pr.rotY = Math.atan2(dx, dz);
      }

      updatePersonInstance(pr.slot, pr.x, 0, pr.z, pr.rotY, pr.bodyColor, pr.headColor, pr.scale);

      // Throw rocks and molotovs during RIOT phase
      if (riotPhase === 'RIOT') {
        pr.throwTimer -= dt;
        if (pr.throwTimer <= 0) {
          pr.throwTimer = 4 + rng() * 10; // slower throw rate to prevent projectile flood

          let nearest = null, nearDist = Infinity;
          for (const pol of police) {
            if (!pol.alive) continue;
            const dd = dist2d(pr, pol);
            if (dd < nearDist && dd < 60) { nearDist = dd; nearest = pol; }
          }

          if (nearest) {
            const isMolotov = rng() < 0.2;
            if (isMolotov) {
              launchProjectile(
                { x: pr.x, z: pr.z },
                { x: nearest.x + (rng() - 0.5) * 10, z: nearest.z + (rng() - 0.5) * 10 },
                'molotov'
              );
              molotovCount++;
              addKillFeedEntry('Protestor threw molotov!');
            } else {
              launchProjectile(
                { x: pr.x, z: pr.z },
                { x: nearest.x + (rng() - 0.5) * 8, z: nearest.z + (rng() - 0.5) * 8 },
                'rock'
              );
              rockCount++;
              if (rng() < 0.3) addKillFeedEntry('Protestor threw rock');
              if (rng() < 0.1) {
                nearest.health -= 0.1;
                injuryCount++;
                if (rng() < 0.3) addKillFeedEntry('Police officer hit by rock');
                // Knock down injured police
                if (nearest.health < 0.5 && !nearest.injured) {
                  knockDownPerson(nearest);
                }
              }
            }
          }
        }

        if (rng() < 0.003) {
          pr.fleeing = true;
          pr.speed = 3 + rng() * 2;
        }
      }
    }

    // Update police
    for (const pol of police) {
      if (!pol.alive) continue;

      if (pol.holdLine) {
        // During riot/dispersal, police advance toward the plaza
        if (riotPhase === 'RIOT' || riotPhase === 'DISPERSAL') {
          // Push line forward gradually (0.5 units/sec toward plaza)
          const advanceDist = 0.5 * dt;
          const toPlazaZ = PLAZA_Z - pol.lineZ;
          if (Math.abs(toPlazaZ) > 8) {
            pol.lineZ += Math.sign(toPlazaZ) * advanceDist;
          }
        }
        const dx = pol.lineX - pol.x;
        const dz = pol.lineZ - pol.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 1) {
          const s = pol.speed * dt;
          pol.x += (dx / dist) * s;
          pol.z += (dz / dist) * s;
        }
        pol.rotY = Math.atan2(PLAZA_X - pol.x, PLAZA_Z - pol.z);
      }

      updatePersonInstance(pol.slot, pol.x, 0, pol.z, pol.rotY, pol.bodyColor, pol.headColor, pol.scale);

      // Update shield position
      if (pol.myShieldIdx >= 0) {
        const cosR = Math.cos(pol.rotY);
        const sinR = Math.sin(pol.rotY);
        const shieldScale = PERSON_SCALE * pol.scale;
        _pos.set(pol.x + 1.2 * sinR * shieldScale, 1.2 * shieldScale, pol.z + 1.2 * cosR * shieldScale);
        _euler.set(0, pol.rotY, 0);
        _quat.setFromEuler(_euler);
        _scale.set(1, 1, 1);
        _mat4.compose(_pos, _quat, _scale);
        shieldMesh.setMatrixAt(pol.myShieldIdx, _mat4);
      }

      // Fire tear gas and rubber bullets
      if (riotPhase === 'RIOT' || riotPhase === 'DISPERSAL') {
        pol.fireTimer -= dt;
        if (pol.fireTimer <= 0) {
          pol.fireTimer = 2 + rng() * 5;

          let nearest = null, nearDist = Infinity;
          for (const pr of protestors) {
            if (!pr.alive || pr.arrested || pr.fleeing) continue;
            const dd = dist2d(pol, pr);
            if (dd < nearDist && dd < 80) { nearDist = dd; nearest = pr; }
          }

          if (nearest) {
            const isTearGas = rng() < 0.25;
            if (isTearGas) {
              const impactX = nearest.x + (rng() - 0.5) * 15;
              const impactZ = nearest.z + (rng() - 0.5) * 15;
              createTearGasCloud({ x: impactX, z: impactZ });
              teargasCount++;
              addKillFeedEntry('Police fired tear gas');

              for (const pr of protestors) {
                if (!pr.alive || pr.arrested || pr.fleeing) continue;
                const dd = dist2d(pr, { x: impactX, z: impactZ });
                if (dd < 20 && rng() < 0.4) {
                  pr.fleeing = true;
                  pr.speed = 3 + rng() * 2;
                }
              }
            } else {
              createTracer(
                { x: pol.x, z: pol.z },
                { x: nearest.x, z: nearest.z },
                CYAN, 0.25
              );
              createMuzzleFlash({ x: pol.x, z: pol.z });
              playGunshot(pol.x, pol.z);

              if (rng() < 0.15) {
                nearest.health -= 0.3;
                createHitEffect({ x: nearest.x, z: nearest.z });
                injuryCount++;

                if (nearest.health <= 0) {
                  nearest.arrested = true;
                  nearest.y = -0.5;
                  arrestCount++;
                  addKillFeedEntry('Protestor arrested');
                } else {
                  // Knock down injured protestor
                  if (!nearest.injured && !nearest.onGround) {
                    knockDownPerson(nearest);
                    addKillFeedEntry('Protestor injured!');
                  } else if (rng() < 0.5 && !nearest.onGround) {
                    nearest.fleeing = true;
                    nearest.speed = 3 + rng() * 2;
                    addKillFeedEntry('Protestor hit, fleeing');
                  }
                }
              }
            }
          }
        }
      }
    }

    // Process injured queue — spawn ambulances after delay
    for (let i = injuredQueue.length - 1; i >= 0; i--) {
      const entry = injuredQueue[i];
      entry.timer -= dt;
      if (entry.timer <= 0) {
        if (entry.person.alive && !entry.person.arrested) {
          spawnAmbulance(entry.person);
        }
        injuredQueue.splice(i, 1);
      }
    }

    // Update ring markers for protestors and police
    for (const pr of protestors) {
      if (pr.myRingIdx >= 0 && pr.alive && !pr.arrested) {
        _pos.set(pr.x, 0.05, pr.z);
        _euler.set(-Math.PI / 2, 0, 0);
        _quat.setFromEuler(_euler);
        _scale.set(1, 1, 1);
        _mat4.compose(_pos, _quat, _scale);
        ringMesh.setMatrixAt(pr.myRingIdx, _mat4);
        ringMesh.setColorAt(pr.myRingIdx, _color.set(pr.ringColor));
      } else if (pr.myRingIdx >= 0) {
        _pos.set(0, -100, 0);
        _quat.identity();
        _scale.set(0, 0, 0);
        _mat4.compose(_pos, _quat, _scale);
        ringMesh.setMatrixAt(pr.myRingIdx, _mat4);
      }
    }
    for (const pol of police) {
      if (pol.myRingIdx >= 0 && pol.alive) {
        _pos.set(pol.x, 0.05, pol.z);
        _euler.set(-Math.PI / 2, 0, 0);
        _quat.setFromEuler(_euler);
        _scale.set(1, 1, 1);
        _mat4.compose(_pos, _quat, _scale);
        ringMesh.setMatrixAt(pol.myRingIdx, _mat4);
        ringMesh.setColorAt(pol.myRingIdx, _color.set(pol.ringColor));
      }
    }
    if (ringMesh.count > 0) {
      ringMesh.instanceMatrix.needsUpdate = true;
      if (ringMesh.instanceColor) ringMesh.instanceColor.needsUpdate = true;
    }
    if (shieldMesh.count > 0) {
      shieldMesh.instanceMatrix.needsUpdate = true;
    }
  }

  // Update ambulances
  updateAmbulances(dt);

  // Update emergency vehicles (fire trucks, police vans)
  updateEmergencyVehicles(dt);

  // Update injured people on ground
  updateInjuredOnGround(dt);

  // Update person instanced meshes
  personBodyMesh.count = personSlotCount;
  personHeadMesh.count = personSlotCount;
  if (personSlotCount > 0) {
    personBodyMesh.instanceMatrix.needsUpdate = true;
    if (personBodyMesh.instanceColor) personBodyMesh.instanceColor.needsUpdate = true;
    personHeadMesh.instanceMatrix.needsUpdate = true;
    if (personHeadMesh.instanceColor) personHeadMesh.instanceColor.needsUpdate = true;
  }

  // ---- Helicopter ----
  if (helicopter) {
    const h = helicopter;
    h.angle += dt * 0.3; // slow circle
    h.group.position.x = h.centerX + Math.cos(h.angle) * h.radius;
    h.group.position.z = h.centerZ + Math.sin(h.angle) * h.radius;
    h.group.position.y = 80 + Math.sin(h.angle * 2) * 3; // slight bob

    // Face direction of travel — tangent to circular orbit
    // Velocity: dx=-sin(a), dz=cos(a). Body +X is forward.
    // atan2(dz, dx) = atan2(cos(a), -sin(a)) = PI/2 + a → but body forward is +X so subtract PI/2
    h.group.rotation.y = -h.angle;
    // Forward lean (pitch) — nose tilts down ~8° when flying, like a real helicopter
    h.group.rotation.x = -0.14;
    // Bank into turn — lean inward
    h.group.rotation.z = -0.15;

    // Spin rotors fast
    h.rotorAngle += dt * 25;
    h.rotor.rotation.y = h.rotorAngle;
    h.rotor2.rotation.y = h.rotorAngle + Math.PI / 2;
    h.tailRotor.rotation.z = h.rotorAngle * 1.5;

    // Searchlight intensity flicker — dramatic
    h.searchlight.intensity = 12 + Math.sin(h.angle * 5) * 4;

    // Update beam cylinder opacity based on night
    const isNightNow = nightMode || simTime < 6 || simTime > 20;
    h.beam.material.opacity = isNightNow ? 0.12 : 0.04;

    // Update ground splash position
    if (h.splash) {
      h.splash.position.set(h.group.position.x, 0.1, h.group.position.z);
      h.splash.material.opacity = isNightNow ? 0.25 : 0.08;
    }
  }

  // Update projectiles (arcing rocks/molotovs)
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.age += dt;
    const t = proj.age;

    proj.mesh.position.x = proj.startX + proj.vx * t;
    proj.mesh.position.z = proj.startZ + proj.vz * t;
    proj.mesh.position.y = 2 + proj.vy * t - 0.5 * proj.gravity * t * t;

    proj.mesh.rotation.x += dt * 5;
    proj.mesh.rotation.z += dt * 3;

    // Molotov trail — using instanced particles
    if (proj.type === 'molotov') {
      if (rng() < 0.3) {
        spawnParticle(
          proj.mesh.position.x, proj.mesh.position.y, proj.mesh.position.z,
          (rng() - 0.5) * 1, 1, (rng() - 0.5) * 1,
          0.15, 0xff6600, 0.5
        );
      }
    }

    // Impact
    if (proj.mesh.position.y <= 0 || proj.age > proj.flightTime * 1.5) {
      const impactPos = { x: proj.mesh.position.x, z: proj.mesh.position.z };
      proj.mesh.visible = false; // return to pool

      if (proj.type === 'molotov') {
        createFire(impactPos); // fire already capped at 6
        // Reduced explosion: fewer particles than before
        for (let ep = 0; ep < 6; ep++) {
          spawnParticle(impactPos.x, 1, impactPos.z,
            (rng()-0.5)*15, 3+rng()*10, (rng()-0.5)*15,
            0.3+rng()*0.4, [0xff4400,0xff8800,0xffaa00][Math.floor(rng()*3)], 0.6+rng()*0.3);
        }
        playExplosion(impactPos.x, impactPos.z);
      }

      projectiles.splice(i, 1);
    }
  }

  // Update effects — pooled tracers (hide, don't remove)
  for (let i = tracers.length - 1; i >= 0; i--) {
    tracers[i].life -= dt;
    tracers[i].line.material.opacity = Math.max(0, tracers[i].life / tracers[i].maxLife);
    if (tracers[i].life <= 0) {
      tracers[i].line.visible = false;
      tracers.splice(i, 1);
    }
  }

  for (let i = muzzleFlashes.length - 1; i >= 0; i--) {
    muzzleFlashes[i].life -= dt;
    if (muzzleFlashes[i].life <= 0) {
      muzzleFlashes[i].light.visible = false;
      muzzleFlashes[i].light.intensity = 0;
      muzzleFlashes.splice(i, 1);
    }
  }

  // Update instanced particles (fire, smoke, tear gas, debris)
  updateParticles(dt);

  // Update persistent fires — longer burn with flickering and continuous particle spawning
  for (let i = fires.length - 1; i >= 0; i--) {
    const f = fires[i];
    f.age += dt;
    const lifeRatio = 1.0 - (f.age / f.life);
    // Flickering intensity that gradually dims over lifetime
    const baseIntensity = (f.maxIntensity || 5) * Math.max(0.1, lifeRatio);
    f.light.intensity = baseIntensity + Math.sin(f.age * 12) * baseIntensity * 0.4
                       + Math.sin(f.age * 7.3) * baseIntensity * 0.2
                       + rng() * baseIntensity * 0.15;
    f.light.color.setHex(rng() < 0.3 ? 0xff4400 : 0xff8800);

    // Increase light range for dramatic night fires
    f.light.distance = 30 + 15 * Math.min(1, lifeRatio * 2);

    // Spawn fire particles more frequently in first half of life
    const spawnRate = lifeRatio > 0.5 ? 0.12 : 0.05;
    if (rng() < spawnRate) {
      const fireColors = [0xff4400, 0xff8800, 0xffaa00];
      spawnParticle(
        f.x + (rng() - 0.5) * 3, 0.5, f.z + (rng() - 0.5) * 3,
        (rng() - 0.5) * 1, 1 + rng() * 3, (rng() - 0.5) * 1,
        0.3 + rng() * 0.4,
        fireColors[Math.floor(rng() * fireColors.length)],
        1 + rng() * 2
      );
    }

    // Smoke wisps in second half of life (dying fire)
    if (lifeRatio < 0.5 && rng() < 0.03) {
      spawnParticle(
        f.x + (rng() - 0.5) * 2, 2 + rng(), f.z + (rng() - 0.5) * 2,
        (rng() - 0.5) * 0.5, 0.5 + rng(), (rng() - 0.5) * 0.5,
        0.8 + rng(), 0x444444, 2 + rng() * 2
      );
    }

    if (f.age >= f.life) {
      scene.remove(f.light);
      fires.splice(i, 1);
    }
  }

  // Camera — reuse temp vectors to avoid GC pressure
  if (chaseCam && chaseTarget) {
    _pos.set(chaseTarget.x - 15, 20, chaseTarget.z + 15);
    camera.position.lerp(_pos, 0.05);
    _pos.set(chaseTarget.x, 1, chaseTarget.z);
    camera.lookAt(_pos);
  } else {
    controls.update();
  }
}

// =========================================================================
// HUD
// =========================================================================
function updateHUD() {
  const hours = Math.floor(simTime);
  const mins = Math.floor((simTime - hours) * 60);
  document.getElementById('clock').textContent =
    `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;

  document.getElementById('civ-count').textContent =
    pedestrians.filter(p => p.alive).length + cars.filter(c => c.alive).length +
    carDrivers.filter(cd => cd.alive).length + taxis.length;
  document.getElementById('protestor-count').textContent = protestors.filter(p => p.alive && !p.arrested).length;
  document.getElementById('police-count').textContent = police.filter(p => p.alive).length;
  document.getElementById('arrest-count').textContent = arrestCount;

  document.getElementById('molotov-count').textContent = molotovCount;
  document.getElementById('teargas-count').textContent = teargasCount;
  document.getElementById('rock-count').textContent = rockCount;
  document.getElementById('injury-count').textContent = injuryCount;

  const phaseEl = document.getElementById('phase-indicator');
  phaseEl.textContent = riotPhase;
  phaseEl.className = riotPhase === 'RIOT' ? 'riot' :
                      riotPhase === 'TENSION' ? 'tension' :
                      riotPhase === 'DISPERSAL' ? 'dispersal' : '';

  // Kill feed
  const feed = document.getElementById('kill-feed');
  feed.innerHTML = killFeed.map((k) => {
    k.age += 1 / 60;
    const cls = k.age > 5 ? 'kill-entry fade' : 'kill-entry';
    let color = '#fcee0a';
    if (k.text.includes('Police')) color = '#00f0ff';
    if (k.text.includes('Protestor')) color = '#05ffa1';
    if (k.text.includes('molotov') || k.text.includes('RIOT')) color = '#ff2a6d';
    if (k.text.includes('Civilian')) color = '#fcee0a';
    if (k.text.includes('helicopter')) color = '#00f0ff';
    if (k.text.includes('Ambulance') || k.text.includes('ambulance')) color = '#ffffff';
    if (k.text.includes('hospital') || k.text.includes('Patient')) color = '#ff6666';
    if (k.text.includes('Fire truck') || k.text.includes('fire')) color = '#ff4400';
    if (k.text.includes('Taxi')) color = '#ffcc00';
    if (k.text.includes('van') || k.text.includes('deployed')) color = '#4488ff';
    return `<div class="${cls}" style="color:${color}">${k.text}</div>`;
  }).join('');

  while (killFeed.length > 0 && killFeed[killFeed.length - 1].age > 12) killFeed.pop();
}

// =========================================================================
// Debug Overlay
// =========================================================================
let debugMode = false;

function updateDebugOverlay(dt) {
  if (!debugMode) return;

  const overlay = document.getElementById('debug-overlay');
  const dbgCanvas = document.getElementById('debug-canvas');
  const ctx2d = dbgCanvas.getContext('2d');

  // Resize debug canvas to match window
  if (dbgCanvas.width !== innerWidth || dbgCanvas.height !== innerHeight) {
    dbgCanvas.width = innerWidth;
    dbgCanvas.height = innerHeight;
  }
  ctx2d.clearRect(0, 0, dbgCanvas.width, dbgCanvas.height);

  // Count entities
  const pedAlive = pedestrians.filter(p => p.alive).length;
  const carsAlive = cars.filter(c => c.active !== false).length;
  const protAlive = protestors.filter(p => p.alive).length;
  const copAlive = police.filter(p => p.alive).length;
  const totalParticles = fires.length;

  // Build overlay text
  let html = '<h3>DEBUG OVERLAY</h3>';
  html += `FPS: <span class="dbg-val">${fpsDisplay}</span><br>`;
  html += `Draw calls: <span class="dbg-val">${renderer.info.render.calls}</span><br>`;
  html += `Triangles: <span class="dbg-val">${renderer.info.render.triangles}</span><br>`;
  html += '<h3>ENTITIES</h3>';
  html += `Pedestrians: <span class="dbg-val">${pedAlive}</span><br>`;
  html += `Cars: <span class="dbg-val">${carsAlive}</span><br>`;
  html += `Protestors: <span class="dbg-val">${protAlive}</span><br>`;
  html += `Police: <span class="dbg-val">${copAlive}</span><br>`;
  html += `Fire sources: <span class="dbg-val">${totalParticles}</span><br>`;
  html += `Car drivers: <span class="dbg-val">${carDrivers.filter(cd => cd.alive).length}</span><br>`;
  html += `Taxis: <span class="dbg-val">${taxis.length}</span><br>`;
  html += `Fire trucks: <span class="dbg-val">${fireTrucks.filter(ft => ft.alive).length}</span><br>`;
  html += `Police vans: <span class="dbg-val">${policeVans.filter(pv => pv.alive).length}</span><br>`;
  html += `Injured on ground: <span class="dbg-val">${injuredOnGround.length}</span><br>`;
  html += `Ambulances: <span class="dbg-val">${ambulances.filter(a => a.alive).length}</span><br>`;
  html += `Active particles: <span class="dbg-val">${activeParticles.length}/${MAX_PARTICLES}</span><br>`;
  html += '<h3>RIOT STATE</h3>';
  html += `Phase: <span class="dbg-val">${riotPhase}</span><br>`;
  html += `Riot mode: <span class="dbg-val">${riotMode}</span><br>`;
  if (police.length > 0) {
    const pol0 = police[0];
    html += `Police[0] pos: <span class="dbg-val">(${pol0.x.toFixed(1)}, ${pol0.z.toFixed(1)})</span><br>`;
    html += `Police[0] line: <span class="dbg-val">(${pol0.lineX.toFixed(1)}, ${pol0.lineZ.toFixed(1)})</span><br>`;
    html += `Police[0] holdLine: <span class="dbg-val">${pol0.holdLine}</span><br>`;
    html += `Police[0] speed: <span class="dbg-val">${pol0.speed}</span><br>`;
  }
  if (protestors.length > 0) {
    const pr0 = protestors.filter(p => p.alive)[0];
    if (pr0) html += `Protestor[0] pos: <span class="dbg-val">(${pr0.x.toFixed(1)}, ${pr0.z.toFixed(1)})</span><br>`;
  }
  html += '<h3>SCENE</h3>';
  html += `Objects: <span class="dbg-val">${scene.children.length}</span><br>`;
  html += `Geometries: <span class="dbg-val">${renderer.info.memory.geometries}</span><br>`;
  html += `Textures: <span class="dbg-val">${renderer.info.memory.textures}</span><br>`;

  overlay.innerHTML = html;

  // Draw debug lines on 2D canvas overlay
  // Project 3D positions to screen for car paths and person waypoints
  const projVec = new THREE.Vector3();

  function toScreen(worldX, worldZ, worldY) {
    // Three.js scene: x=right, y=up, z=depth. Entities store x,z as ground plane.
    projVec.set(worldX, worldY || 0.5, worldZ);
    projVec.project(camera);
    return {
      x: (projVec.x * 0.5 + 0.5) * dbgCanvas.width,
      y: (-projVec.y * 0.5 + 0.5) * dbgCanvas.height,
      behind: projVec.z > 1
    };
  }

  // Draw car bounding circles
  ctx2d.strokeStyle = '#00f0ff44';
  ctx2d.lineWidth = 1;
  for (const c of cars) {
    if (c.active === false) continue;
    const s = toScreen(c.x, c.z, 0.5);
    if (s.behind) continue;
    ctx2d.beginPath();
    ctx2d.arc(s.x, s.y, 8, 0, Math.PI * 2);
    ctx2d.stroke();
  }

  // Draw pedestrian positions with dotted circles
  ctx2d.strokeStyle = '#05ffa144';
  ctx2d.setLineDash([3, 3]);
  for (const p of pedestrians) {
    if (!p.alive) continue;
    const s = toScreen(p.x, p.z, 1.0);
    if (s.behind) continue;
    ctx2d.beginPath();
    ctx2d.arc(s.x, s.y, 5, 0, Math.PI * 2);
    ctx2d.stroke();
  }

  // Draw protestor/police positions with colored markers
  ctx2d.setLineDash([]);
  for (const p of protestors) {
    if (!p.alive) continue;
    const s = toScreen(p.x, p.z, 1.0);
    if (s.behind) continue;
    ctx2d.fillStyle = '#05ffa166';
    ctx2d.fillRect(s.x - 3, s.y - 3, 6, 6);
  }
  for (const p of police) {
    if (!p.alive) continue;
    const s = toScreen(p.x, p.z, 1.0);
    if (s.behind) continue;
    ctx2d.fillStyle = '#00f0ff66';
    ctx2d.fillRect(s.x - 3, s.y - 3, 6, 6);
  }

  // Fire positions
  ctx2d.setLineDash([]);
  for (const f of fires) {
    const s = toScreen(f.x, f.z, 0.5);
    if (s.behind) continue;
    ctx2d.fillStyle = '#ff2a6d66';
    ctx2d.beginPath();
    ctx2d.arc(s.x, s.y, 6, 0, Math.PI * 2);
    ctx2d.fill();
  }
}

// =========================================================================
// Main Loop
// =========================================================================
// Throttle sim to 20fps, render at 60fps, HUD at 4fps
let simAccum = 0;
const SIM_STEP = 1 / 20; // 20 sim ticks per second
let hudTimer = 0;

// FPS graph — rolling history for performance monitoring
const fpsHistory = new Float32Array(200);
let fpsHistIdx = 0;
const fpsGraphCanvas = document.getElementById('fps-graph');
const fpsGraphCtx = fpsGraphCanvas ? fpsGraphCanvas.getContext('2d') : null;

function drawFPSGraph() {
  if (!fpsGraphCtx) return;
  const w = 200, h = 60;
  fpsGraphCtx.clearRect(0, 0, w, h);
  // Background grid
  fpsGraphCtx.strokeStyle = '#05ffa122';
  fpsGraphCtx.beginPath();
  for (let y of [15, 30, 45]) { fpsGraphCtx.moveTo(0, y); fpsGraphCtx.lineTo(w, y); }
  fpsGraphCtx.stroke();
  // Labels
  fpsGraphCtx.fillStyle = '#05ffa166';
  fpsGraphCtx.font = '8px monospace';
  fpsGraphCtx.fillText('60', 1, 13);
  fpsGraphCtx.fillText('30', 1, 33);
  fpsGraphCtx.fillText('0', 1, 58);
  // Line
  fpsGraphCtx.strokeStyle = '#05ffa1';
  fpsGraphCtx.lineWidth = 1;
  fpsGraphCtx.beginPath();
  for (let i = 0; i < 200; i++) {
    const idx = (fpsHistIdx + i) % 200;
    const fps = fpsHistory[idx];
    const x = i;
    const y = h - (fps / 60) * h;
    if (i === 0) fpsGraphCtx.moveTo(x, y);
    else fpsGraphCtx.lineTo(x, y);
  }
  fpsGraphCtx.stroke();
  // Warning zone (below 30fps)
  const curFps = fpsHistory[(fpsHistIdx + 199) % 200];
  if (curFps > 0 && curFps < 30) {
    fpsGraphCtx.fillStyle = '#ff2a6d44';
    fpsGraphCtx.fillRect(0, 0, w, h);
  }
}

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  // FPS counter + history
  frameCount++;
  fpsTimer += dt;
  if (fpsTimer >= 0.5) {
    fpsDisplay = Math.round(frameCount / fpsTimer);
    frameCount = 0;
    fpsTimer = 0;
    document.getElementById('fps').textContent = `${fpsDisplay} FPS`;
    fpsHistory[fpsHistIdx % 200] = fpsDisplay;
    fpsHistIdx++;
    drawFPSGraph();
  }

  // Sim runs at fixed 20fps
  simAccum += dt;
  if (simAccum >= SIM_STEP) {
    update(simAccum);
    simAccum = 0;
  }

  // HUD updates at 4fps to avoid DOM thrashing
  hudTimer += dt;
  if (hudTimer >= 0.25) {
    updateHUD();
    hudTimer = 0;
  }

  renderer.render(scene, camera);
}

animate();
</script>
