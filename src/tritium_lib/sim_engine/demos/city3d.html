<html lang="en">
<head>
<meta charset="utf-8">
<title>Tritium City 3D — Riot Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; color: #fcee0a; font-size: 13px;
}
#hud > div { pointer-events: auto; }

#top-bar {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 12px 16px;
}
#clock {
  font-size: 42px; font-weight: bold; color: #00f0ff;
  text-shadow: 0 0 10px #00f0ff88;
}
#time-label { font-size: 11px; color: #00f0ff99; }
#phase-indicator {
  font-size: 20px; font-weight: bold; color: #05ffa1;
  text-shadow: 0 0 8px #05ffa188;
  margin-top: 4px;
}
#phase-indicator.riot { color: #ff2a6d; text-shadow: 0 0 12px #ff2a6d88; }
#phase-indicator.tension { color: #fcee0a; text-shadow: 0 0 8px #fcee0a88; }
#phase-indicator.dispersal { color: #00f0ff; text-shadow: 0 0 8px #00f0ff88; }

#stats {
  text-align: right; line-height: 1.8; font-size: 14px;
}
.stat-val { color: #05ffa1; font-weight: bold; }
.protestor-val { color: #05ffa1; }
.police-val { color: #00f0ff; }
.hostile-val { color: #ff2a6d; }

#riot-stats {
  text-align: right; margin-top: 8px; padding-top: 8px;
  border-top: 1px solid #fcee0a33; font-size: 13px; line-height: 1.6;
}

#kill-feed {
  position: absolute; bottom: 60px; left: 16px;
  max-height: 250px; overflow: hidden; font-size: 13px;
  line-height: 1.6;
}
.kill-entry { opacity: 0.9; }
.kill-entry.fade { opacity: 0.3; }

#controls {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  text-align: center; font-size: 12px; color: #fcee0a88;
  background: #0a0a0f88; padding: 6px 16px; border-radius: 4px;
  border: 1px solid #fcee0a22;
}
#controls span { color: #00f0ff; }

#fps {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: #05ffa188;
}
#fps-graph {
  position: absolute; bottom: 40px; right: 12px;
  width: 200px; height: 60px;
  background: rgba(10,10,15,0.7); border: 1px solid #05ffa133;
  border-radius: 3px;
}

#combat-banner {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 42px; font-weight: bold; color: #ff2a6d;
  text-shadow: 0 0 20px #ff2a6d88, 0 0 40px #ff2a6d44;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
#combat-banner.show { opacity: 1; }

#debug-overlay {
  position: absolute; top: 60px; left: 16px;
  font-size: 12px; color: #05ffa1; line-height: 1.6;
  background: #0a0a0fcc; padding: 10px 14px; border-radius: 4px;
  border: 1px solid #05ffa133; max-height: 50vh; overflow-y: auto;
  display: none; min-width: 260px;
}
#debug-overlay.visible { display: block; }
#debug-overlay h3 { color: #00f0ff; margin: 6px 0 2px; font-size: 13px; }
#debug-overlay .dbg-val { color: #fcee0a; }
#debug-overlay .dbg-collision { color: #ff2a6d; }

#debug-canvas {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; display: none;
}
#debug-canvas.visible { display: block; }
</style>
</head>

<div id="hud">
  <div id="top-bar">
    <div>
      <div id="clock">08:00</div>
      <div id="time-label">SIMULATION TIME</div>
      <div id="phase-indicator">PEACEFUL</div>
    </div>
    <div id="stats">
      Civilians: <span class="stat-val" id="civ-count">0</span><br>

      Arrests: <span class="hostile-val" id="arrest-count">0</span>
      <div id="riot-stats">
        Molotovs: <span class="hostile-val" id="molotov-count">0</span><br>
        Tear Gas: <span class="police-val" id="teargas-count">0</span><br>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// =========================================================================
// Constants
// =========================================================================
const CYAN    = 0x00f0ff;
const MAGENTA = 0xff2a6d;
const GREEN   = 0x05ffa1;
const YELLOW  = 0xfcee0a;
const VOID_BG = 0x0a0a0f;

const BLOCK_W = 60, BLOCK_H = 50;
const GRID_COLS = 8, GRID_ROWS = 6;
const ROAD_W = 10, SIDEWALK_W = 3;
const CITY_W = GRID_COLS * (BLOCK_W + ROAD_W) + ROAD_W;
const CITY_H = GRID_ROWS * (BLOCK_H + ROAD_W) + ROAD_W;

const NUM_PEDESTRIANS = 25;
const NUM_CARS = 12;
const NUM_TAXIS = 3;
const NUM_PROTESTORS = 20;
const NUM_POLICE = 10;
const NUM_FIRE_TRUCKS = 0; // spawned during riot
const NUM_POLICE_VANS = 0; // spawned during riot

// Central plaza — center of the city
const PLAZA_X = CITY_W / 2;
const PLAZA_Z = CITY_H / 2;

// Building type colors (Minecraft style)
const BLDG_HOUSE   = 0x8B6914;
const BLDG_OFFICE  = 0x888888;
const BLDG_SHOP    = 0xD2B48C;
const BLDG_POLICE  = 0x4466AA;
const BLDG_HOSPITAL = 0xEEEEEE;
const BLDG_ROOF    = 0x333333;

// Person dimensions (Minecraft-style, visible from 200m)
const BODY_W = 1.0, BODY_H = 1.5, BODY_D = 0.6;
const HEAD_SIZE = 0.7;
// Scale multiplier — 0.9 makes people ~1.35 units tall (car body is 1.5 tall = roof height)
const PERSON_SCALE = 0.9;

// Role colors
const COLOR_CIVILIAN  = 0x33AA55;  // green shirts
const COLOR_PROTESTOR = 0xCC2222;  // red shirts
const COLOR_POLICE    = 0x2244CC;  // blue shirts

// =========================================================================
// State
// =========================================================================
let riotMode = false;
let nightMode = false;
let chaseCam = false;
let chaseTarget = null;
let simTime = 8.0;
let riotPhase = 'PEACEFUL';
let riotTimer = 0;

let molotovCount = 0;
let teargasCount = 0;
let rockCount = 0;
let arrestCount = 0;
let injuryCount = 0;

const pedestrians = [];
const cars = [];
const protestors = [];
const police = [];
const tracers = [];
const explosions = [];
const muzzleFlashes = [];
const buildings = [];
const streetLamps = [];
const killFeed = [];
const fires = [];
const projectiles = [];
const ambulances = [];
const injuredQueue = []; // people waiting for ambulance pickup
const taxis = [];
const fireTrucks = [];
const policeVans = [];
const injuredOnGround = []; // people lying on ground waiting for ambulance
const carDrivers = []; // civilians who own cars and drive between buildings

const rng = () => Math.random();

// Skin tones for heads
const SKIN_TONES = [0xFFDBAC, 0xE5A073, 0xC68642, 0x8D5524, 0xF1C27D, 0xFFCD94];

// =========================================================================
// Road grid helpers — used for car navigation
// =========================================================================
// Horizontal road centerlines: z positions
const hRoads = [];
for (let row = 0; row <= GRID_ROWS; row++) {
  hRoads.push(row * (BLOCK_H + ROAD_W) + ROAD_W / 2);
}
// Vertical road centerlines: x positions
const vRoads = [];
for (let col = 0; col <= GRID_COLS; col++) {
  vRoads.push(col * (BLOCK_W + ROAD_W) + ROAD_W / 2);
}

// Intersection positions
const intersections = [];
for (const x of vRoads) {
  for (const z of hRoads) {
    intersections.push({ x, z });
  }
}

// =========================================================================
// Audio
// =========================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playGunshot(x, z) {
  const ctx = ensureAudio();
  const bufSize = ctx.sampleRate * 0.08;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const env = Math.exp(-i / (bufSize * 0.15));
    data[i] = (Math.random() * 2 - 1) * env * 0.4;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.value = 0.12;
  src.connect(gain).connect(ctx.destination);
  src.start();
}

function playExplosion(x, z) {
  const ctx = ensureAudio();
  const dur = 0.5;
  const bufSize = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const t = i / ctx.sampleRate;
    const env = Math.exp(-t * 6);
    const low = Math.sin(2 * Math.PI * 40 * t + Math.sin(2 * Math.PI * 15 * t) * 3);
    data[i] = (low * 0.6 + (Math.random() * 2 - 1) * 0.4) * env * 0.3;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.value = 0.15;
  src.connect(gain).connect(ctx.destination);
  src.start();
}

function playHiss(x, z) {
  const ctx = ensureAudio();
  const dur = 0.8;
  const bufSize = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const t = i / ctx.sampleRate;
    const env = Math.exp(-t * 2);
    data[i] = (Math.random() * 2 - 1) * env * 0.15;
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.value = 0.1;
  src.connect(gain).connect(ctx.destination);
  src.start();
}

function playSiren() {
  const ctx = ensureAudio();
  const dur = 1.2;
  const bufSize = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const t = i / ctx.sampleRate;
    const freq = 600 + 400 * Math.sin(2 * Math.PI * 2 * t);
    data[i] = Math.sin(2 * Math.PI * freq * t) * 0.08 * Math.exp(-t * 0.5);
  }
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const gain = ctx.createGain();
  gain.gain.value = 0.06;
  src.connect(gain).connect(ctx.destination);
  src.start();
}

// =========================================================================
// Scene Setup
// =========================================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(VOID_BG);
scene.fog = new THREE.FogExp2(VOID_BG, 0.002);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.5, 2000);
camera.position.set(CITY_W / 2 + 80, 110, CITY_H / 2 + 120);
camera.lookAt(CITY_W / 2, 0, CITY_H / 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.prepend(renderer.domElement);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(CITY_W / 2, 0, CITY_H / 2);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 30;
controls.maxDistance = 800;
controls.maxPolarAngle = Math.PI / 2.1;
controls.update();

// Lights — BRIGHT
const ambientLight = new THREE.AmbientLight(0x8899bb, 0.5);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
sunLight.position.set(200, 400, 100);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -CITY_W;
sunLight.shadow.camera.right = CITY_W;
sunLight.shadow.camera.top = CITY_H;
sunLight.shadow.camera.bottom = -CITY_H;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x00f0ff, 0x112244, 0.5);
scene.add(hemiLight);

// =========================================================================
// Shared reusable objects for matrix/color setting
// =========================================================================
const _mat4 = new THREE.Matrix4();
const _pos = new THREE.Vector3();
const _quat = new THREE.Quaternion();
const _scale = new THREE.Vector3();
const _color = new THREE.Color();
const _euler = new THREE.Euler();

// =========================================================================
// City Generation — InstancedMesh approach
// =========================================================================

// Ground plane
const groundGeo = new THREE.PlaneGeometry(CITY_W + 100, CITY_H + 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(CITY_W / 2, -0.05, CITY_H / 2);
ground.receiveShadow = true;
scene.add(ground);

// Road material
const roadMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.85 });
const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.8 });

// Roads — horizontal (using shared geometries, still individual since each road has different dimensions)
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = row * (BLOCK_H + ROAD_W) + ROAD_W / 2;
  const geo = new THREE.PlaneGeometry(CITY_W, ROAD_W);
  const road = new THREE.Mesh(geo, roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.set(CITY_W / 2, 0.01, z);
  road.receiveShadow = true;
  scene.add(road);

  // Center line
  const lineGeo = new THREE.PlaneGeometry(CITY_W, 0.4);
  const lineMat = new THREE.MeshBasicMaterial({ color: 0xaaaa33 });
  const line = new THREE.Mesh(lineGeo, lineMat);
  line.rotation.x = -Math.PI / 2;
  line.position.set(CITY_W / 2, 0.02, z);
  scene.add(line);
}

// Roads — vertical
for (let col = 0; col <= GRID_COLS; col++) {
  const x = col * (BLOCK_W + ROAD_W) + ROAD_W / 2;
  const geo = new THREE.PlaneGeometry(ROAD_W, CITY_H);
  const road = new THREE.Mesh(geo, roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.set(x, 0.01, CITY_H / 2);
  road.receiveShadow = true;
  scene.add(road);
}

// Sidewalks
for (let row = 0; row <= GRID_ROWS; row++) {
  const z = row * (BLOCK_H + ROAD_W) + ROAD_W / 2;
  for (const side of [-1, 1]) {
    const sz = z + side * (ROAD_W / 2 + SIDEWALK_W / 2);
    const geo = new THREE.PlaneGeometry(CITY_W, SIDEWALK_W);
    const sw = new THREE.Mesh(geo, sidewalkMat);
    sw.rotation.x = -Math.PI / 2;
    sw.position.set(CITY_W / 2, 0.05, sz);
    scene.add(sw);
  }
}
for (let col = 0; col <= GRID_COLS; col++) {
  const x = col * (BLOCK_W + ROAD_W) + ROAD_W / 2;
  for (const side of [-1, 1]) {
    const sx = x + side * (ROAD_W / 2 + SIDEWALK_W / 2);
    const geo = new THREE.PlaneGeometry(SIDEWALK_W, CITY_H);
    const sw = new THREE.Mesh(geo, sidewalkMat);
    sw.rotation.x = -Math.PI / 2;
    sw.position.set(sx, 0.05, CITY_H / 2);
    scene.add(sw);
  }
}

// =========================================================================
// Buildings — InstancedMesh (body + roof as two instanced meshes)
// =========================================================================
const MAX_BUILDINGS = 300;
const buildingBodyGeo = new THREE.BoxGeometry(1, 1, 1);
const buildingBodyMat = new THREE.MeshStandardMaterial({ roughness: 0.8, metalness: 0.0 });
const buildingBodyMesh = new THREE.InstancedMesh(buildingBodyGeo, buildingBodyMat, MAX_BUILDINGS);
buildingBodyMesh.castShadow = true;
buildingBodyMesh.receiveShadow = true;
buildingBodyMesh.count = 0;
scene.add(buildingBodyMesh);

const buildingRoofGeo = new THREE.BoxGeometry(1, 1, 1);
const buildingRoofMat = new THREE.MeshStandardMaterial({ color: BLDG_ROOF, roughness: 0.9 });
const buildingRoofMesh = new THREE.InstancedMesh(buildingRoofGeo, buildingRoofMat, MAX_BUILDINGS);
buildingRoofMesh.castShadow = true;
buildingRoofMesh.count = 0;
scene.add(buildingRoofMesh);

// Windows — InstancedMesh for all window quads
const MAX_WINDOWS = 3000;
const windowGeo = new THREE.PlaneGeometry(1.5, 1.2);
const windowMat = new THREE.MeshBasicMaterial({ color: 0xffdd66, transparent: true, opacity: 0.8 });
const windowMesh = new THREE.InstancedMesh(windowGeo, windowMat, MAX_WINDOWS);
windowMesh.count = 0;
scene.add(windowMesh);

// Doors — InstancedMesh
const MAX_DOORS = 300;
const doorGeo = new THREE.PlaneGeometry(1, 1);
const doorMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
const doorIMesh = new THREE.InstancedMesh(doorGeo, doorMat, MAX_DOORS);
doorIMesh.count = 0;
scene.add(doorIMesh);

let buildingIdx = 0;
let windowIdx = 0;
let doorIdx = 0;

// Hospital building reference (set during city generation)
let hospitalBuilding = null;

function addInstancedBuilding(x, z, w, d, h, type) {
  if (buildingIdx >= MAX_BUILDINGS) return;

  let color;
  switch (type) {
    case 'house':    color = BLDG_HOUSE; break;
    case 'office':   color = BLDG_OFFICE; break;
    case 'shop':     color = BLDG_SHOP; break;
    case 'police':   color = BLDG_POLICE; break;
    case 'hospital': color = BLDG_HOSPITAL; break;
    default:         color = BLDG_OFFICE;
  }

  // Body
  _pos.set(x, h / 2, z);
  _quat.identity();
  _scale.set(w, h, d);
  _mat4.compose(_pos, _quat, _scale);
  buildingBodyMesh.setMatrixAt(buildingIdx, _mat4);
  buildingBodyMesh.setColorAt(buildingIdx, _color.set(color));

  // Roof
  _pos.set(x, h + 0.25, z);
  _scale.set(w + 0.2, 0.5, d + 0.2);
  _mat4.compose(_pos, _quat, _scale);
  buildingRoofMesh.setMatrixAt(buildingIdx, _mat4);

  buildingIdx++;
  buildingBodyMesh.count = buildingIdx;
  buildingRoofMesh.count = buildingIdx;

  // Door — place on the building face closest to the nearest road
  if (doorIdx < MAX_DOORS) {
    const doorW = Math.min(2, w * 0.3);
    const doorH = Math.min(3, h * 0.5);
    // Find which face is closest to a road
    let bestFaceDist = Infinity;
    let doorX = x, doorZ = z + d / 2 + 0.05, doorRotY = 0;
    // +Z face
    for (const hz of hRoads) {
      const fd = Math.abs((z + d / 2) - hz);
      if (fd < bestFaceDist) { bestFaceDist = fd; doorX = x; doorZ = z + d / 2 + 0.05; doorRotY = 0; }
    }
    // -Z face
    for (const hz of hRoads) {
      const fd = Math.abs((z - d / 2) - hz);
      if (fd < bestFaceDist) { bestFaceDist = fd; doorX = x; doorZ = z - d / 2 - 0.05; doorRotY = Math.PI; }
    }
    // +X face
    for (const vx of vRoads) {
      const fd = Math.abs((x + w / 2) - vx);
      if (fd < bestFaceDist) { bestFaceDist = fd; doorX = x + w / 2 + 0.05; doorZ = z; doorRotY = Math.PI / 2; }
    }
    // -X face
    for (const vx of vRoads) {
      const fd = Math.abs((x - w / 2) - vx);
      if (fd < bestFaceDist) { bestFaceDist = fd; doorX = x - w / 2 - 0.05; doorZ = z; doorRotY = -Math.PI / 2; }
    }
    _pos.set(doorX, doorH / 2, doorZ);
    _euler.set(0, doorRotY, 0);
    _quat.setFromEuler(_euler);
    _scale.set(doorW, doorH, 1);
    _mat4.compose(_pos, _quat, _scale);
    doorIMesh.setMatrixAt(doorIdx, _mat4);
    doorIdx++;
    doorIMesh.count = doorIdx;
  }

  // Windows — front/back faces
  const floors = Math.floor(h / 4);
  for (let f = 1; f <= floors; f++) {
    const wy = f * 3.5;
    if (wy > h - 1) break;
    for (const side of [1, -1]) {
      const numWins = Math.floor(w / 4);
      for (let wi = 0; wi < numWins; wi++) {
        if (rng() < 0.3 || windowIdx >= MAX_WINDOWS) continue;
        const wx = x - w / 2 + 2 + wi * 4;
        _pos.set(wx, wy, z + side * (d / 2 + 0.05));
        _euler.set(0, side < 0 ? Math.PI : 0, 0);
        _quat.setFromEuler(_euler);
        _scale.set(1, 1, 1);
        _mat4.compose(_pos, _quat, _scale);
        windowMesh.setMatrixAt(windowIdx, _mat4);
        const winColor = rng() < 0.7 ? 0xffdd66 : 0x66ddff;
        windowMesh.setColorAt(windowIdx, _color.set(winColor));
        windowIdx++;
      }
    }
    // Side faces
    for (const side of [1, -1]) {
      const numWins = Math.floor(d / 4);
      for (let wi = 0; wi < numWins; wi++) {
        if (rng() < 0.4 || windowIdx >= MAX_WINDOWS) continue;
        const wz = z - d / 2 + 2 + wi * 4;
        _pos.set(x + side * (w / 2 + 0.05), wy, wz);
        _euler.set(0, side * Math.PI / 2, 0);

function updateCarInstance(idx, x, y, z, rotY, bodyColor, cabinColor, vehScale) {
  const sc = vehScale || 1;
  const cosR = Math.cos(rotY);
  const sinR = Math.sin(rotY);

  _euler.set(0, rotY, 0);
  _quat.setFromEuler(_euler);

  // Body
  _pos.set(x, 0.75 * sc, z);
  _scale.set(sc, sc, sc);
  _mat4.compose(_pos, _quat, _scale);
  carBodyMesh.setMatrixAt(idx, _mat4);
  carBodyMesh.setColorAt(idx, _color.set(bodyColor));

  // Cabin — offset (0, 0.95, -0.3) in local space (forward = +Z)
  const cLocalZ = -0.3 * sc;
  const cWorldX = x + cLocalZ * sinR;
  const cWorldZ = z + cLocalZ * cosR;
  _pos.set(cWorldX, 1.7 * sc, cWorldZ);
  _mat4.compose(_pos, _quat, _scale);
  carCabinMesh.setMatrixAt(idx, _mat4);
  carCabinMesh.setColorAt(idx, _color.set(cabinColor));

  // Headlights — offset (±0.7, -0.15, 2) from body center (front = +Z)
  const hlLocalZ = 2 * sc;
  _scale.set(sc, sc, sc);
  for (let s = 0; s < 2; s++) {
    const hlLocalX = (s === 0 ? 0.7 : -0.7) * sc;
    const hlX = x + hlLocalX * cosR + hlLocalZ * sinR;
    const hlZ = z + hlLocalX * (-sinR) + hlLocalZ * cosR;
    _pos.set(hlX, 0.6 * sc, hlZ);
    _mat4.compose(_pos, _quat, _scale);
    carHLMesh.setMatrixAt(idx * 2 + s, _mat4);
  }

  // Tail lights — offset (±0.7, -0.15, -2) (rear = -Z)
  const tlLocalZ = -2 * sc;
  for (let s = 0; s < 2; s++) {
    const tlLocalX = (s === 0 ? 0.7 : -0.7) * sc;
    const tlX = x + tlLocalX * cosR + tlLocalZ * sinR;
    const tlZ = z + tlLocalX * (-sinR) + tlLocalZ * cosR;
    _pos.set(tlX, 0.6 * sc, tlZ);
    _mat4.compose(_pos, _quat, _scale);
    carTLMesh.setMatrixAt(idx * 2 + s, _mat4);
  }
}

function hideCarInstance(idx) {
  _pos.set(0, -100, 0);
  _quat.identity();
  _scale.set(0, 0, 0);
  _mat4.compose(_pos, _quat, _scale);
  carBodyMesh.setMatrixAt(idx, _mat4);
  carCabinMesh.setMatrixAt(idx, _mat4);
  for (let s = 0; s < 2; s++) {

}

// Instanced Particle Pool — 500 slots for fire/smoke/debris
// =========================================================================
const MAX_PARTICLES = 500;
const particleGeo = new THREE.BoxGeometry(1, 1, 1);
const particleMat = new THREE.MeshBasicMaterial({
  transparent: true, opacity: 0.55, depthWrite: false,
  blending: THREE.NormalBlending,
});
const particleMesh = new THREE.InstancedMesh(particleGeo, particleMat, MAX_PARTICLES);
particleMesh.count = 0;
particleMesh.renderOrder = 10; // render after opaque objects
scene.add(particleMesh);

// CRITICAL: Disable frustum culling on ALL InstancedMesh objects.
// Three.js computes bounding sphere from base geometry (1x1x1 box at origin).
// When camera zooms in, this tiny sphere gets culled and ALL instances vanish.
[buildingBodyMesh, buildingRoofMesh, windowMesh, doorIMesh,
 trunkMesh, leafMesh, lampPostMesh, lampHeadMesh,
 personBodyMesh, personHeadMesh, ringMesh, shieldMesh,
 carBodyMesh, carCabinMesh, carHLMesh, carTLMesh,
 particleMesh].forEach(m => { m.frustumCulled = false; });

// Particle pool tracking
const particlePool = [];
const activeParticles = [];

// Pre-allocate 500 particle slots
for (let i = 0; i < MAX_PARTICLES; i++) {
  particlePool.push(i);
  // Hide all initially
  _pos.set(0, -200, 0);
  _quat.identity();
  _scale.set(0, 0, 0);
  _mat4.compose(_pos, _quat, _scale);
  particleMesh.setMatrixAt(i, _mat4);
  particleMesh.setColorAt(i, _color.set(0x000000));
}
particleMesh.instanceMatrix.needsUpdate = true;
if (particleMesh.instanceColor) particleMesh.instanceColor.needsUpdate = true;

function spawnParticle(x, y, z, vx, vy, vz, size, color, life, isTearGas = false) {
  if (particlePool.length === 0) return null;
  const slot = particlePool.pop();
  const p = {
    slot, x, y, z, vx, vy, vz, size, color, life, maxLife: life,
    isTearGas, rotX: rng() * Math.PI, rotZ: rng() * Math.PI,
    growRate: isTearGas ? 0.15 : 0.3,
  };
  activeParticles.push(p);
  return p;
}

function updateParticles(dt) {
  let needsUpdate = false;
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.life -= dt;
    if (p.life <= 0) {
      // Return to pool, hide
      _pos.set(0, -200, 0);
      _quat.identity();
      _scale.set(0, 0, 0);
      _mat4.compose(_pos, _quat, _scale);
      particleMesh.setMatrixAt(p.slot, _mat4);
      particlePool.push(p.slot);
      activeParticles.splice(i, 1);
      needsUpdate = true;
      continue;
    }

    // Move
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.z += p.vz * dt;
    p.rotX += dt * 3;
    p.rotZ += dt * 2;

    // Tear gas expands and drifts
    if (p.isTearGas) {
      p.size *= (1 + p.growRate * dt);
      p.vx += (rng() - 0.5) * dt * 2;
      p.vz += (rng() - 0.5) * dt * 2;
    } else {
      p.size *= (1 + p.growRate * dt);
    }

    const alpha = Math.max(0, p.life / p.maxLife);
    // Fade: scale shrinks as particle dies (simulates opacity fade)
    const fadeScale = p.isTearGas ? Math.sqrt(alpha) : alpha;

    _euler.set(p.rotX, 0, p.rotZ);
    _quat.setFromEuler(_euler);
    _pos.set(p.x, p.y, p.z);
    const sz = p.size * fadeScale;
    _scale.set(sz, sz, sz);
    _mat4.compose(_pos, _quat, _scale);
    particleMesh.setMatrixAt(p.slot, _mat4);
    particleMesh.setColorAt(p.slot, _color.set(p.color));
    needsUpdate = true;
  }

  // Keep count at max allocated slot + 1 so all active slots render
  let maxSlot = 0;
  for (const p of activeParticles) {
    if (p.slot >= maxSlot) maxSlot = p.slot + 1;
  }
  particleMesh.count = maxSlot || 0;

  if (needsUpdate) {
    particleMesh.instanceMatrix.needsUpdate = true;
    if (particleMesh.instanceColor) particleMesh.instanceColor.needsUpdate = true;
  }
}

function randomSidewalkPos() {
  // Pick a sidewalk position — people walk on sidewalks alongside roads
  if (rng() < 0.5) {
    // Along horizontal road
    const row = Math.floor(rng() * (GRID_ROWS + 1));
    const z = row * (BLOCK_H + ROAD_W) + ROAD_W / 2 + (rng() < 0.5 ? 1 : -1) * (ROAD_W / 2 + 1.5);
    const x = rng() * CITY_W;
    return { x, z };
  } else {
    // Along vertical road
    const col = Math.floor(rng() * (GRID_COLS + 1));
    const x = col * (BLOCK_W + ROAD_W) + ROAD_W / 2 + (rng() < 0.5 ? 1 : -1) * (ROAD_W / 2 + 1.5);
    const z = rng() * CITY_H;
    return { x, z };
  }
}

function dist2d(a, b) {
  const dx = a.x - b.x;
  const dz = a.z - b.z;
  return Math.sqrt(dx * dx + dz * dz);
}

function edgeSpawnPos() {
  const side = Math.floor(rng() * 4);
  switch (side) {
    case 0: return { x: -5, z: rng() * CITY_H };
    case 1: return { x: CITY_W + 5, z: rng() * CITY_H };
    case 2: return { x: rng() * CITY_W, z: -5 };
    default: return { x: rng() * CITY_W, z: CITY_H + 5 };
  }
}

// Find curb parking position near a building (on nearest road edge)
function curbNearBuilding(bldg) {
  let bestDist = Infinity, bestPos = null;
  // Check vertical roads for nearest curb
  for (const vx of vRoads) {
    const d = Math.abs(bldg.x - vx);
    if (d < bestDist) {
      bestDist = d;
      const side = bldg.x > vx ? 1 : -1;
      bestPos = { x: vx + side * (ROAD_W / 2 - 1.5), z: bldg.z };
    }
  }
  // Check horizontal roads
  for (const hz of hRoads) {
    const d = Math.abs(bldg.z - hz);
    if (d < bestDist) {
      bestDist = d;
      const side = bldg.z > hz ? 1 : -1;
      bestPos = { x: bldg.x, z: hz + side * (ROAD_W / 2 - 1.5) };
    }
  }
  return bestPos || { x: bldg.x, z: bldg.z + (bldg.d || 10) / 2 + 3 };
}

// Get door position of a building — nearest road-facing side
function doorPos(bldg) {
  const hw = (bldg.w || 10) / 2;
  const hd = (bldg.d || 10) / 2;
  let bestDist = Infinity, bestPos = { x: bldg.x, z: bldg.z + hd + 0.5 };
  // Check horizontal roads for +Z/-Z faces
  for (const hz of hRoads) {
    const dPlus = Math.abs((bldg.z + hd) - hz);
    if (dPlus < bestDist) { bestDist = dPlus; bestPos = { x: bldg.x, z: bldg.z + hd + 0.5 }; }
    const dMinus = Math.abs((bldg.z - hd) - hz);
    if (dMinus < bestDist) { bestDist = dMinus; bestPos = { x: bldg.x, z: bldg.z - hd - 0.5 }; }
  }
  // Check vertical roads for +X/-X faces
  for (const vx of vRoads) {
    const dPlus = Math.abs((bldg.x + hw) - vx);
    if (dPlus < bestDist) { bestDist = dPlus; bestPos = { x: bldg.x + hw + 0.5, z: bldg.z }; }
    const dMinus = Math.abs((bldg.x - hw) - vx);
    if (dMinus < bestDist) { bestDist = dMinus; bestPos = { x: bldg.x - hw - 0.5, z: bldg.z }; }
  }
  return bestPos;
}

function addKillFeedEntry(text) {
  killFeed.unshift({ text, age: 0 });
  if (killFeed.length > 10) killFeed.pop();

// Find nearest road point for navigation
function snapToNearestRoad(px, pz) {
  let best = null, bestDist = Infinity;
  // Check horizontal roads
  for (const z of hRoads) {
    const d = Math.abs(pz - z);
    if (d < bestDist) { bestDist = d; best = { x: px, z, horizontal: true }; }
  }
  // Check vertical roads
  for (const x of vRoads) {
    const d = Math.abs(px - x);
    if (d < bestDist) { bestDist = d; best = { x, z: pz, horizontal: false }; }
  }
  return best;
}

// Simple road pathfinding — drive on roads to target
function planRoadPath(fromX, fromZ, toX, toZ) {
  // Find nearest road to start and end
  const startRoad = snapToNearestRoad(fromX, fromZ);
  const endRoad = snapToNearestRoad(toX, toZ);
  // Build a simple waypoint path via nearest intersection
  const waypoints = [];
  waypoints.push({ x: startRoad.x, z: startRoad.z });

  // Find nearest intersection to start
  let bestIntStart = null, bestDistStart = Infinity;
  for (const inter of intersections) {
    const d = dist2d(startRoad, inter);
    if (d < bestDistStart) { bestDistStart = d; bestIntStart = inter; }
  }
  if (bestIntStart) waypoints.push({ ...bestIntStart });

  // Find nearest intersection to end
  let bestIntEnd = null, bestDistEnd = Infinity;
  for (const inter of intersections) {
    const d = dist2d(endRoad, inter);
    if (d < bestDistEnd) { bestDistEnd = d; bestIntEnd = inter; }
  }
  if (bestIntEnd && bestIntEnd !== bestIntStart) {
    // Route via intermediate intersections (simple L-path)
    waypoints.push({ x: bestIntEnd.x, z: bestIntStart.z });
    waypoints.push({ ...bestIntEnd });
  }
  waypoints.push({ x: endRoad.x, z: endRoad.z });
  waypoints.push({ x: toX, z: toZ });
  return waypoints;
}

function pickRandomRoadStart() {
  // Pick a random road segment
  if (rng() < 0.5) {
    // Horizontal road
    const row = Math.floor(rng() * (GRID_ROWS + 1));
    const z = hRoads[row];
    const col = Math.floor(rng() * GRID_COLS);
    const x = vRoads[col] + rng() * (BLOCK_W + ROAD_W);
    return { x, z, horizontal: true, dir: rng() < 0.5 ? 1 : -1 };
  } else {
    // Vertical road
    const col = Math.floor(rng() * (GRID_COLS + 1));
    const x = vRoads[col];
    const row = Math.floor(rng() * GRID_ROWS);
    const z = hRoads[row] + rng() * (BLOCK_H + ROAD_W);
    return { x, z, horizontal: false, dir: rng() < 0.5 ? 1 : -1 };
  }
}

function findNextIntersection(x, z, horizontal, dir) {
  if (horizontal) {
    // Moving along x axis, find next vRoad crossing
    if (dir > 0) {
      for (const vx of vRoads) {
        if (vx > x + 1) return { x: vx, z };
      }
      return null; // off edge
    } else {
      for (let i = vRoads.length - 1; i >= 0; i--) {
        if (vRoads[i] < x - 1) return { x: vRoads[i], z };
      }
      return null;
    }
  } else {
    // Moving along z axis, find next hRoad crossing
    if (dir > 0) {
      for (const hz of hRoads) {
        if (hz > z + 1) return { x, z: hz };
      }
      return null;
    } else {
      for (let i = hRoads.length - 1; i >= 0; i--) {
        if (hRoads[i] < z - 1) return { x, z: hRoads[i] };
      }
      return null;
    }
  }
}

function spawnAmbulance(targetPerson) {

  const startZ = road ? road.z : edgePos.z;

  // Plan path to injured person
  const waypoints = planRoadPath(startX, startZ, targetPerson.x, targetPerson.z);

  // Create flashing lights
  const light1 = new THREE.PointLight(0xff0000, 3, 25);
  light1.position.set(startX, 3, startZ);
  scene.add(light1);
  const light2 = new THREE.PointLight(0x0000ff, 3, 25);
  light2.position.set(startX, 3, startZ);
  scene.add(light2);

    idx: slot,
    x: startX, z: startZ,
    speed: 12,
    bodyColor: 0xFFFFFF,
    cabinColor: 0xEEEEEE,
    light1, light2,
    flashTimer: 0,
    waypoints,
    waypointIdx: 0,
    phase: 'driving_to', // driving_to, loading, driving_hospital, done
    loadTimer: 0,
    targetPerson,
    alive: true,
    sirenTimer: 0,
  };
  ambulances.push(ambulance);
  addKillFeedEntry('Ambulance dispatched!');
  playSiren();
}

function updateAmbulances(dt) {
  let needsCarUpdate = false;
  for (let i = ambulances.length - 1; i >= 0; i--) {
    const amb = ambulances[i];
    if (!amb.alive) continue;

    amb.flashTimer += dt;
    amb.sirenTimer += dt;

    // Flash lights alternating red/blue
    const flashPhase = Math.floor(amb.flashTimer * 4) % 2;
    amb.light1.intensity = flashPhase === 0 ? 5 : 0.5;
    amb.light2.intensity = flashPhase === 1 ? 5 : 0.5;
    amb.light1.position.set(amb.x + 1, 3, amb.z);
    amb.light2.position.set(amb.x - 1, 3, amb.z);

    // Periodic siren
    if (amb.sirenTimer > 3) {
      amb.sirenTimer = 0;
      playSiren();
    }

    if (amb.phase === 'driving_to' || amb.phase === 'driving_hospital') {
      // Drive along waypoints
      if (amb.waypointIdx < amb.waypoints.length) {
        const wp = amb.waypoints[amb.waypointIdx];
        const dx = wp.x - amb.x;
        const dz = wp.z - amb.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < 3) {
          amb.waypointIdx++;
        } else {
          const s = amb.speed * dt;
          amb.x += (dx / dist) * s;
          amb.z += (dz / dist) * s;
        }
      } else {
        // Arrived at destination
        if (amb.phase === 'driving_to') {
          amb.phase = 'loading';
          amb.loadTimer = 5;
          addKillFeedEntry('Ambulance loading patient');
        } else {
          // Arrived at hospital
          amb.phase = 'done';
          amb.alive = false;
          scene.remove(amb.light1);
          scene.remove(amb.light2);
          hideCarInstance(amb.idx);
          addKillFeedEntry('Patient delivered to hospital');
        }
      }
    } else if (amb.phase === 'loading') {
      amb.loadTimer -= dt;
      if (amb.loadTimer <= 0) {
        // Pick up injured person
        if (amb.targetPerson && amb.targetPerson.alive) {
          amb.targetPerson.alive = false;
          hidePersonInstance(amb.targetPerson.slot);
          addKillFeedEntry('Injured person loaded into ambulance');
        }
        // Drive to hospital
        amb.phase = 'driving_hospital';
        amb.waypointIdx = 0;
        if (hospitalBuilding) {
          amb.waypoints = planRoadPath(amb.x, amb.z, hospitalBuilding.x, hospitalBuilding.z + hospitalBuilding.d / 2 + 3);
        } else {
          // No hospital, drive to edge
          const edge = edgeSpawnPos();
          amb.waypoints = planRoadPath(amb.x, amb.z, edge.x, edge.z);
        }
      }
    }

    // Calculate rotation
    let rotY = 0;
    if (amb.waypointIdx < amb.waypoints.length) {
      const wp = amb.waypoints[amb.waypointIdx];
      rotY = -Math.atan2(wp.x - amb.x, wp.z - amb.z);
    }

    // Ambulance is larger than regular cars (scale 1.4)
    updateCarInstance(amb.idx, amb.x, 0, amb.z, rotY, amb.bodyColor, 0xDD0000, 1.4);
    needsCarUpdate = true;
  }

  if (needsCarUpdate) {
    carBodyMesh.instanceMatrix.needsUpdate = true;
    if (carBodyMesh.instanceColor) carBodyMesh.instanceColor.needsUpdate = true;
    carCabinMesh.instanceMatrix.needsUpdate = true;
    if (carCabinMesh.instanceColor) carCabinMesh.instanceColor.needsUpdate = true;
    carHLMesh.instanceMatrix.needsUpdate = true;
    carTLMesh.instanceMatrix.needsUpdate = true;
  }
}

// Tracer pool — reuse Line objects instead of creating new ones each shot
const MAX_TRACERS = 20;
const tracerPool = [];
const tracerMat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2, transparent: true, opacity: 1, depthWrite: false });
for (let i = 0; i < MAX_TRACERS; i++) {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(6); // 2 points * 3 coords
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const line = new THREE.Line(geo, tracerMat.clone());
  line.visible = false;
  line.frustumCulled = false;
  scene.add(line);
  tracerPool.push(line);
}

function createTracer(from, to, color = 0xffff00, duration = 0.2) {
  if (tracers.length >= MAX_TRACERS) return; // cap
  // Find a hidden tracer from pool
  const line = tracerPool.find(l => !l.visible);
  if (!line) return;
  const pos = line.geometry.attributes.position.array;
  pos[0] = from.x; pos[1] = 2; pos[2] = from.z;
  pos[3] = to.x; pos[4] = 2; pos[5] = to.z;
  line.geometry.attributes.position.needsUpdate = true;
  line.material.color.setHex(color);
  line.material.opacity = 1;
  line.visible = true;
  tracers.push({ line, life: duration, maxLife: duration });
}

function createFire(pos) {

// Arcing projectile pool — reuse meshes
const MAX_PROJECTILES = 12;
const projGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
const projMats = {
  molotov: new THREE.MeshBasicMaterial({ color: 0xff6600 }),
  rock: new THREE.MeshBasicMaterial({ color: 0x888888 }),
};
const projPool = [];
for (let i = 0; i < MAX_PROJECTILES; i++) {
  const mesh = new THREE.Mesh(projGeo, projMats.rock);
  mesh.visible = false;
  mesh.frustumCulled = false;
  scene.add(mesh);
  projPool.push(mesh);
}

function launchProjectile(from, to, type) {
  if (projectiles.length >= MAX_PROJECTILES) return; // cap
  const mesh = projPool.find(m => !m.visible);
  if (!mesh) return;
  mesh.material = projMats[type] || projMats.rock;
  mesh.scale.set(type === 'molotov' ? 1.2 : 0.8, type === 'molotov' ? 1.6 : 0.8, type === 'molotov' ? 1.2 : 0.8);
  mesh.position.set(from.x, 2, from.z);
  mesh.visible = true;

  const dx = to.x - from.x;
  const dz = to.z - from.z;
  const dist = Math.sqrt(dx * dx + dz * dz);
  const flightTime = Math.max(0.3, dist / 30);
  const vy = dist * 0.15 + 5;

  projectiles.push({
    mesh, type,
    startX: from.x, startZ: from.z,
    vx: dx / flightTime, vz: dz / flightTime,
    vy, gravity: vy * 2 / flightTime,
    age: 0, flightTime,
  });
}

function spawnPoliceVan() {

function updateEmergencyVehicles(dt) {
  const isNight = nightMode || simTime < 6 || simTime > 20;

  // Fire trucks
  for (let i = fireTrucks.length - 1; i >= 0; i--) {
    const ft = fireTrucks[i];
    if (!ft.alive) continue;
    ft.flashTimer += dt;
    ft.sirenTimer += dt;
    const flashPhase = Math.floor(ft.flashTimer * 4) % 2;
    ft.light1.intensity = flashPhase === 0 ? 5 : 0.5;
    ft.light2.intensity = flashPhase === 1 ? 5 : 0.5;
    ft.light1.position.set(ft.x + 1, 3.5, ft.z);
    ft.light2.position.set(ft.x - 1, 3.5, ft.z);
    if (ft.sirenTimer > 4) { ft.sirenTimer = 0; playSiren(); }

    if (ft.phase === 'driving') {
      if (ft.waypointIdx < ft.waypoints.length) {
        const wp = ft.waypoints[ft.waypointIdx];
        const dx = wp.x - ft.x, dz = wp.z - ft.z;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < 3) { ft.waypointIdx++; }
        else { const s = ft.speed * dt; ft.x += (dx / d) * s; ft.z += (dz / d) * s; }
      } else {
        ft.phase = 'fighting_fire';
        ft.fightTimer = 15 + rng() * 10;
        addKillFeedEntry('Fire truck fighting fire');
      }
    } else if (ft.phase === 'fighting_fire') {
      ft.fightTimer -= dt;
      // Accelerate fire death
      if (ft.targetFire && ft.targetFire.life > 0) {
        ft.targetFire.life -= dt * 2; // fire goes out 3x faster
      }
      if (ft.fightTimer <= 0 || !ft.targetFire || ft.targetFire.life <= 0) {
        ft.phase = 'returning';
        const edge = edgeSpawnPos();
        ft.waypoints = planRoadPath(ft.x, ft.z, edge.x, edge.z);
        ft.waypointIdx = 0;
      }
    } else if (ft.phase === 'returning') {
      if (ft.waypointIdx < ft.waypoints.length) {
        const wp = ft.waypoints[ft.waypointIdx];
        const dx = wp.x - ft.x, dz = wp.z - ft.z;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < 3) { ft.waypointIdx++; }
        else { const s = ft.speed * dt; ft.x += (dx / d) * s; ft.z += (dz / d) * s; }
      } else {
        ft.alive = false;
        scene.remove(ft.light1); scene.remove(ft.light2);
        hideCarInstance(ft.idx);
      }
    }

    if (ft.alive) {
      let rotY = 0;
      if (ft.waypointIdx < ft.waypoints.length) {
        const wp = ft.waypoints[ft.waypointIdx];
        rotY = -Math.atan2(wp.x - ft.x, wp.z - ft.z);
      }
      // Fire truck is larger than regular cars (scale 1.5)
      updateCarInstance(ft.idx, ft.x, 0, ft.z, rotY, ft.bodyColor, ft.cabinColor, 1.5);
      updateCarHeadlights(ft.idx, ft.x, ft.z, rotY, isNight);
    }
  }

  // Police vans
  for (let i = policeVans.length - 1; i >= 0; i--) {
    const pv = policeVans[i];
    if (!pv.alive) continue;
    pv.flashTimer += dt;
    pv.sirenTimer += dt;
    const flashPhase = Math.floor(pv.flashTimer * 4) % 2;
    pv.light1.intensity = flashPhase === 0 ? 5 : 0.5;
    pv.light2.intensity = flashPhase === 1 ? 5 : 0.5;
    pv.light1.position.set(pv.x + 1, 3.5, pv.z);
    pv.light2.position.set(pv.x - 1, 3.5, pv.z);
    if (pv.sirenTimer > 4) { pv.sirenTimer = 0; playSiren(); }

    if (pv.phase === 'driving') {
      if (pv.waypointIdx < pv.waypoints.length) {
        const wp = pv.waypoints[pv.waypointIdx];
        const dx = wp.x - pv.x, dz = wp.z - pv.z;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < 3) { pv.waypointIdx++; }
        else { const s = pv.speed * dt; pv.x += (dx / d) * s; pv.z += (dz / d) * s; }
      } else {
        pv.phase = 'deploying';
        pv.deployTimer = 3;
        addKillFeedEntry('Police van deploying officers');
      }
    } else if (pv.phase === 'deploying') {
      pv.deployTimer -= dt;
      if (pv.deployTimer <= 0 && !pv.deployed) {
        pv.deployed = true;
        // Spawn 3-4 police from the van
        const numCops = 3 + Math.floor(rng() * 2);
        for (let c = 0; c < numCops; c++) {
          const slot = allocPersonSlot();
          if (slot < 0) break;
          const headColor = SKIN_TONES[Math.floor(rng() * SKIN_TONES.length)];
          let myRingIdx = -1;
          if (ringIdx < MAX_RINGS) { myRingIdx = ringIdx++; ringMesh.count = ringIdx; }
          let myShieldIdx = -1;
          if (shieldMesh.count < MAX_SHIELDS) { myShieldIdx = shieldMesh.count++; }
          police.push({
            slot, myRingIdx, myShieldIdx,
            x: pv.x + (rng() - 0.5) * 4, z: pv.z + (rng() - 0.5) * 4, y: 0, rotY: 0,
            bodyColor: COLOR_POLICE, headColor, ringColor: CYAN,
            scale: 1.15, speed: 2 + rng() * 1.5,
            alive: true, health: 1.0, fireTimer: 2 + rng() * 4,
            target: null, holdLine: true,
            lineX: PLAZA_X + (rng() - 0.5) * 30, lineZ: PLAZA_Z - 30 - rng() * 10,
            injured: false,
          });
        }
        addKillFeedEntry(`${numCops} officers deployed from van`);
        pv.phase = 'done';
      }
    }

    if (pv.alive) {
      let rotY = 0;
      if (pv.phase === 'driving' && pv.waypointIdx < pv.waypoints.length) {
        const wp = pv.waypoints[pv.waypointIdx];
        rotY = -Math.atan2(wp.x - pv.x, wp.z - pv.z);
      }
      // Police van is larger than regular cars (scale 1.3)
      updateCarInstance(pv.idx, pv.x, 0, pv.z, rotY, pv.bodyColor, pv.cabinColor, 1.3);
      updateCarHeadlights(pv.idx, pv.x, pv.z, rotY, isNight);
    }
  }

  // Update car instanced meshes
  if (fireTrucks.length > 0 || policeVans.length > 0) {
    carBodyMesh.instanceMatrix.needsUpdate = true;
    if (carBodyMesh.instanceColor) carBodyMesh.instanceColor.needsUpdate = true;
    carCabinMesh.instanceMatrix.needsUpdate = true;
    if (carCabinMesh.instanceColor) carCabinMesh.instanceColor.needsUpdate = true;
    carHLMesh.instanceMatrix.needsUpdate = true;
    carTLMesh.instanceMatrix.needsUpdate = true;
  }
}

function knockDownPerson(person) {
  if (!person || !person.alive || person.onGround) return;
  person.onGround = true;
  person.injured = true;

  // Add to injured on ground list
  const marker = showInjuredMarker(person.x, 0, person.z);
  injuredOnGround.push({ person, marker, timer: 15 + rng() * 10, ambulanceDispatched: false });

  injuryCount++;
}

function updateInjuredOnGround(dt) {
  for (let i = injuredOnGround.length - 1; i >= 0; i--) {
    const entry = injuredOnGround[i];
    entry.timer -= dt;

    // Update marker position to follow person (they stay still but just in case)
    if (entry.marker && entry.person.alive) {
      entry.marker.crossH.position.set(entry.person.x, 5, entry.person.z);
      entry.marker.crossV.position.set(entry.person.x, 5, entry.person.z);
      // Billboard: face camera
      entry.marker.crossH.lookAt(camera.position);
      entry.marker.crossV.lookAt(camera.position);
    }

    // Render person lying down (rotated 90 degrees on side)
    if (entry.person.alive && entry.person.onGround) {
      const slot = entry.person.slot;
      if (slot >= 0) {
        const s = (entry.person.scale || 1.0) * PERSON_SCALE;
        // Body lying on side
        _euler.set(0, entry.person.rotY || 0, Math.PI / 2);
        _quat.setFromEuler(_euler);
        _pos.set(entry.person.x, BODY_W * s / 2, entry.person.z);
        _scale.set(BODY_W * s, BODY_H * s, BODY_D * s);
        _mat4.compose(_pos, _quat, _scale);
        personBodyMesh.setMatrixAt(slot, _mat4);
        personBodyMesh.setColorAt(slot, _color.set(entry.person.bodyColor));
        // Head
        _pos.set(entry.person.x + BODY_H * s * 0.6, BODY_W * s / 2, entry.person.z);
        _scale.set(HEAD_SIZE * s, HEAD_SIZE * s, HEAD_SIZE * s);
        _mat4.compose(_pos, _quat, _scale);
        personHeadMesh.setMatrixAt(slot, _mat4);
        personHeadMesh.setColorAt(slot, _color.set(entry.person.headColor));
      }
    }

    // Dispatch ambulance after delay
    if (!entry.ambulanceDispatched && entry.timer < 10) {
      entry.ambulanceDispatched = true;
      spawnAmbulance(entry.person);
    }

    // Remove when ambulance picks them up or timer expires
    if (!entry.person.alive || entry.timer <= 0) {
      hideInjuredMarker(entry.marker);
      if (entry.person.alive) {
        entry.person.alive = false;
        hidePersonInstance(entry.person.slot);
      }
      injuredOnGround.splice(i, 1);
    }
  }
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    riotMode = !riotMode;
    const banner = document.getElementById('combat-banner');
    banner.textContent = riotMode ? 'RIOT IN PROGRESS' : 'RIOT DISPERSED';
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 2000);

    if (riotMode) {
      ensureAudio();
      riotPhase = 'TENSION';
      riotTimer = 0;
      molotovCount = 0;
      teargasCount = 0;
      rockCount = 0;
      arrestCount = 0;
      injuryCount = 0;
      spawnProtestors();
      spawnPolice();
      createHelicopter();
      addKillFeedEntry('Protest gathering in central plaza');
      addKillFeedEntry('Police helicopter deployed');
      // Spawn police vans
      for (let v = 0; v < 2; v++) {
        setTimeout(() => spawnPoliceVan(), (v + 1) * 5000);
      }
    } else {
      // Remove riot units — hide their instanced slots
      for (const p of protestors) hidePersonInstance(p.slot);
      for (const p of police) hidePersonInstance(p.slot);
      protestors.length = 0;
      police.length = 0;
      riotPhase = 'PEACEFUL';
      // Clear fires
      for (const f of fires) scene.remove(f.light);
      fires.length = 0;
      // Remove helicopter
      if (helicopter) {
        if (helicopter.splash) scene.remove(helicopter.splash);
        scene.remove(helicopter.group);
        helicopter = null;
      }
      // Clear ambulances
      for (const amb of ambulances) {
        if (amb.light1) scene.remove(amb.light1);
        if (amb.light2) scene.remove(amb.light2);
        hideCarInstance(amb.idx);
      }
      ambulances.length = 0;
      injuredQueue.length = 0;
      // Clear fire trucks
      for (const ft of fireTrucks) {
        if (ft.light1) scene.remove(ft.light1);
        if (ft.light2) scene.remove(ft.light2);
        hideCarInstance(ft.idx);
      }
      fireTrucks.length = 0;
      // Clear police vans
      for (const pv of policeVans) {
        if (pv.light1) scene.remove(pv.light1);
        if (pv.light2) scene.remove(pv.light2);
        hideCarInstance(pv.idx);
      }
      policeVans.length = 0;
      // Clear injured on ground
      for (const entry of injuredOnGround) {
        hideInjuredMarker(entry.marker);
      }
      injuredOnGround.length = 0;
      // Reset rings and shields
      ringMesh.count = 0;
      ringIdx = 0;
      shieldMesh.count = 0;
    }
  }
  if (e.code === 'KeyC') {
    chaseCam = !chaseCam;
    if (chaseCam) {
      controls.enabled = false;
      const all = [...pedestrians.filter(p => p.alive), ...protestors.filter(p => p.alive), ...police.filter(p => p.alive)];
      chaseTarget = all.length > 0 ? all[Math.floor(rng() * all.length)] : null;
    } else {
      controls.enabled = true;
    }
  }
  if (e.code === 'KeyN') {
    nightMode = !nightMode;
  }
  if (e.code === 'KeyD') {
    debugMode = !debugMode;
    document.getElementById('debug-overlay').classList.toggle('visible', debugMode);
    document.getElementById('debug-canvas').classList.toggle('visible', debugMode);
  }
});
